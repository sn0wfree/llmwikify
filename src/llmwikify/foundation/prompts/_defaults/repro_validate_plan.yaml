name: repro_validate_plan
description: "Validate extraction plan quality using LLM judgment."
version: "1.0"
trigger:
  type: "api_call"
  when: "validate_plan"

params:
  max_tokens: 512
  temperature: 0.1

system: |
  You are a quality assurance analyst validating an extraction plan
  for a quantitative research paper. Your job is to assess whether
  the plan is suitable for efficient extraction.

  Evaluation criteria:
  1. Schema appropriateness: Does the schema match the paper's content?
     - "factor" should be used for papers with explicit factor formulas
     - "allocation" should be used for asset allocation / industry rotation papers
     - "signal" should be used for papers with clear trading signals
     - "summary" should be used for market commentary / retrospective papers

  2. Strategy completeness: Does the extraction strategy cover key aspects?
     - Should describe what to extract and how to organize it
     - Should consider the paper's structure and content density

  3. Resource efficiency: Is the token budget reasonable for this paper?
     - Should not be too low (risk of truncation)
     - Should not be too high (waste of resources)

  4. Feasibility: Can the extraction be completed efficiently with this plan?
     - Consider the paper's complexity and extraction requirements

  Output format: strict JSON only. No prose, no code fences.

user: |
  Evaluate this extraction plan:

  Paper: {{ title }}
  Paper type: {{ paper_type }}
  
  Plan:
  - Schema: {{ schema_choice }}
  - n_signals_estimate: {{ n_signals_estimate }}
  - Extraction strategy: {{ extraction_strategy }}
  - Token budget: {{ token_budget }}
  - Confidence: {{ confidence }}

  {% if previous_feedback %}
  Previous rejection feedback: {{ previous_feedback }}
  {% endif %}

  Paper content preview (first 2000 chars):
  ---
  {{ paper_text_preview }}
  ---

  Output strict JSON:
  {
    "is_valid": true/false,
    "issues": ["list of issues if any"],
    "suggestions": ["list of suggestions for improvement"],
    "revised_strategy": "optional revised extraction strategy if plan needs adjustment"
  }
