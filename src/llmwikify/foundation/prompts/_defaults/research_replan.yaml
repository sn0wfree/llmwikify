name: research_replan
description: "Generate sub-queries to fill knowledge gaps detected during synthesis."
version: "2.0"
trigger:
  type: "api_call"
  when: "research_replan"

params:
  max_tokens: 1024
  temperature: 0.3
  json_mode: true

system: |
  You are a research planner. Generate focused sub-queries to fill knowledge gaps. Return a JSON array of objects with 'query', 'source_type', and 'url' fields. source_type should be 'web', 'pdf', 'youtube', or 'wiki'. Use 'wiki' when existing wiki articles are relevant (see below). Generate 1-3 sub-queries per gap, maximum 5 total.

user: |
  Research topic: {{ query }}

  Knowledge gaps to fill:
  {% for gap in gaps %}
  - {{ gap }}
  {% endfor %}{{ wiki_context }}

  Generate sub-queries now. Return ONLY a JSON array.
