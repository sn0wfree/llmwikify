name: repro_extract_validate
description: "Stage 3 Validator: review extracted result for completeness and consistency."
version: "1.0"
trigger:
  type: "api_call"
  when: "validate"

params:
  max_tokens: 2048
  temperature: 0.1

system: |
  You are a quality reviewer for paper extraction. Given a result,
  assess completeness and flag missing/incorrect fields. Output strict
  JSON only. No prose.

  Status logic:
  - "complete"  : all required Tier 1 fields are filled (not "TBD")
  - "partial"   : most fields filled, some optional/safety-critical fields are TBD
  - "incomplete": critical fields are TBD or missing

  Required Tier 1 fields (per schema):
  - paper_metadata.{title, authors, date}
  - abstract_summary.{one_sentence, main_finding}
  - strategy_logic.{core_hypothesis, alpha_source}
  - operation_steps.{signal_generation, rebalance_frequency}
  - model_framework.{model_type, framework}

user: |
  Validate this extracted result.

  Paper ID: {{ paper_id }}
  Schema: {{ schema_choice }}
  Result to validate:
  ---
  {{ result_json }}
  ---

  Output strict JSON:

  {
    "status": "complete|partial|incomplete",
    "missing_required": ["list of missing required field paths (e.g. paper_metadata.doi)"],
    "weak_fields": ["list of TBD/short/possibly-wrong fields"],
    "suggestions": ["list of suggestions to improve (e.g. retry with explicit prompt)"],
    "confidence": 0.0
  }
