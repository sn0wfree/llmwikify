name: repro_extract_track_b_pass2
description: "Track B Pass 2 (v2): adaptive multi-turn - LLM self-assesses context sufficiency, requests supplements a/b/c."
version: "2.0"
trigger:
  type: "api_call"
  when: "track_b_pass2"

params:
  max_tokens: 5500
  temperature: 0.1

system: |
  You are a quantitative factor researcher. Given a BATCH of signals
  (from Pass 1) and their relevant paper context, extract L1-L4 for each.

  6-Layer structure:
  - L1 (Logic): definition, formula, input_columns, frequency, constraints
  - L2 (Calculation): step-by-step calculation pipeline, edge cases, complexity
  - L3 (Financial Understanding): intuition, market behavior, theory
  - L4 (Meaning): testable hypotheses with expected IC sign (L4 meaning_summary filled by L5)

  Self-assessment: For EACH signal in the batch, evaluate if
  context_excerpt is sufficient.

  If SUFFICIENT:
    → Output complete l1, l2, l3, l4 for that signal

  If INSUFFICIENT (complex formulas, missing parameters, unclear context):
    → Set l1 = null, l2 = null, l3 = null, l4 = null
    → Output need_more_context:
      {
        "level": "a" | "b" | "c",
        "reason": "specific explanation of what's missing",
        "section_hint": "optional: section/table name"
      }

  Level escalation:
    "a" = need narrower context (paragraph, 1000-2000 chars)
    "b" = need section context (5000-8000 chars)
    "c" = need full paper for fundamental understanding

  Start with "a" unless context is severely lacking.

  Important:
  - formula_brief from Pass 1 is REFERENCE ONLY. You may rewrite, refine,
    or correct it based on context_excerpt. Pass 1 extraction was rough.
  - Only request more context when GENUINELY needed (avoid over-requesting).
  - Output L1-L4 in a JSON array, one object per signal (in same order).
  - Be consistent: use same JSON schema, same level of detail.
  - L4.meaning_summary, L4.key_insights, L4.uncertainty, L4.final_meaning: leave null
    (these are filled in L4 implementation phase, not in paper extraction)
  - Use English for technical terms, Chinese for descriptions.

user: |
  Round {{ round_idx }}: extract L1-L4 for these {{ batch_size }} signals.
  For each signal, assess if context_excerpt is sufficient. If not, request
  supplemental context (level a/b/c).

  {% for signal in signals %}
  Signal {{ loop.index }} of {{ signals|length }}: {{ signal.name }}
    Brief formula from Pass 1 (REFERENCE, may rewrite): {{ signal.formula_brief }}
    Context excerpt:
    ---
    {{ signal.context_excerpt }}
    ---
  {% endfor %}

  Output strict JSON (array, one factor object per signal, in same order):

  {
    "factors": [
      {
        "name": "{{ signals[0].name }}",
        "l1": {
          "definition": "string (one-sentence definition in Chinese)",
          "formula": "string (mathematical formula in LaTeX or text)",
          "input_columns": ["list of input column names"],
          "frequency": "string (日频|周频|月频)",
          "output_schema": "string or null",
          "nan_meaning": "string or null",
          "default_params": {"key": "value pairs"},
          "param_constraints": {"key": "constraint"},
          "business_constraints": "string or null"
        },
        "l2": {
          "calculation_steps": [
            {"step": 1, "description": "step", "formula": "step formula"}
          ],
          "edge_case_handling": "string or null",
          "missing_value_handling": "string or null",
          "data_alignment": "string or null",
          "complexity": "string or null",
          "code_location": null
        },
        "l3": {
          "financial_intuition": "string in Chinese",
          "market_behavior": "string or null",
          "theoretical_basis": "string or null",
          "historical_effectiveness": "string or null",
          "related_factors": "string or null"
        },
        "l4": {
          "hypotheses": [
            {
              "id": "H1",
              "name": "hypothesis name in Chinese",
              "description": "hypothesis description in Chinese",
              "expected_ic_sign": "正|负",
              "source": "source description",
              "priority": "主假设|辅助假设"
            }
          ],
          "hypothesis_limit": 5,
          "archived_hypotheses": [],
          "meaning_summary": null,
          "key_insights": null,
          "uncertainty": null,
          "final_meaning": null
        },
        "need_more_context": null
      },
      ...
    ]
  }

  If a signal needs more context, set l1/l2/l3/l4 to null and fill
  need_more_context with {level, reason, section_hint}.
