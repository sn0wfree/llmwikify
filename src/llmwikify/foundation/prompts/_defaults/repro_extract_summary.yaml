name: repro_extract_summary
description: "Track A Tier 1 for 'summary' schema. Extract 8 core paper-level sections for retrospectives, market reviews, and framework proposals (no concrete signals)."
version: "1.0"
trigger:
  type: "api_call"
  when: "extract_tier1_summary"

params:
  max_tokens: 6144
  temperature: 0.1

system: |
  You are a quantitative research analyst. Given a paper that is a
  market commentary, retrospective, or framework proposal with no
  concrete factor/signal definitions, extract 8 core paper-level
  sections. Output strict JSON only. No prose, no code fences.

  Rules:
  - This is "summary" schema: no specific factor formulas or signals to extract.
  - Track B is disabled for this schema.
  - Be precise and factual. Do NOT fabricate.
  - If a field is not present, use "TBD" or empty list.
  - Use English for technical terms, Chinese for descriptions.
  - suggested_signal should be "unknown" or reflect the paper's high-level
    framework (not a concrete formula).

user: |
  Extract paper-level structure from this summary paper.

  Paper ID: {{ paper_id }}
  Title: {{ title }}
  Detected sections: {{ n_sections }}
  {% if sections %}
  Section list:
  {% for s in sections %}
  - L{{ s.level }} [{{ s.char_start }}-{{ s.char_end }}] {{ s.title }}
  {% endfor %}
  {% endif %}

  Paper content (full text):
  ---
  {{ paper_text }}
  ---

  Output strict JSON with 8 sections:

  {
    "paper_metadata": {
      "title": "string",
      "authors": ["list of authors"],
      "institution": "string",
      "date": "string",
      "doi": "string or null",
      "keywords": ["list of keywords"],
      "paper_subtype": "academic|industry_report|working_paper|internal"
    },
    "abstract_summary": {
      "one_sentence": "string (one-sentence summary in Chinese)",
      "three_bullets": ["3 key takeaways in Chinese"],
      "main_contribution": "string (what's new in Chinese)",
      "main_finding": "string (key insight in Chinese)"
    },
    "strategy_logic": {
      "core_hypothesis": "string (核心观点/假说)",
      "market_logic": "string (为什么作者这么认为)",
      "alpha_source": "string (alpha 来源或 'N/A' for retrospective)",
      "applicable_conditions": "string (适用场景)",
      "market_regime": "string or null",
      "long_short_bias": "long_only|short_only|long_short or null",
      "holding_period_estimate": "string or null",
      "capacity_estimate": "string or null"
    },
    "data_requirements": {
      "fields": ["list (may be empty for framework papers)"],
      "frequency": "string or null",
      "universe": "string or null",
      "data_source": "string or null",
      "data_quality": "string or null",
      "survivorship_handling": "string or null",
      "look_ahead_prevention": "string or null",
      "liquidity_filter": "string or null"
    },
    "operation_steps": {
      "signal_generation": "string (high-level narrative, not specific rules)",
      "position_sizing": "string or null",
      "rebalance_frequency": "string or null",
      "stop_loss": "string or null",
      "stop_profit": "string or null",
      "transaction_cost": "string or null",
      "rebalance_threshold": "string or null",
      "position_count": "integer or null",
      "leverage": "string or null"
    },
    "model_framework": {
      "model_type": "string (narrative / framework / commentary)",
      "framework": "string (specific framework proposed)",
      "validation": "string or null",
      "evaluation_metrics": ["list or empty"],
      "complexity_rating": "low|medium|high",
      "reproducibility_score": "low|medium|high"
    },
    "strengths_weaknesses": {
      "strengths": ["list"],
      "weaknesses": ["list"],
      "improvement_directions": ["list"]
    },
    "suggested_signal": {
      "signal_type": "unknown|narrative|framework (no concrete formula)",
      "signal_params": {},
      "strategy_class": "commentary|framework_proposal|retrospective",
      "confidence": "high|medium|low",
      "reasoning": "string (why no concrete signal can be extracted)"
    }
  }
