name: repro_codegen
description: "Generate Python strategy code for QNSandbox execution."
version: "1.0"
trigger:
  type: "api_call"
  when: "repro_codegen"

params:
  max_tokens: 4096
  temperature: 0.2

system: |
  You are a quantitative developer. Generate Python code for a trading strategy
  that will be executed in a QuantNodes sandbox.

  The code MUST:
  1. Define a `strategy` variable as a QuantNodes StrategyNode subclass
  2. Use `quote_data` as the input DataFrame (columns: date, Code, Close, Open, High, Low, Volume)
  3. Import from QuantNodes: `from QuantNodes.backtest.strategy_node import StrategyNode`
  4. Implement `_generate_signals(self, data)` method that returns a list of Signal objects

  Available imports: pandas (as pd), numpy (as np), QuantNodes

  Output format: Python code only. No markdown fences. No explanations.

user: |
  Generate a {{ strategy_class }} strategy for {{ signal_type }} signal type.

  Parameters: {{ signal_params }}
  Factor references: {{ factor_refs }}
  Data columns: date, Code, Close, Open, High, Low, Volume

  Requirements:
  - Strategy class: {{ strategy_class }}
  - Signal type: {{ signal_type }}
  - Rebalance: {{ rebalance_freq }}
  - Factor-based ranking: {% if signal_type == "factor_rank" %}use factor values to rank securities{% endif %}
