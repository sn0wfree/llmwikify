name: repro_extract
description: "Extract structured information from a paper/research report for strategy reproduction."
version: "2.0"
trigger:
  type: "api_call"
  when: "repro_extract"

params:
  max_tokens: 6000
  temperature: 0.1
  max_content_chars: 32000

system: |
  You are a quantitative research analyst. Extract structured information from
  academic papers and research reports for strategy reproduction.

  Your task: Given a paper's content, extract 8 categories of structured information
  AND a 6-layer factor metadata block, output as JSON. Be precise, factual, and concise.

  禁止事项:
  - Do NOT fabricate information not present in the source
  - Do NOT add speculative content — mark uncertain items as "TBD"
  - Use English for technical terms, Chinese for descriptions

  Output format: strict JSON with the following structure.

user: |
  Extract structured information from this paper for strategy reproduction.

  Paper ID: {{ paper_id }}
  Source type: {{ source_type }}
  Source reference: {{ source_ref }}

  Paper content:
  ---
  {{ paper_content }}
  ---

  Extract the following 8 categories AND a 6-layer factor metadata block:

  ```json
  {
    "strategy_logic": {
      "core_hypothesis": "string - the core hypothesis of the strategy",
      "market_logic": "string - why this strategy should work",
      "alpha_source": "string - where does the alpha come from",
      "applicable_conditions": "string - market conditions where this works"
    },
    "data_requirements": {
      "fields": ["list of required data fields"],
      "frequency": "string - daily/hourly/minute",
      "universe": "string - stock universe",
      "data_source": "string - where to get the data"
    },
    "operation_steps": {
      "signal_generation": "string - detailed step-by-step signal generation",
      "position_sizing": "string - position sizing rules",
      "rebalance_frequency": "string - how often to rebalance",
      "stop_loss": "string - stop loss rules",
      "transaction_cost": "string - cost assumptions"
    },
    "model_framework": {
      "model_type": "string - technical/fundamental/quantitative",
      "framework": "string - specific framework used",
      "validation": "string - how to validate",
      "evaluation_metrics": ["list of evaluation metrics"]
    },
    "strengths_weaknesses": {
      "strengths": ["list of advantages"],
      "weaknesses": ["list of disadvantages"],
      "improvement_directions": ["list of possible improvements"]
    },
    "datasets": {
      "name": "string - dataset name",
      "source": "string - where to get it",
      "time_range": "string - date range used",
      "processing": "string - any data processing applied"
    },
    "risks": {
      "known_limitations": ["list of known limitations"],
      "assumption_risks": ["list of assumptions that may fail"],
      "implementation_gaps": ["list of gaps between theory and practice"]
    },
    "references": {
      "original_paper": "string - paper citation",
      "related_papers": ["list of related papers"],
      "code_repositories": ["list of code repos if any"]
    },
    "suggested_signal": {
      "signal_type": "string - one of: ma_cross, rsi, momentum, volatility, factor_rank, signal_composite, unknown",
      "signal_params": {"key": "value pairs for the suggested signal"},
      "strategy_class": "string - one of: trend_following, factor_ranking, mean_reversion, stat_arb, composite",
      "confidence": "string - high/medium/low",
      "reasoning": "string - why this signal type was chosen"
    },
    "factor_list": [
      {
        "name": "string - factor name (e.g., alpha_001, alpha_002)",
        "formula": "string - mathematical formula in LaTeX or text",
        "description": "string - one-sentence description in Chinese",
        "asset_type": "string - stock|futures|options (default: stock)",
        "category": "string - price|fundamental|composite (default: price)",
        "subcategory": "string - momentum|reversal|volatility|liquidity|value|growth|quality|size|signal",
        "input_columns": ["list of input column names (e.g., open, high, low, close, volume)"],
        "frequency": "string - 日频|周频|月频",
        "default_params": {"key": "value"},
        "param_constraints": {"key": "constraint description"},
        "business_constraints": "string - usage limitations",
        "financial_intuition": "string - what this factor intuitively measures",
        "market_behavior": "string - what market behavior it captures",
        "theoretical_basis": "string - underlying financial theory",
        "hypotheses": [
          {
            "id": "H1",
            "name": "hypothesis name in Chinese",
            "description": "hypothesis description in Chinese",
            "expected_ic_sign": "正|负",
            "source": "theoretical or empirical source",
            "priority": "主假设|辅助假设"
          }
        ],
        "calculation_steps": [
          {"step": 1, "description": "step description", "formula": "step formula"}
        ],
        "edge_case_handling": "string - edge case handling",
        "missing_value_handling": "string - missing value strategy",
        "complexity": "string - e.g., O(T × N)"
      }
    ],
    "factor_metadata": {
      "asset_type": "string - stock|futures|options (default: stock)",
      "category": "string - price|fundamental|composite (default: price)",
      "subcategory": "string - momentum|reversal|volatility|liquidity|value|growth|quality|size|signal",
      "l1": {
        "definition": "string - one-sentence definition in Chinese",
        "formula": "string - mathematical formula in LaTeX or text",
        "input_columns": ["list of input column names"],
        "frequency": "string - 日频|周频|月频",
        "default_params": {"key": "value"},
        "param_constraints": {"key": "constraint description"},
        "business_constraints": "string - usage limitations"
      },
      "l2": {
        "calculation_steps": [
          {"step": 1, "description": "step description", "formula": "step formula"}
        ],
        "edge_case_handling": "string - edge case handling",
        "missing_value_handling": "string - missing value strategy",
        "complexity": "string - e.g., O(T × N)"
      },
      "l3": {
        "financial_intuition": "string - what this factor intuitively measures",
        "market_behavior": "string - what market behavior it captures",
        "theoretical_basis": "string - underlying financial theory",
        "historical_effectiveness": "string - historical performance notes",
        "related_factors": "string - relationship with other factors"
      },
      "l4": {
        "hypotheses": [
          {
            "id": "H1",
            "name": "hypothesis name in Chinese",
            "description": "hypothesis description in Chinese",
            "expected_ic_sign": "正|负",
            "source": "theoretical or empirical source",
            "priority": "主假设|辅助假设"
          }
        ],
        "meaning_summary": "string - factor meaning summary in Chinese",
        "key_insights": ["list of key insights"],
        "uncertainty": "string - what remains uncertain"
      }
    }
  }
  ```
