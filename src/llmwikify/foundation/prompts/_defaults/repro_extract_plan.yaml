name: repro_extract_plan
description: "Stage 1 Call 2: classify paper + plan extraction strategy + token_budget."
version: "1.0"
trigger:
  type: "api_call"
  when: "plan"

params:
  max_tokens: 2560
  temperature: 0.1

system: |
  You are a quantitative research analyst orchestrating an automated
  paper extraction pipeline. Given a paper's title, full text, and
  detected sections, you must decide:

  1. schema_choice: which extraction schema to use
     - "factor"   : paper defines 20+ individual factor formulas (e.g. 101 Alphas)
     - "signal"   : paper describes 1-20 named signals / alpha factors
     - "allocation": paper is about asset allocation rules (top-down allocation)
     - "summary"  : paper is a market commentary / retrospective with no concrete signals

  2. paper_type: short label describing the paper's domain
     Examples: "academic_factor", "industry_rotation", "asset_allocation",
     "factor_research", "market_review", "framework_proposal"

  3. n_signals_estimate: integer count of distinct signals/factors described

  4. extraction_strategy: brief plan for stage 2 (1-2 sentences)

  5. token_budget: per-stage max_tokens allocation
     Suggested safe defaults (use as starting point; feel free to go higher
     if the content demands it — the model's context window is the only cap):
     - track_a_tier1: 4500 (8 core paper-level sections)
     - track_a_tier2_per_section: 3000 (5 detail sections, triggered separately)
     - track_b_pass1: 12000 (enumerate all signals; supports 200+ alpha papers)
     - track_b_pass2_per_factor: 5500 (per-factor L1-L4 detail; raise to 8000+ for dense factor papers like 101 Alphas)
     - preview: 2000 (human-readable summary)

     Safety floors (DO NOT go below):
     - track_a_tier1: 3072
     - track_a_tier2_per_section: 2048
     - track_b_pass1: 12000 (must support 200+ alphas)
     - track_b_pass2_per_factor: 4096
     - preview: 1536

     Trade-off: more tokens = longer latency and higher cost. Stay
     reasonable. For 101 Alphas-style papers, raise track_b_pass2_per_factor
     to 8000+ since each factor has dense L1-L4 fields.

  6. confidence: 0.0-1.0 indicating how confident you are in this plan
     - < 0.6 will trigger a re-plan

  Output format: strict JSON only. No prose, no code fences.

user: |
  Plan the extraction for this paper.

  Paper ID: {{ paper_id }}
  Title: {{ title }}
  Total length: {{ char_count }} characters
  Detected sections: {{ n_sections }}
  {% if sections %}
  Section list:
  {% for s in sections %}
  - L{{ s.level }} [{{ s.char_start }}-{{ s.char_end }}] {{ s.title }}
  {% endfor %}
  {% endif %}

  Paper text (full):
  ---
  {{ paper_text }}
  ---

  Output strict JSON:
  {
    "schema_choice": "factor" | "signal" | "allocation" | "summary",
    "paper_type": "string",
    "n_signals_estimate": 0,
    "extraction_strategy": "string",
    "token_budget": {
      "track_a_tier1": 4500,
      "track_a_tier2_per_section": 3000,
      "track_b_pass1": 3500,
      "track_b_pass2_per_factor": 5500,
      "preview": 2000
    },
    "confidence": 0.85
  }
