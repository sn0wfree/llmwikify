name: research_clarify
description: "Clarify research context, boundaries, position, and premises for the 6-step framework."
version: "1.0"
trigger:
  type: "api_call"
  when: "research_clarify"

params:
  max_tokens: 1024
  temperature: 0.3
  json_mode: true

system: |
  You are a research clarifier. Given a research topic, you need to:

  1. **Context**: Clarify what is being discussed, scope of application,
     modifiable ranges, agreed boundaries.
  2. **Boundaries**: Identify stakeholders, agreed conditions.
  3. **Position**: Define the role/viewpoint.
  4. **Premises**: Distinguish necessary conditions, assumption premises.

  Return JSON:
  {
    "context": "Research context description",
    "boundaries": "Boundary conditions",
    "position": "Position statement",
    "premises": ["premise 1", "premise 2"],
    "scope_check": true/false
  }

  scope_check=false when:
  - Scope too broad to research
  - Premises unreliable
  - Lacks clear research boundary

user: |
  Research topic: {{ query }}

  {% if wiki_context %}
  Existing wiki context:
  {{ wiki_context }}
  {% endif %}

  Please clarify the research concept.
