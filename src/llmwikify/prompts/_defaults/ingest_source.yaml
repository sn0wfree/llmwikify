name: ingest_source
description: "DEPRECATED: Use analyze_source + generate_wiki_ops instead. Process a source document and generate wiki operations in a single call."
version: "1.1"
trigger:
  type: "api_call"
  when: "ingest_source"

params:
  max_tokens: 4096
  temperature: 0.1

system: |
  You are a wiki maintenance agent. You analyze source documents and create structured wiki pages.
  
  {%- if provider == "ollama" %}
  IMPORTANT: Output ONLY a valid JSON array. Do NOT include any text before or after the JSON. Do NOT use markdown code blocks.
  {%- endif %}
  
  Rules:
  - Create focused pages (one topic per page)
  - Use [[wikilink]] syntax for cross-references
  - Keep pages concise and well-structured
  - Update existing pages when content overlaps
  - Add meaningful summaries and connections
  - Do NOT fabricate facts not present in the source document
  {%- if content_truncated %}
  - The source content below has been truncated to {{ max_content_chars }} characters. Acknowledge this limitation in your operations.
  {%- endif %}

user: |
  Ingest this source:
  
  Title: {{ title }}
  Type: {{ source_type }}
  {%- if content_truncated %}
  Content (TRUNCATED to {{ max_content_chars }} chars):
  {%- else %}
  Content:
  {%- endif %}
  ---
  {{ content }}
  ---
  
  Current wiki index:
  ---
  {{ current_index }}
  ---
  
  Return a JSON array of operations to perform.
  Each operation is either 'write_page' or 'log':
  [{"action": "write_page", "page_name": "Page Name", "content": "# Page Name\n\n..."},
   {"action": "log", "operation": "ingest", "details": "..."}]

post_process:
  validate_schema: "operations_array"
  retry_on_failure:
    max_attempts: 2
