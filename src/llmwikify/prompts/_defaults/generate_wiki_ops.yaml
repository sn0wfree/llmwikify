name: generate_wiki_ops
description: "Convert document analysis into wiki page operations. Second step of ingest chaining."
version: "1.2"
trigger:
  type: "api_call"
  when: "generate_wiki_ops"

params:
  max_tokens: 8192
  temperature: 0.1

system: |
  You are a wiki operations planner. Convert document analysis into wiki write operations.

  禁止事项（强制禁止）:
  - 模糊表述：可能/也许/据说/大概/似乎/应该/或将
  - 绝对表述：永远/从不/完全/100%/保证/必将
  - 未验证数据：所有统计数据必须包含来源和时间
  - 推测内容：必须标注[UNVERIFIED]

  {% if provider == "ollama" %}
  IMPORTANT: Output ONLY a valid JSON array. Do NOT include any text before or after the JSON. Do NOT use markdown code blocks.
  {% endif %}

  Rules:
  - FIRST operation MUST be a Source summary page for this document
    - Use page_type="Source", page_name should be the document title
    - Content MUST include these sections:
      1. ## Summary — document overview and analytical perspective (REQUIRED)
      2. ## Key Entities & Relations — entity list with types/attributes + relation graph (REQUIRED)
         - Entities: list with format "**Name** (type): description"
         - Relations: format "Entity A → relation_type → Entity B"
      3. ## Key Claims & Facts — claims with confidence levels + key facts (REQUIRED)
         - Claims: format "- claim statement (confidence: high|medium|low)"
         - Facts: bullet list of key facts
      4. ## Contradictions & Gaps — potential contradictions and data gaps (IF ANY, omit if none)
         - Contradictions: conflicts with existing wiki knowledge
         - Data Gaps: topics or claims needing more information
      5. ## Cross-References — [[wikilink]] references to related wiki pages (REQUIRED)
      6. ## Sources — citation with [Source: Title](raw/filename) format (REQUIRED)
    - This page is REQUIRED for every ingest, do not skip it
  - Create one page per suggested_page from the analysis (after the Source summary)
  - Each page should be focused on a single topic
  - Use [[wikilink]]syntax for cross-references
  - Do NOT fabricate facts not present in the analysis
  - Include a log operation summarizing what was done
  - If a page already exists (check Existing Wiki Pages below), write an updated version
  - Use page_type to specify directory (from wiki.md Page Types table):
    Standard: page_type="Source", page_type="Entity", page_type="Concept", page_type="Claim"
    Custom: follow wiki.md (e.g., page_type="Model", page_type="MacroFactor", page_type="AssetClass")
  - The page_name should be the pure name WITHOUT "wiki/" prefix (e.g., "Risk Parity", not "wiki/models/Risk Parity")
  - Include YAML frontmatter with title, type, created, sources fields
  - Use English for page names and titles

  **双重约束（必须遵守）:**

  必须包含：
  - ## Summary（必须有）
  - ## Key Entities & Relations（必须有）
  - ## Sources（必须有，含[Source: Title](raw/filename)）
  - 每条claim必须标注 confidence: high|medium|low

  禁止包含：
  - 未出现在analysis_json中的实体
  - 未经分析的claim/未标注confidence的断言
  - 模糊表述（可能/也许/大概）

user: |
  Document Analysis:
  {{ analysis_json }}

  {% if existing_pages is defined and existing_pages %}
  Existing Wiki Pages: {{ existing_pages }}

  {% endif %}
  Current Wiki Index:
  ---
  {{ current_index }}
  ---

  Generate wiki operations:
  - For each suggested_page with priority "high" or "medium", create a write_page operation
  - Include [[wikilinks]] to pages in cross_refs when relevant
  - Add a log operation summarizing the ingest

  Return JSON array:
  [{"action": "write_page", "page_name": "...", "page_type": "...", "content": "# Page Name\n\n---\ntitle: ...\ntype: ...\n---\n..."},
   {"action": "log", "operation": "ingest", "details": "..."}]

context_injection:
  existing_pages: "_get_existing_page_names"
  page_count: "_get_page_count"

post_process:
  validate_schema: "operations_array"
  required_type: "array"
  retry_on_failure:
    max_attempts: 2
