name: wiki_schema
description: "Wiki maintenance instructions document shown to LLM via MCP. Defines conventions, workflows, and best practices."
version: "2.0"
trigger:
  type: "api_call"
  when: "read_schema"

params: {}

document: |
  # Wiki Schema

  > This document tells the LLM how to maintain this wiki.
  > Generated by llmwikify v{{ version }}

  ## Quick Start

  **You are an agent managing a knowledge base.** This wiki stores structured knowledge
  extracted from source documents (PDFs, articles, reports) and query answers.

  **How to interact:**
  - Use CLI commands (`llmwikify ...`) or MCP tools (`wiki_read_page`, `wiki_write_page`, etc.)
  - Both access the same underlying wiki — pick whichever interface you have
  - **NEVER edit wiki/ files directly** — always use the tools

  **Your first steps:**
  1. Check status → see what exists
  2. Read `wiki/index.md` → see the content catalog
  3. Read this document fully → understand conventions

  ## How to Operate

   **Your workflow:**
  1. Ingest source → returns JSON with content, analysis (entities, suggested_pages), lint_hint
  2. **Analyze the response** → review analysis for page creation guidance
  3. If lint_hint shows issues → run wiki_lint(mode="check") to detect gaps
  4. Create/update pages via `write_page` or `wiki_write_page`
  5. Write graph relations for relationships
  6. Run wiki_lint(mode="fix") if gaps found
  7. Log the operation

  **Key point:** YOU (the agent) write the page content. The CLI/MCP extracts content but does NOT auto-create pages.

  ## Directory Structure

  ```
  root/
  ├── raw/                    # Immutable source documents (PDFs, URLs, exports) — OWNED BY HUMANS
  ├── wiki/                   # LLM-maintained markdown pages — OWNED BY LLM
  │   ├── index.md            # Content catalog (auto-updated on each write)
  │   ├── log.md              # Chronological activity log (append-only)
  │   ├── overview.md         # High-level synthesis of entire knowledge base
  │   ├── sources/            # Source summaries (one per ingested file)
  │   ├── entities/           # People, organizations, locations, products
  │   ├── concepts/           # Theories, frameworks, methods, ideas
  │   ├── comparisons/        # Side-by-side analyses (A vs B)
  │   ├── synthesis/          # Cross-source synthesis on themes
  │   ├── claims/             # Factual claims with evidence tracking
  │   └── .sink/              # Query answer buffers (see "Query Sink" below)
  ├── wiki.md                 # This file — conventions and workflows
  └── .wiki-config.yaml       # User configuration (do NOT modify unless asked)
  ```

  **Ownership rule:**
  - Humans put files in `raw/` — you NEVER touch `raw/`
  - You create/edit files in `wiki/` — humans NEVER touch `wiki/`

  ## Page Types

  Page types are **suggested conventions**. You may create pages outside these types if content warrants it.

  | Type | Location | Purpose |
  |------|----------|---------|
  | Source | `wiki/sources/{slug}.md` | Structured summary of an ingested source |
  | Entity | `wiki/entities/{name}.md` | Person, organization, location, product, event |
  | Concept | `wiki/concepts/{name}.md` | Theory, framework, method, idea |
  | Comparison | `wiki/comparisons/{a}-vs-{b}.md` | Side-by-side analysis of two entities/concepts |
  | Synthesis | `wiki/synthesis/{topic}.md` | Cross-source analysis on a theme or question |
  | Claim | `wiki/claims/{slug}.md` | Specific factual claim with supporting/contradicting evidence |
  | Query | `wiki/Query: {Topic}.md` | Persistent answer to a user query |
  | Overview | `wiki/overview.md` | Top-level narrative of the entire knowledge base |

  ### Custom Page Types

  Define custom page types below. You will read this section during ingest
  and create pages of these types when source content warrants it.

  | Type | Location | Purpose |
  |------|----------|---------|
  | *(add your custom types here)* | `wiki/{subdir}/{pattern}.md` | *(describe purpose)* |

  ## Core Tools

  These are the 8 core tools you will use most. Full tool list available via `wiki_status()`.

  | Operation | CLI Command | MCP Tool |
  |-----------|-------------|----------|
  | Read page | `llmwikify read_page "Name" --type concept` | `wiki_read_page(page_name)` |
  | Write page | `llmwikify write_page "Name" --type concept --content "..."` | `wiki_write_page(page_name, content)` |
  | Search | `llmwikify search "query" --limit 10` | `wiki_search(query, limit)` |
  | Ingest | `llmwikify ingest raw/file.pdf` | `wiki_ingest(source)` |
  | Lint | `llmwikify lint --format recommendations` | `wiki_lint(format)` |
  | Status | `llmwikify status` | `wiki_status()` |
  | References | `llmwikify references "Page" --detail` | `wiki_references(page_name)` |
  | Synthesize | `llmwikify synthesize --query "Q" --answer "A"` | `wiki_synthesize(query, answer)` |

   **Additional tools:** `wiki_graph`, `wiki_graph_analyze`, `wiki_analyze_source`,
  `wiki_sink_status`, `wiki_build_index`, `wiki_recommend`, `wiki_log`,
  `wiki_read_schema`, `wiki_update_schema`

  ## CLI ↔ MCP Parameter Mapping

  CLI arguments and MCP parameters map to the same underlying function.

  | Function | CLI | MCP | Notes |
  |----------|-----|-----|-------|
  | Write page | `write_page "Name" --type concept --content "..."` | `wiki_write_page(page_name="Name", content="...")` | MCP: page_type not exposed |
  | Read page | `read_page "Name" --type concept` | `wiki_read_page(page_name="Name")` | MCP: page_type not exposed |
  | Synthesize | `synthesize --query "Q" --answer "A" --sources "A" "B"` | `wiki_synthesize(query="Q", answer="A", source_pages=["A", "B"])` | CLI: `--sources`, MCP: `source_pages` |
  | Synthesize (auto-link) | `synthesize --no-auto-link` | `wiki_synthesize(..., auto_link=False)` | CLI uses negation flags |
  | Graph query | `graph-query neighbors "Concept"` | `wiki_graph(action="query", concept="Concept")` | CLI subcommand → action param |
  | Graph path | `graph-query path "A" "B"` | `wiki_graph(action="path", source="A", target="B")` | CLI positional → named params |
  | Community detect | `community-detect --algorithm leiden` | `wiki_graph_analyze(action="detect", algorithm="leiden")` | CLI command → action param |
  | Build index | `build-index --no-export` | `wiki_build_index(auto_export=False)` | Negation vs positive bool |

  ### Tool Return Formats

  **wiki_read_page:**
  ```json
  {"page_name": "Page Name", "content": "# Page Name\n\nContent...", "has_sink": false}
  ```

  **wiki_search:**
  ```json
  [
    {"page_name": "Page A", "score": 0.95, "snippet": "...match...", "has_sink": true}
  ]
  ```

  **wiki_ingest:**
  ```json
  {
    "status": "success",
    "source_name": "article.md",
    "content_preview": "...",
    "analysis": {
      "topics": ["AI", "GPU"],
      "entities": [{"name": "NVIDIA", "type": "Organization"}],
      "suggested_pages": [{"name": "CUDA", "type": "Concept"}]
    },
    "lint_hint": {
      "issues_found": 1,
      "suggestion": "Call wiki_lint(mode='check') to detect gaps",
      "top_issues": [{"type": "suggested_page_missing", "page_name": "CUDA"}]
    }
  }
  ```

  **wiki_lint:**
  ```json
  {
    "issue_count": 5,
    "total_pages": 42,
    "broken_links": {"MissingPage": ["Page A", "Page B"]},
    "orphan_pages": ["Orphan Page"],
    "hints": {"broken_links": {"MissingPage": ["Page A"]}, "orphan_pages": ["Orphan Page"]}
  }
  ```

  ### Common Errors

  | Error | Cause | Fix |
  |-------|-------|-----|
  | `Page not found` on read | Page doesn't exist yet | Create it — it's a broken link |
  | `page_name should NOT include 'wiki/'` | Used `wiki/` prefix | Remove prefix: use `"Page Name"` not `"wiki/Page Name"` |
  | Unknown page_type | Typo in type name | Check wiki.md Page Types table for valid types |

  ## Page Conventions

  ### Page Format

  Pages **should** include YAML frontmatter:

  ```yaml
  ---
  title: Page Title
  type: entity | concept | comparison | synthesis | claim | source-summary
  created: YYYY-MM-DD
  updated: YYYY-MM-DD
  sources: [source-file.md]
  tags: [tag1, tag2]
  ---
  ```

  ```markdown
  # Page Title

  ## Summary
  Brief overview of the topic.

  ## Details
  In-depth content with [[wikilinks]] to related pages.

  ## Sources
  - [Source: Article Title](raw/slugified-title.md)
  ```

  ### Wikilink Syntax

  Use `[[wikilink]]` for cross-references between wiki pages:

  | Syntax | Example | Result |
  |--------|---------|--------|
  | Basic | `[[Gold Mining]]` | Link to "Gold Mining" page |
  | Section | `[[Gold Mining#Types]]` | Link to "Types" section |
  | Alias | `[[Gold Mining|Gold Extraction]]` | Shows "Gold Extraction", links to "Gold Mining" |

  **Rules:**
  - Link to entities, concepts, and related topics
  - Update links when creating or modifying pages
  - **NEVER** use `[[raw/filename]]` — raw files are NOT wiki pages

  ### Page Naming Conventions

  **Language:**
  - **Use English** for page names and titles (enables consistent searching and linking)
  - **Keep original language** in page content (quotes, data, examples)
  - Example: `Huatai Asset Allocation Framework` (not `华泰大类资产配置策略体系`)

  **Format:**
  - Use Title Case with spaces: `Asset Allocation`, `Market Regime`
  - Use hyphens for slugs in paths: `wiki/models/risk-parity.md`
  - Avoid special characters: no `&`, `/`, `#`, `?`, etc.
  - Maximum length: 80 characters

  **Uniqueness:**
  - **Before creating a page, always search first:** `wiki_search("page name")`
  - If similar page exists → **update it**, don't create duplicate
  - Use `wiki_read_page("Page Name")` first to see existing content
  - If page name is ambiguous, add context: `Gold Pricing (Macro)` vs `Gold Pricing (Mining)`

  ### Source Citations

  Cite raw sources in wiki pages using **standard markdown links** (NOT wikilinks):

  **Page-level** (recommended for source pages):
  ```markdown
  ## Sources
  - [Source: Ghana's New Royalty Policy](raw/ghana-royalty.md)
  - [Source: Parliament Schedule](raw/parliament-schedule.md)
  ```

  **Inline** (recommended for entity/concept pages):
  ```markdown
  Ghana plans to implement a sliding scale royalty [Source](raw/ghana-royalty.md).
  ```

  **Format:** `[Source: Title](raw/filename)` — use relative paths from wiki root.
  Always cite the source when creating or updating wiki pages from ingested content.

  ### Special Pages

  **index.md:** Auto-updated content catalog. Do NOT edit manually.
  Lists all pages with one-line summaries. Use as query entry point.

  **log.md:** Append-only chronological record.
  Format: `## [YYYY-MM-DD HH:MM:SS] operation | details`
  Append after each significant operation.

  **overview.md:** Top-level synthesis. Revise as understanding deepens.
  Structure: current state, key themes (with wikilinks), working theses, open questions.

  ## Workflows

   ### 1. Ingest a Source

  1. **Ingest source** → returns JSON with content_preview, analysis, lint_hint
  2. **Review analysis** → entities, suggested_pages from LLM extraction
  3. **Check lint_hint** → if present, run wiki_lint(mode="check") to detect gaps
  4. **Create source summary** → type: Source, cite raw file in Sources section
  5. **Create entity pages** → for each new detected entity, type: Entity
  6. **Create concept pages** → for each new concept, type: Concept
  7. **Write graph relations** → if relations detected, write to knowledge graph
  8. **Run wiki_lint(mode="fix")** → if gaps found in step 3
  9. **Update overview** → if the big picture changed significantly
  10. **Log operation** → append to log.md

  **CLI example:**
  ```bash
  llmwikify ingest raw/article.pdf
  llmwikify write_page "article-title" --type source --content "..."
  llmwikify graph write --relations '[...]' --source-file raw/article.pdf
  llmwikify log ingest article.pdf
  ```

  **Troubleshooting:**
  - **No entities detected:** review content manually, create pages for key topics you identify
  - **Page already exists:** read existing page first, then update (append new info, don't overwrite)
  - **Source is URL:** save URL content to `raw/` first, then ingest the local file

  ### 2. Answer a Query

  1. **Search** for relevant pages → returns ranked results with snippets
  2. **Read** full content of relevant pages
  3. **Check sink** → if has_sink, read pending entries from `wiki/.sink/`
  4. **Synthesize** answer → save via `wiki_synthesize` with source_pages and raw_sources
  5. **Merge sinks** → if pending entries exist, combine into comprehensive answer

  **CLI example:**
  ```bash
  llmwikify search "gold royalty Ghana" --limit 10
  llmwikify read_page "ghana-royalty" --type source
  llmwikify synthesize --query "Q" --answer "A" --sources "A" "B" --auto-link
  ```

  **Decision flow:**
  - If search returns results → read pages → synthesize → save
  - If "Query: Topic" page already exists → use mode="sink" or mode="update"
  - mode="sink" → answer goes to sink (duplicates auto-compressed)
  - mode="update" → update the formal page with comprehensive answer

  **Troubleshooting:**
  - **No search results:** topic may not be covered yet, create new page and mark as tentative
  - **Sink grows:** duplicate answers are auto-compressed via content hashing
  - Periodically: read sink + formal page → synthesize → mode="update"

  ### 3. Create or Edit a Page

  1. **Search first** → check if page already exists (`wiki_search`)
  2. **Read existing** → if found, read current content to understand what's there
  3. **Write** → create new or update existing with full content
  4. **Add wikilinks** → connect to related pages
  5. **Cite sources** → add `[Source: Title](raw/filename)` in Sources section

  **CLI example:**
  ```bash
  llmwikify write_page "New Entity" --type entity --content "# New Entity\n\n..."
  ```

  **Rules:**
  - **NEVER create duplicate pages** — always search first
  - **Update existing pages** rather than creating new ones for same topic
  - **Use consistent naming** — same entity = same page name everywhere
  - **Add wikilinks** to connect to related pages
  - **Cite sources** in every page you create or update

  **Troubleshooting:**
  - **Page not found on read:** create it — it's a broken link that needs fixing
  - **Write fails:** check page_type is valid in wiki.md Page Types table
  - **Content looks wrong:** read the page first, verify what exists, then write full corrected content

  ### 4. Maintain Wiki Health

  1. **Run health check** → `wiki_lint` returns missing pages, orphan pages, broken links
  2. **Fix broken links** → create missing pages or remove wikilinks
  3. **Connect orphans** → add wikilinks from overview, synthesis pages, or related entities
   4. **Check sink status** → review pending entries, update formal pages with mode="update"
  5. **Check recommendations** → `wiki_recommend` suggests missing pages

  **CLI example:**
  ```bash
  llmwikify lint --format recommendations
  llmwikify write_page "Missing Page" --type entity --content "..."
  llmwikify sink-status
  ```

  **Troubleshooting:**
  - **Many broken links:** create missing pages as stubs, fill in content later
  - **Many orphans:** add wikilinks from overview.md, synthesis pages, or related entities
  - **Sinks not merging:** read each sink, synthesize into formal query page, then clear

  ### 5. Batch Ingest Strategy

  When processing many sources (>10 files):

  **Batch size:** 3-5 files per session
  - Too small (<3): overhead dominates
  - Too large (>5): error accumulation, hard to rollback

  **Workflow:**
  1. Process batch → `llmwikify batch raw/ --limit 5`
  2. After batch → `llmwikify lint --format recommendations`
  3. If errors > 0 → fix before next batch
  4. Prioritize core frameworks before specialized topics

  **Progress check:**
  - `llmwikify status` → verify page count increased
  - `llmwikify lint` → check for broken links, orphans

  ## Page Format Examples

  ### Claim Page

  ```markdown
  ---
  title: Ghana will implement 5%-12% sliding gold royalty by 2026
  type: claim
  status: supported
  ---

  # Ghana Gold Royalty Reform

  ## Claim
  Ghana plans to replace flat royalty with 5%-12% sliding scale based on gold price.

  ## Supporting Evidence
  - [Source: Finance Minister Statement](raw/ghana-royalty.md): Finance minister confirmed the sliding scale.
  - [Source: Parliament Schedule](raw/parliament-schedule.md): Amendment takes effect in 21 days.

  ## Contradicting Evidence
  - [Source: Mining Lobby Response](raw/mining-lobby.md): Mining companies lobbying to delay implementation.
  ```

  Claim statuses: `supported` (multiple sources confirm), `contested` (conflicting evidence), `unverified` (single source).

  ### Entity Page

  ```markdown
  ---
  title: Ghana
  type: entity
  entity_type: organization
  ---

  # Ghana

  ## Description
  Africa's top gold producer, accounting for ~4% of global production.

  ## Sources
  - [Source: Ghana's New Royalty Policy](raw/ghana-royalty.md)

  ## Knowledge Graph Relations
  - **implements** → [[Gold Royalty Regime]]
  - **located_in** ← [[Africa]]
  - **top_producer** → [[Gold Mining]]
  ```

  ## Knowledge Graph

  The wiki maintains a knowledge graph of relations between concepts, stored in SQLite.

  ### Relation Types

  | Type | Meaning | Example |
  |------|---------|---------|
  | `is_a` | Taxonomic classification | "Gold **is_a** Precious Metal" |
  | `uses` | Dependency or tool usage | "Ghana **uses** Sliding Scale Royalty" |
  | `related_to` | General association | "Gold Mining **related_to** Environmental Impact" |
  | `contradicts` | Conflicting claims | "Claim A **contradicts** Claim B" |
  | `supports` | Reinforcing evidence | "Source **supports** Claim" |
  | `replaces` | Superseding | "New Policy **replaces** Old Policy" |
  | `optimizes` | Improvement | "Algorithm A **optimizes** Process B" |
  | `extends` | Builds on existing | "Framework A **extends** Framework B" |

  Add custom relation types by updating this file under "Custom Relation Types".

  ### Graph Operations

  **CLI examples:**
  ```bash
  llmwikify graph-query neighbors "Gold Mining" --direction both
  llmwikify graph-query path "FlashAttention" "KV Cache"
  llmwikify graph-query stats
  llmwikify graph write --relations '[{"source":"A","target":"B","relation":"uses","confidence":"EXTRACTED"}]' --source-file raw/article.pdf
  llmwikify export-graph --format html --output graph.html
  llmwikify community-detect --algorithm leiden --resolution 1.0
  llmwikify report --top 10
  ```

  ## Query Page Naming

  - Auto-generated: `Query: {Topic}` (first 50 chars of query, title-cased)
  - If similar query exists: `Query: {Topic} (YYYY-MM-DD)` (date suffix)
  - Override with `page_name` parameter in `wiki_synthesize`
  - Use `update_existing=True` to revise an existing query page

  ## Query Sink

  When a query page already exists, new answers go to `wiki/.sink/` instead of creating duplicates.

  - Sink files: `wiki/.sink/Query: Topic.sink.md`
  - Format: chronological entries with timestamp, query, answer, sources
  - During health checks: use `wiki_sink_status()` to find sinks with pending entries
  - Read sinks: `wiki_read_page("wiki/.sink/Query: Topic.sink.md")`
  - After merging: clear with `wiki_write_page("wiki/.sink/Query: Topic.sink.md", content="")`

  ## Claims Tracking

  Claims originate from two sources:
  1. **Source ingest**: Detected during `wiki_ingest` → create `wiki/claims/{slug}.md`
  2. **Query sink**: Disputed claims in sink entries → append evidence to existing claim page

  When a claim's status changes, update the claim page and log the change.
  Use `wiki_sink_status()` to check for pending entries. Periodically merge into claim pages.

  ## Orphan Detection

  Pages with no inbound wikilinks are flagged as orphans. Exclusions:
  - Configure in `.wiki-config.yaml` under `orphan_detection.exclude_patterns`
  - Common exclusions: date pages, meeting notes, archive directories
  - `index.md` and `log.md` are always excluded

  ## index.md vs build_index

  - **index.md**: Content catalog — human-readable, query entry point. Lists all pages with summaries. Updated automatically on write.
  - **build_index**: Technical operation — rebuilds SQLite FTS5 full-text index and exports `reference_index.json`. Used by `wiki_search` under the hood.
  - **Query flow**: Read `index.md` first for overview → Use `wiki_search` to drill down → Use `wiki_read_page` for full content

  ## Troubleshooting

  ### Content Processing Issues

  | Problem | Check | Fix |
  |---------|-------|-----|
  | "Ingest JSON is too long" | Content truncated to 8,000 chars | Use `content_preview` + source knowledge |
  | "No entities detected" | Conceptual document | Review content manually, create pages for key topics |
  | "Too many files to process" | File count > 10 | Use batch strategy (3-5 files per session) |
  | "Page already exists" | Search before create | Read existing page, update instead of creating |
  | "No analysis returned" | LLM not configured | Run `llmwikify analyze-source raw/file.md` manually |
  | "lint_hint shows gaps" | Missing custom type pages | Run `wiki_lint(mode="check")` then `wiki_lint(mode="fix")` |

  ### Tool Call Issues

  | Problem | Check | Fix |
  |---------|-------|-----|
  | `wiki_write_page` fails | Invalid page_type | Check wiki.md Page Types table for valid types |
  | `wiki_read_page` returns nothing | Page doesn't exist | Create it — it's a broken link |
  | `wiki_search` returns nothing | Topic not covered | Create new page, mark as tentative |

  ### Health & Quality Issues

  | Problem | Check | Fix |
  |---------|-------|-----|
  | Many broken links | Lint results | Create missing pages as stubs |
  | Many orphan pages | Lint results | Add wikilinks from overview or related pages |
  | Sinks not merging | Sink status | Read sink, synthesize, clear: `wiki_write_page("wiki/.sink/...", content="")` |
  | Wiki disorganized | Graph analysis | Run graph analysis to see structure |

  ## Best Practices

  1. **Cross-reference heavily** — The value is in the connections between pages
  2. **Update existing pages** — Never create duplicates; always search first
  3. **Note contradictions** — Flag when new information conflicts with existing content
  4. **Keep summaries current** — Update pages when facts change
  5. **Use consistent terminology** — Same entity = same page name everywhere
  6. **File answers back** — Good query responses become persistent wiki pages
  7. **Track claims** — Separate factual claims from interpretation; note confidence levels
  8. **Write graph relations** — Maintain the knowledge graph alongside pages
  9. **Cite sources** — Every claim should be traceable to a file in `raw/`
  10. **Log operations** — Append to `log.md` after significant changes
  11. **Batch process large sources** — Use 3-5 files per session with lint checkpoints
  12. **Start with core frameworks** — Process foundational concepts before specialized topics
  13. **English for page names** — Use English titles, keep original language in content
  14. **Search before creating** — Always check if page exists to avoid duplicates

  ## Configuration

  User configuration is in `.wiki-config.yaml`. Key settings:
  - `orphan_detection.exclude_patterns` — Regex for pages to exclude from orphan detection
  - `orphan_detection.exclude_frontmatter` — Frontmatter keys for exclusion
  - `orphan_detection.archive_directories` — Directory names to exclude

  **Do NOT modify `.wiki-config.yaml` unless explicitly asked by the user.**
