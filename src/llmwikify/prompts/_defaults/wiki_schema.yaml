name: wiki_schema
description: "Wiki maintenance instructions document shown to LLM via MCP. Defines conventions, workflows, and best practices."
version: "2.0"
trigger:
  type: "api_call"
  when: "read_schema"

params: {}

document: |
  # Wiki Schema

  > This document tells the LLM how to maintain this wiki.
  > Generated by llmwikify v{{ version }}

  ## Quick Start

  **You are an agent managing a knowledge base.** This wiki stores structured knowledge
  extracted from source documents (PDFs, articles, reports) and query answers.

  **How to interact:**
  - **Preferred**: MCP tools (`wiki_read_page`, `wiki_write_page`, `wiki_search`, etc.)
  - **Fallback CLI**: `python3 -m llmwikify <command>` (use when MCP is unavailable)
  - **NEVER edit wiki/ files directly** — always use the tools

  **Your first steps:**
  1. Run `wiki_status()` or `python3 -m llmwikify status` to see what exists
  2. Run `wiki_read_page("wiki/index.md")` or `python3 -m llmwikify read_page "wiki/index.md"` to see the content catalog
  3. Read this document fully to understand conventions

  ## How to Operate

  **You are invoked via MCP tools** (e.g., opencode + mcporter-bridge, or any MCP client)

  **Your workflow:**
  1. Call `wiki_ingest(source="raw/file.pdf")` → returns JSON with content, entities, relations
  2. **Analyze the response** → decide which pages to create/update
  3. Call `wiki_write_page(page_name="...", content="...")` for each page
  4. Call `wiki_graph(action="write", relations=[...])` for relationships
  5. Call `wiki_log(operation="ingest", details="...")`

  **Key point:** YOU (the agent) write the page content. The CLI extracts content but does NOT auto-create pages.

  ## Directory Structure

  ```
  root/
  ├── raw/                    # Immutable source documents (PDFs, URLs, exports) — OWNED BY HUMANS
  ├── wiki/                   # LLM-maintained markdown pages — OWNED BY LLM
  │   ├── index.md            # Content catalog (auto-updated on each write)
  │   ├── log.md              # Chronological activity log (append-only)
  │   ├── overview.md         # High-level synthesis of entire knowledge base
  │   ├── sources/            # Source summaries (one per ingested file)
  │   ├── entities/           # People, organizations, locations, products
  │   ├── concepts/           # Theories, frameworks, methods, ideas
  │   ├── comparisons/        # Side-by-side analyses (A vs B)
  │   ├── synthesis/          # Cross-source synthesis on themes
  │   ├── claims/             # Factual claims with evidence tracking
  │   └── .sink/              # Query answer buffers (see "Query Sink" below)
  ├── wiki.md                 # This file — conventions and workflows
  └── .wiki-config.yaml       # User configuration (do NOT modify unless asked)
  ```

  **Ownership rule:**
  - Humans put files in `raw/` — you NEVER touch `raw/`
  - You create/edit files in `wiki/` — humans NEVER touch `wiki/`

  ## Page Types

  Page types are **suggested conventions**. You may create pages outside these types if content warrants it.

  | Type | Location | Purpose |
  |------|----------|---------|
  | Source | `wiki/sources/{slug}.md` | Structured summary of an ingested source |
  | Entity | `wiki/entities/{name}.md` | Person, organization, location, product, event |
  | Concept | `wiki/concepts/{name}.md` | Theory, framework, method, idea |
  | Comparison | `wiki/comparisons/{a}-vs-{b}.md` | Side-by-side analysis of two entities/concepts |
  | Synthesis | `wiki/synthesis/{topic}.md` | Cross-source analysis on a theme or question |
  | Claim | `wiki/claims/{slug}.md` | Specific factual claim with supporting/contradicting evidence |
  | Query | `wiki/Query: {Topic}.md` | Persistent answer to a user query |
  | Overview | `wiki/overview.md` | Top-level narrative of the entire knowledge base |

  ### Custom Page Types

  Define custom page types below. You will read this section during ingest
  and create pages of these types when source content warrants it.

  | Type | Location | Purpose |
  |------|----------|---------|
  | *(add your custom types here)* | `wiki/{subdir}/{pattern}.md` | *(describe purpose)* |

  ## Core MCP Tools

  These are the 8 core tools you will use most. Full tool list available via `wiki_status()`.

  | Tool | CLI Equivalent | Purpose |
  |------|---------------|---------|
  | `wiki_read_page(page_name)` | `python3 -m llmwikify read_page "Page"` | Read a wiki page |
  | `wiki_write_page(page_name, content)` | `python3 -m llmwikify write_page "Page" --content "..."` | Write/create a wiki page |
  | `wiki_search(query, limit)` | `python3 -m llmwikify search "query" --limit 10` | Full-text search wiki pages |
  | `wiki_ingest(source)` | `python3 -m llmwikify ingest raw/file.pdf` | Ingest a source, extract entities/relations |
  | `wiki_lint(format)` | `python3 -m llmwikify lint --format recommendations` | Health check: broken links, orphans |
  | `wiki_status()` | `python3 -m llmwikify status` | Get wiki status summary |
  | `wiki_references(page_name)` | `python3 -m llmwikify references "Page"` | Show inbound/outbound wikilinks |
  | `wiki_synthesize(query, answer)` | `python3 -m llmwikify synthesize --query "Q" --answer "A"` | Save query answer as wiki page |

  **Additional tools:** `wiki_graph`, `wiki_graph_analyze`, `wiki_sink_status`,
  `wiki_build_index`, `wiki_recommend`, `wiki_log`, `wiki_read_schema`,
  `wiki_update_schema`

  ### Tool Return Formats

  **wiki_read_page:**
  ```json
  {"page_name": "Page Name", "content": "# Page Name\n\nContent...", "has_sink": false}
  ```

  **wiki_search:**
  ```json
  [
    {"page_name": "Page A", "score": 0.95, "snippet": "...match...", "has_sink": true}
  ]
  ```

  **wiki_ingest:**
  ```json
  {
    "status": "success",
    "content_preview": "...",
    "detected_entities": ["Entity1", "Entity2"],
    "detected_relations": [{"source": "A", "target": "B", "relation": "uses"}]
  }
  ```

  **wiki_lint:**
  ```json
  {
    "issue_count": 5,
    "total_pages": 42,
    "broken_links": {"MissingPage": ["Page A", "Page B"]},
    "orphan_pages": ["Orphan Page"],
    "hints": {"broken_links": {"MissingPage": ["Page A"]}, "orphan_pages": ["Orphan Page"]}
  }
  ```

  ## CLI Command Reference

  ### Complete Command Syntax

  **Ingest (Agent Mode):**
  ```bash
  # Extract content — returns JSON to stdout
  python3 -m llmwikify ingest "raw/report.pdf"

  # Output format (parse this JSON):
  {
    "status": "success",
    "source_name": "report.pdf",
    "content_preview": "...",
    "detected_entities": ["Entity1"],
    "detected_relations": [{"source": "A", "target": "B", "relation": "uses"}]
  }
  ```

  **Write Page:**
  ```bash
  python3 -m llmwikify write_page "Topic" --type concept --content "# Topic\n\n## Summary\n..."
  python3 -m llmwikify write_page "Company Name" --type entity --content "# Company Name\n\n..."
  python3 -m llmwikify write_page "Black-Litterman" --type model --content "# Black-Litterman\n\n..."
  ```

  **Read Page:**
  ```bash
  python3 -m llmwikify read_page "Topic" --type concept
  ```

  **Search, Status, Lint:**
  ```bash
  python3 -m llmwikify search "keyword" --limit 10
  python3 -m llmwikify status
  python3 -m llmwikify lint --format recommendations
  ```

  ### Page Type → Directory Mapping

  The `--type` parameter maps to a directory based on wiki.md's **Page Types** table:

  | Type Parameter | Directory | Example |
  |---------------|-----------|---------|
  | `Source` | `sources/` | `write_page("report-slug", type="Source")` |
  | `Entity` | `entities/` | `write_page("Company Name", type="Entity")` |
  | `Concept` | `concepts/` | `write_page("Risk Parity", type="Concept")` |
  | Custom types | from wiki.md | Check Page Types table for your project |

  **How it works:**
  1. Code reads wiki.md's Page Types table
  2. Extracts directory from Location column (e.g., `wiki/concepts/{name}.md` → `concepts`)
  3. Maps type name → directory dynamically
  4. If type not found, uses lowercased type name as directory

  ### JSON Escaping Guide (for mcporter call)

  **Correct:**
  ```bash
  mcporter call service wiki_write_page --args '{"page_name": "Topic", "content": "# Topic\n\nContent", "page_type": "concept"}'
  ```

  **Wrong (common mistakes):**
  ```bash
  # Double quotes not escaped — shell may interpret
  mcporter call ... --args "{\"page_name\": \"Topic\"}"

  # Using double quotes for outer wrapper — shell may expand $variables
  mcporter call ... --args "{...}"

  # Including wiki/ prefix in page_name
  mcporter call ... --args '{"page_name": "wiki/concepts/Topic", ...}'  # WRONG
  ```

  ### Common Errors

  | Error | Cause | Fix |
  |-------|-------|-----|
  | `mcporter: command not found` | mcporter not installed | `pip install mcporter-bridge` |
  | JSON parse error on `--args` | Shell escaping issue | Use single quotes around JSON |
  | `Page not found` on read | Page doesn't exist yet | Create it — it's a broken link |
  | `page_name should NOT include 'wiki/'` | Used `wiki/` prefix | Remove prefix: use `"concepts/Topic"` not `"wiki/concepts/Topic"` |
  | Unknown page_type | Typo in type name | Check wiki.md Page Types table for valid types |

  ## Page Conventions

  ### Page Format

  Pages **should** include YAML frontmatter:

  ```yaml
  ---
  title: Page Title
  type: entity | concept | comparison | synthesis | claim | source-summary
  created: YYYY-MM-DD
  updated: YYYY-MM-DD
  sources: [source-file.md]
  tags: [tag1, tag2]
  ---
  ```

  ```markdown
  # Page Title

  ## Summary
  Brief overview of the topic.

  ## Details
  In-depth content with [[wikilinks]] to related pages.

  ## Sources
  - [Source: Article Title](raw/slugified-title.md)
  ```

  ### Wikilink Syntax

  Use `[[wikilink]]` for cross-references between wiki pages:

  | Syntax | Example | Result |
  |--------|---------|--------|
  | Basic | `[[Gold Mining]]` | Link to "Gold Mining" page |
  | Section | `[[Gold Mining#Types]]` | Link to "Types" section |
  | Alias | `[[Gold Mining|Gold Extraction]]` | Shows "Gold Extraction", links to "Gold Mining" |

  **Rules:**
  - Link to entities, concepts, and related topics
  - Update links when creating or modifying pages
  - **NEVER** use `[[raw/filename]]` — raw files are NOT wiki pages

  ### Page Naming Conventions

  **Language:**
  - **Use English** for page names and titles (enables consistent searching and linking)
  - **Keep original language** in page content (quotes, data, examples)
  - Example: `Huatai Asset Allocation Framework` (not `华泰大类资产配置策略体系`)

  **Format:**
  - Use Title Case with spaces: `Asset Allocation`, `Market Regime`
  - Use hyphens for slugs in paths: `wiki/models/risk-parity.md`
  - Avoid special characters: no `&`, `/`, `#`, `?`, etc.
  - Maximum length: 80 characters

  **Uniqueness:**
  - **Before creating a page, always search first:** `wiki_search("page name")`
  - If similar page exists → **update it**, don't create duplicate
  - Use `wiki_read_page("Page Name")` first to see existing content
  - If page name is ambiguous, add context: `Gold Pricing (Macro)` vs `Gold Pricing (Mining)`

  ### Source Citations

  Cite raw sources in wiki pages using **standard markdown links** (NOT wikilinks):

  **Page-level** (recommended for source pages):
  ```markdown
  ## Sources
  - [Source: Ghana's New Royalty Policy](raw/ghana-royalty.md)
  - [Source: Parliament Schedule](raw/parliament-schedule.md)
  ```

  **Inline** (recommended for entity/concept pages):
  ```markdown
  Ghana plans to implement a sliding scale royalty [Source](raw/ghana-royalty.md).
  ```

  **Format:** `[Source: Title](raw/filename)` — use relative paths from wiki root.
  Always cite the source when creating or updating wiki pages from ingested content.

  ### Special Pages

  **index.md:** Auto-updated content catalog. Do NOT edit manually.
  Lists all pages with one-line summaries. Use as query entry point.

  **log.md:** Append-only chronological record.
  Format: `## [YYYY-MM-DD HH:MM:SS] operation | details`
  Append after each significant operation.

  **overview.md:** Top-level synthesis. Revise as understanding deepens.
  Structure: current state, key themes (with wikilinks), working theses, open questions.

  ## Workflows

  ### 1. Ingest a Source

  ```bash
  # Step 1: Ingest the source file
  python3 -m llmwikify ingest raw/article.pdf
  # Output: JSON with content_preview, detected_entities, detected_relations

  # Step 2: Create source summary page (new API)
  python3 -m llmwikify write_page "article-title" --type source --content "# Article Title\n\n## Summary\n..."

  # Step 3: Create entity pages for new detected entities
  python3 -m llmwikify write_page "Company Name" --type entity --content "# Company Name\n\n## Description\n..."

  # Step 4: Create concept pages for new concepts
  python3 -m llmwikify write_page "Gold Royalty" --type concept --content "# Gold Royalty\n\n## Description\n..."

  # Step 5: Write graph relations (if any detected)
  python3 -m llmwikify graph write --relations '[{"source":"Company Name","target":"Gold Royalty","relation":"uses","confidence":"EXTRACTED"}]' --source-file raw/article.pdf

  # Step 6: Update overview if the big picture changed
  python3 -m llmwikify write_page "overview" --content "# Knowledge Base Overview\n\n..."

  # Step 7: Log the operation
  python3 -m llmwikify log --operation ingest --details "article.pdf"
  ```

  **MCP equivalent:**
  ```python
  wiki_ingest(source="raw/article.pdf")
  wiki_write_page(page_name="article-title", content="# Article Title\n\n...", page_type="Source")
  wiki_write_page(page_name="Company Name", content="# Company Name\n\n...", page_type="Entity")
  wiki_graph(action="write", relations=[{"source":"Company Name","target":"Gold Royalty","relation":"uses","confidence":"EXTRACTED"}], source_file="raw/article.pdf")
  ```

  **Troubleshooting:**
  - **No entities detected:** Review content manually, create pages for key topics you identify
  - **Page already exists:** Read existing page first, then update (append new info, don't overwrite)
  - **Source is URL:** Save URL content to `raw/` first, then ingest the local file

  ### 2. Answer a Query

  ```bash
  # Step 1: Search for relevant pages
  python3 -m llmwikify search "gold royalty Ghana" --limit 10
  # Output: JSON array of {page_name, score, snippet, has_sink}

  # Step 2: Read full content of relevant pages (new API)
  python3 -m llmwikify read_page "ghana-royalty" --type source
  # Output: JSON with {page_name, content, has_sink}

  # Step 3: If has_sink is true, read pending sink entries
  python3 -m llmwikify read_page "wiki/.sink/Query: Gold Royalty.sink.md"
  # Output: Pending answer entries from previous queries

  # Step 4: Synthesize answer and save
  python3 -m llmwikify synthesize \
    --query "What is Ghana's gold royalty policy?" \
    --answer "Ghana plans to implement a sliding scale royalty of 5%-12%..." \
    --source-pages "sources/ghana-royalty" \
    --raw-sources "raw/article.pdf" \
    --auto-link true \
    --auto-log true
  # Output: {page_created: "Query: Gold Royalty", status: "created" or "sunk"}
  ```

  **MCP equivalent:**
  ```python
  results = wiki_search(query="gold royalty Ghana", limit=10)
  page = wiki_read_page(page_name="ghana-royalty", page_type="Source")
  if page.get("has_sink"):
      sink = wiki_read_page(page_name="wiki/.sink/Query: Gold Royalty.sink.md")
  wiki_synthesize(query="What is Ghana's gold royalty policy?", answer="...", source_pages=["sources/ghana-royalty"], raw_sources=["raw/article.pdf"], auto_link=True, auto_log=True)
  ```

  **Decision flow:**
  - If search returns results → Read pages → Synthesize → Save with `wiki_synthesize`
  - If a "Query: Topic" page already exists → Your answer goes to `wiki/.sink/Query: Topic.sink.md` (status: "sunk")
  - If sink has pending entries → Read them → Merge into your answer → Use `update_existing=True`

  **Troubleshooting:**
  - **No search results:** The topic may not be covered yet. Create a new page with what you know, mark it as tentative
  - **Sink has many entries:** Periodically merge sink entries into the formal query page, then clear the sink:
    ```bash
    python3 -m llmwikify write_page "wiki/.sink/Query: Topic.sink.md" --content ""
    ```
  - **Similar query exists with different name:** Read both, merge into one, use `update_existing=True`

  ### 3. Create or Edit a Page

  ```bash
  # Create a new page (new API)
  python3 -m llmwikify write_page "New Entity" --type entity --content "# New Entity\n\n## Description\n...\n\n## Sources\n- [Source](raw/source.md)"

  # Edit an existing page
  # 1. Read current content (new API)
  python3 -m llmwikify read_page "Existing Entity" --type entity
  # 2. Modify content (append/update)
  # 3. Write back
  python3 -m llmwikify write_page "Existing Entity" --type entity --content "# Existing Entity\n\n## Description\n...updated...\n\n## New Section\n..."
  ```

  **MCP equivalent:**
  ```python
  wiki_write_page(page_name="New Entity", content="# New Entity\n\n...", page_type="Entity")
  ```

  **Rules:**
  - **NEVER create duplicate pages** — always search first with `wiki_search`
  - **Update existing pages** rather than creating new ones for same topic
  - **Use consistent naming** — same entity = same page name everywhere
  - **Add wikilinks** to connect to related pages
  - **Cite sources** in every page you create or update

  **Troubleshooting:**
  - **Page not found on read:** Create it — it's a broken link that needs fixing
  - **Write fails with error:** Check page_type is valid in wiki.md Page Types table
  - **Content looks wrong:** Read the page first, verify what exists, then write the full corrected content

  ### 4. Maintain Wiki Health

  ```bash
  # Step 1: Run health check
  python3 -m llmwikify lint --format recommendations
  # Output: {missing_pages: ["Page A"], orphan_pages: ["Page B"]}

  # Step 2: Fix broken links (create missing pages or remove links)
  python3 -m llmwikify write_page "Missing Page" --type entity --content "# Missing Page\n\n## Description\n..."

  # Step 3: Connect orphan pages (add wikilinks from other pages)
  python3 -m llmwikify read_page "Related Page" --type entity
  # Edit to add [[Orphan Page]] link
  python3 -m llmwikify write_page "Related Page" --type entity --content "...[[Orphan Page]]..."

  # Step 4: Check sink status
  python3 -m llmwikify sink-status
  # Output: JSON with pending entry counts per topic

  # Step 5: Check for recommendations (missing pages)
  python3 -m llmwikify search "" --limit 10
  # Or use wiki_recommend() via MCP
  ```

  **MCP equivalent:**
  ```python
  lint_result = wiki_lint(format="recommendations")
  missing = lint_result.get("missing_pages", [])
  orphans = lint_result.get("orphan_pages", [])
  wiki_sink_status()  # Check pending sinks
  wiki_recommend()    # Get missing page recommendations
  ```

  **Troubleshooting:**
  - **Many broken links:** Create the missing pages as stubs, then fill in content later
  - **Many orphans:** Add wikilinks from overview.md, synthesis pages, or related entities
  - **Sinks not merging:** Read each sink, synthesize into formal query page, then clear sink file
  - **Lint takes too long:** Run with `--format brief` for quick check, full for detailed report

  ### 5. Batch Ingest Strategy

  When processing many sources (>10 files), follow this strategy:

  **Optimal batch size: 3-5 files per session**
  - Too small (<3): Overhead of context switching dominates
  - Too large (>5): Error accumulation, hard to rollback, LLM context limits

  **Priority Decision Framework:**

  | Priority | Criteria | Action |
  |----------|----------|--------|
  | 🔴 Critical | Core framework + no existing coverage | Process first, create foundational pages |
  | 🟡 High | Core framework + some coverage OR macro drivers | Process second, enhance existing pages |
  | 🟢 Medium | Asset-specific or tactical strategies | Process third, add specialized knowledge |
  | 🔵 Low | Specialized strategies, risk management | Process after core concepts |
  | ⚪ Optional | Academic papers, historical data | Process last or skip if time-constrained |

  **Auto-Theme Classification Rules:**

  | Filename Pattern | Theme | Target Directory |
  |------------------|-------|------------------|
  | Institution + framework name | Core methodology | `methodology/` or `models/` |
  | Series name (e.g., "系列(3)") | Sequential content | Process in order (1→2→3) |
  | Model/framework name | Theoretical concept | `models/` or `concepts/` |
  | Asset name | Asset analysis | `assets/` or `entities/` |
  | Hash/UUID filename | Unknown | Read content, classify by topic |

  **Progress Checkpoints (after each batch):**
  1. Run `wiki_lint` → check for broken links, orphans
  2. Run `wiki_status` → verify page count increased correctly
  3. If lint errors > 0 → fix before proceeding
  4. If page count unchanged → check if files were duplicates

  **When to stop a batch:**
  - Encountered 2+ files that require deep analysis (>10k content chars)
  - Lint errors that can't be auto-fixed
  - User indicates priority shift

  **When to continue:**
  - Files are short (<5k chars) and similar theme
  - Lint passes cleanly
  - No user interruptions

  **Batch Execution Template:**
  ```
  📦 Batch N: [Theme Name]
     Files: [file1.pdf, file2.pdf, file3.pdf]
     Priority: [🔴/🟡/🟢/🔵/⚪]

     For each file:
     1. wiki_ingest(source="raw/filename.pdf")
     2. Analyze response:
        - detected_entities → create entity pages if new
        - detected_relations → note for graph writing
        - content_preview → determine page type and theme
     3. wiki_write_page for each new/updated page
     4. wiki_graph(action="write", relations=[...])
     5. wiki_log(operation="ingest", details="Processed: filename.pdf")

     After batch:
     1. wiki_lint → verify no broken links
     2. wiki_status → confirm pages added
     3. If errors: fix before next batch
     4. If clean: proceed to next batch
  ```

  **Unclassifiable Files:**
  - If filename is hash/UUID or contains no keywords → run `wiki_ingest` first
  - Determine theme from `content_preview`, not filename
  - Log: `wiki_log(operation="ingest", details="Categorized by content as: {theme}")`

  ## Page Format Examples

  ### Claim Page

  ```markdown
  ---
  title: Ghana will implement 5%-12% sliding gold royalty by 2026
  type: claim
  status: supported
  ---

  # Ghana Gold Royalty Reform

  ## Claim
  Ghana plans to replace flat royalty with 5%-12% sliding scale based on gold price.

  ## Supporting Evidence
  - [Source: Finance Minister Statement](raw/ghana-royalty.md): Finance minister confirmed the sliding scale.
  - [Source: Parliament Schedule](raw/parliament-schedule.md): Amendment takes effect in 21 days.

  ## Contradicting Evidence
  - [Source: Mining Lobby Response](raw/mining-lobby.md): Mining companies lobbying to delay implementation.
  ```

  Claim statuses: `supported` (multiple sources confirm), `contested` (conflicting evidence), `unverified` (single source).

  ### Entity Page

  ```markdown
  ---
  title: Ghana
  type: entity
  entity_type: organization
  ---

  # Ghana

  ## Description
  Africa's top gold producer, accounting for ~4% of global production.

  ## Sources
  - [Source: Ghana's New Royalty Policy](raw/ghana-royalty.md)

  ## Knowledge Graph Relations
  - **implements** → [[Gold Royalty Regime]]
  - **located_in** ← [[Africa]]
  - **top_producer** → [[Gold Mining]]
  ```

  ## Knowledge Graph

  The wiki maintains a knowledge graph of relations between concepts, stored in SQLite.

  ### Relation Types

  | Type | Meaning | Example |
  |------|---------|---------|
  | `is_a` | Taxonomic classification | "Gold **is_a** Precious Metal" |
  | `uses` | Dependency or tool usage | "Ghana **uses** Sliding Scale Royalty" |
  | `related_to` | General association | "Gold Mining **related_to** Environmental Impact" |
  | `contradicts` | Conflicting claims | "Claim A **contradicts** Claim B" |
  | `supports` | Reinforcing evidence | "Source **supports** Claim" |
  | `replaces` | Superseding | "New Policy **replaces** Old Policy" |
  | `optimizes` | Improvement | "Algorithm A **optimizes** Process B" |
  | `extends` | Builds on existing | "Framework A **extends** Framework B" |

  Add custom relation types by updating this file under "Custom Relation Types".

  ### Graph Operations

  ```bash
  # Query relations for a concept
  python3 -m llmwikify graph-query --concept "Gold Mining" --direction both
  # Output: {neighbors: {outgoing: [...], incoming: [...]}}

  # Write new relations
  python3 -m llmwikify graph write --relations '[{"source":"A","target":"B","relation":"uses","confidence":"EXTRACTED"}]' --source-file raw/article.pdf

  # Export graph visualization
  python3 -m llmwikify export-graph --format html --output graph.html
  # Opens interactive D3.js visualization in browser

  # Detect communities
  python3 -m llmwikify community-detect --algorithm leiden --resolution 1.0
  # Output: {communities: [{name: "Community 1", members: [...], score: 0.85}]}

  # Generate report of unexpected connections
  python3 -m llmwikify report --top 10
  ```

  **MCP equivalent:**
  ```python
  wiki_graph(action="query", concept="Gold Mining", direction="both")
  wiki_graph(action="write", relations=[{"source":"A","target":"B","relation":"uses","confidence":"EXTRACTED"}], source_file="raw/article.pdf")
  wiki_graph_analyze(action="export", format="html", output="graph.html")
  wiki_graph_analyze(action="detect", algorithm="leiden", resolution=1.0)
  wiki_graph_analyze(action="report", top=10)
  ```

  ## Query Page Naming

  - Auto-generated: `Query: {Topic}` (first 50 chars of query, title-cased)
  - If similar query exists: `Query: {Topic} (YYYY-MM-DD)` (date suffix)
  - Override with `page_name` parameter in `wiki_synthesize`
  - Use `update_existing=True` to revise an existing query page

  ## Query Sink

  When a query page already exists, new answers go to `wiki/.sink/` instead of creating duplicates.

  - Sink files: `wiki/.sink/Query: Topic.sink.md`
  - Format: chronological entries with timestamp, query, answer, sources
  - During health checks: use `wiki_sink_status()` to find sinks with pending entries
  - Read sinks: `wiki_read_page("wiki/.sink/Query: Topic.sink.md")`
  - After merging: clear with `wiki_write_page("wiki/.sink/Query: Topic.sink.md", content="")`

  ## Claims Tracking

  Claims originate from two sources:
  1. **Source ingest**: Detected during `wiki_ingest` → create `wiki/claims/{slug}.md`
  2. **Query sink**: Disputed claims in sink entries → append evidence to existing claim page

  When a claim's status changes, update the claim page and log the change.
  Use `wiki_sink_status()` to check for pending entries. Periodically merge into claim pages.

  ## Orphan Detection

  Pages with no inbound wikilinks are flagged as orphans. Exclusions:
  - Configure in `.wiki-config.yaml` under `orphan_detection.exclude_patterns`
  - Common exclusions: date pages, meeting notes, archive directories
  - `index.md` and `log.md` are always excluded

  ## index.md vs build_index

  - **index.md**: Content catalog — human-readable, query entry point. Lists all pages with summaries. Updated automatically on write.
  - **build_index**: Technical operation — rebuilds SQLite FTS5 full-text index and exports `reference_index.json`. Used by `wiki_search` under the hood.
  - **Query flow**: Read `index.md` first for overview → Use `wiki_search` to drill down → Use `wiki_read_page` for full content

  ## Troubleshooting

  ### Content Processing Issues

  | Problem | Check | Fix |
  |---------|-------|-----|
  | "Ingest JSON is too long" | Content truncated to 8,000 chars | Use `content_preview` + source knowledge |
  | "No entities detected" | Conceptual document | Review content manually, create pages for key topics |
  | "Too many files to process" | File count > 10 | Use batch strategy (3-5 files per session) |
  | "Page already exists" | Search before create | Read existing page, update instead of creating |

  ### Tool Call Issues

  | Problem | Check | Fix |
  |---------|-------|-----|
  | `mcporter call --args` JSON error | Shell escaping | Use single quotes: `--args '{"key": "value"}'` |
  | `wiki_write_page` fails | Subdirectory exists | Use `wiki/` prefix in page_name |
  | `wiki_read_page` returns nothing | Page doesn't exist | Create it — it's a broken link |
  | `wiki_search` returns nothing | Topic not covered | Create new page, mark as tentative |

  ### Health & Quality Issues

  | Problem | Check | Fix |
  |---------|-------|-----|
  | Many broken links | Lint results | Create missing pages as stubs |
  | Many orphan pages | Lint results | Add wikilinks from overview or related pages |
  | Sinks not merging | Sink status | Read sink, synthesize, clear: `wiki_write_page("wiki/.sink/...", content="")` |
  | Wiki disorganized | Graph analysis | Run `wiki_graph_analyze(action="detect")` to see structure |

  ## Best Practices

  1. **Cross-reference heavily** — The value is in the connections between pages
  2. **Update existing pages** — Never create duplicates; always search first
  3. **Note contradictions** — Flag when new information conflicts with existing content
  4. **Keep summaries current** — Update pages when facts change
  5. **Use consistent terminology** — Same entity = same page name everywhere
  6. **File answers back** — Good query responses become persistent wiki pages
  7. **Track claims** — Separate factual claims from interpretation; note confidence levels
  8. **Write graph relations** — Maintain the knowledge graph alongside pages
  9. **Cite sources** — Every claim should be traceable to a file in `raw/`
  10. **Log operations** — Append to `log.md` after significant changes
  11. **Batch process large sources** — Use 3-5 files per session with lint checkpoints
  12. **Start with core frameworks** — Process foundational concepts before specialized topics
  13. **English for page names** — Use English titles, keep original language in content
  14. **Search before creating** — Always check if page exists to avoid duplicates

  ## Configuration

  User configuration is in `.wiki-config.yaml`. Key settings:
  - `orphan_detection.exclude_patterns` — Regex for pages to exclude from orphan detection
  - `orphan_detection.exclude_frontmatter` — Frontmatter keys for exclusion
  - `orphan_detection.archive_directories` — Directory names to exclude

  **Do NOT modify `.wiki-config.yaml` unless explicitly asked by the user.**
