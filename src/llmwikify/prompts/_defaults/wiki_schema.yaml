name: wiki_schema
description: "Wiki maintenance instructions document shown to LLM via MCP. Defines conventions, workflows, and best practices."
version: "1.2"
trigger:
  type: "api_call"
  when: "read_schema"

params: {}

document: |
  # Wiki Schema

  > This document tells the LLM how to maintain this wiki.
  > Generated by llmwikify v{{ version }}

  ## Directory Structure

  ```
  root/
  ├── raw/                    # Immutable source documents (PDFs, URLs, exports)
  ├── wiki/                   # LLM-maintained markdown pages
  │   ├── index.md            # Content catalog (auto-updated)
  │   ├── log.md              # Chronological activity log
  │   ├── overview.md         # High-level synthesis (default created)
  │   ├── sources/            # Source summaries
  │   ├── entities/           # People, organizations, locations, products
  │   ├── concepts/           # Theories, frameworks, methods
  │   ├── comparisons/        # Side-by-side analyses
  │   ├── synthesis/          # Cross-source synthesis
  │   ├── claims/             # Specific claims with supporting/contradicting evidence
  │   └── .sink/              # Query answer buffers
  ├── wiki.md                 # This file - conventions and workflows
  └── .wiki-config.yaml       # User configuration
  ```

  ## Page Types

  Page types are **suggested conventions** to help organize knowledge. The LLM may create pages outside these types if the content warrants it.

  | Type | Location | Purpose |
  |------|----------|---------|
  | Source | `wiki/sources/{slug}.md` | Structured summary of an ingested source — key claims, data, quotes |
  | Entity | `wiki/entities/{name}.md` | Person, organization, location, product, event — anything with identity |
  | Concept | `wiki/concepts/{name}.md` | Theory, framework, method, idea |
  | Comparison | `wiki/comparisons/{a}-vs-{b}.md` | Side-by-side analysis of two or more entities or concepts |
  | Synthesis | `wiki/synthesis/{topic}.md` | Cross-source analysis on a theme or question |
  | Claim | `wiki/claims/{slug}.md` | Specific factual claim with supporting and contradicting evidence |
  | Overview | `wiki/overview.md` | Top-level narrative of the entire knowledge base |

  ### Claim Page Format

  Claims track specific factual statements and their evidentiary status:

  ```markdown
  ---
  title: Ghana will implement 5%-12% sliding gold royalty by 2026
  type: claim
  status: supported
  ---

  ## Claim
  Ghana plans to replace flat royalty with 5%-12% sliding scale based on gold price.

  ## Supporting Evidence
  - [Source 1](../sources/ghana-royalty.md): Finance minister confirmed the sliding scale.
  - [Source 2](../sources/parliament-schedule.md): Amendment takes effect in 21 days.

  ## Contradicting Evidence
  - [Source 3](../sources/mining-lobby.md): Mining companies lobbying to delay implementation.
  ```

  Claim statuses: `supported` (multiple sources confirm), `contested` (conflicting evidence), `unverified` (single source).

  ### Entity Page Format

  Entity pages should include a Knowledge Graph Relations section showing connections to other concepts:

  ```markdown
  ---
  title: Ghana
  type: entity
  entity_type: organization
  ---

  # Ghana

  ## Description
  Africa's top gold producer...

  ## Sources
  - [Source: Article Title](../sources/ghana-royalty.md)

  ## Knowledge Graph Relations
  - **implements** → [[Gold Royalty Regime]]
  - **located_in** ← [[Africa]]
  ```

  ## Page Format

  Pages **should** (but are not required to) include YAML frontmatter:

  ```yaml
  ---
  title: Page Title
  type: entity | concept | comparison | synthesis | claim | source-summary
  created: YYYY-MM-DD
  updated: YYYY-MM-DD
  sources: [source-file.md]
  tags: [tag1, tag2]
  ---
  ```

  Body conventions:
  - Start with `# Title` matching page name
  - Use `## Section` headers for organization
  - Use `[[wikilink]]` syntax for cross-references
  - Cite sources using standard markdown links (NOT wikilinks)
  - Keep pages focused on one topic

  ## Conventions

  ### Page Naming
  - Use descriptive, meaningful names: `Topic Name`, `Entity Name`
  - Avoid special characters; use hyphens for spaces if needed
  - The LLM owns the wiki/ directory; humans own the raw/ directory

  ### Linking
  - Use `[[wikilink]]` syntax for cross-references between wiki pages
  - Link to entities, concepts, and related topics
  - Update links when creating or modifying pages
  - Section links: `[[Page Name#Section]]`
  - Display text: `[[Page Name|Custom Display]]`

  ### Source Citations
  - Cite raw sources in wiki pages using standard markdown links (NOT wikilinks)
  - Raw files are NOT wiki pages — never use `[[raw/filename]]` syntax
  - Two approaches — choose based on context:
    - **Page-level**: Add `## Sources` section at page end listing all sources
      ```markdown
      ## Sources
      - [Source: Article Title](raw/slugified-title.md)
      - [Source: research-paper.pdf](raw/research-paper.pdf)
      ```
    - **Inline**: Add citations after key claims `[Source](raw/filename)`
  - Format: `[Source: Title](raw/filename)` — use relative paths from wiki root
  - When ingesting a new source, cite it in every wiki page you create or update

  ### index.md
  - Auto-updated on each page write
  - Lists all pages with one-line summaries
  - Do NOT edit manually

  ### index.md vs build_index
  - **index.md**: Content catalog — human-readable, LLM query entry point. Lists all pages with one-line summaries. Updated automatically on write.
  - **build_index**: Technical operation — rebuilds SQLite FTS5 full-text index and exports `reference_index.json` (bidirectional link graph). Used by `wiki_search` under the hood.
  - Query flow: Read `index.md` first for overview → Use `wiki_search` to drill down → Use `wiki_read_page` for full content

  ### log.md
  - Append-only chronological record
  - Format: `## [timestamp] operation | details`
  - Append entry after each significant operation

  ### overview.md
  - Top-level synthesis of the entire knowledge base
  - Created by default during wiki initialization
  - Structure: current state, key themes (with wikilinks), working theses, open questions
  - Revise as sources are ingested and understanding deepens

  ## Knowledge Graph

  The wiki maintains a knowledge graph of relations between concepts, stored in SQLite and queryable via MCP tools.

  ### Relation Types

  The following relation types are defined for this wiki. The LLM should use these when writing relations via `wiki_graph(action="write")`:

  - `is_a` — taxonomic (e.g., "Gold **is_a** Precious Metal")
  - `uses` — dependency or tool usage
  - `related_to` — general association
  - `contradicts` — conflicting claims or ideas
  - `supports` — reinforcing evidence
  - `replaces` — superseding relationship
  - `optimizes` — improvement relationship
  - `extends` — builds on existing concept

  Domain-specific relation types may be added by updating this file. Document new types under a "Custom Relation Types" section.

  ### Entity Pages and Graph Integration

  - Entity pages should include a "Knowledge Graph Relations" section showing connections
  - Graph visualization nodes link to corresponding entity pages (if they exist)
  - Use `wiki_graph(action="query", concept="Name")` to find relations for an entity
  - Use `wiki_graph(action="write", relations=[...])` to add new relations
  - Use `wiki_graph_analyze(action="export")` to generate visualizations

  ### Graph Visualization

  - Use `wiki_graph_analyze(action="export", format="html")` for interactive visualization
  - Nodes with corresponding entity pages are clickable
  - Community detection (`wiki_graph_analyze(action="detect")`) groups related concepts

  ## Workflows

  ### Ingest a Source

  1. Use `wiki_ingest(source="raw/{file}")` to read the source — returns full content, detected entities, and relations
  2. Review `detected_entities` and `detected_relations` in the ingest response
  3. Create/update wiki pages:
     - `wiki/sources/{slug}.md` — source summary (always create)
     - `wiki/entities/{name}.md` — for new entities detected
     - `wiki/concepts/{name}.md` — for new concepts identified
     - `wiki/claims/{slug}.md` — for specific factual claims
  4. Write graph relations: `wiki_graph(action="write", relations=[...])`
  5. Add `[[wikilinks]]` to connect related pages
  6. Update index.md (automatic on write)
  7. Append to log.md: `## [timestamp] ingest | Source Name`
  8. Review overview.md — revise if the big picture has changed

  ### Answer a Query
  1. Search wiki using `wiki_search` to find relevant pages
  2. Read relevant pages using `wiki_read_page` for full context
  {% raw %}
      - If results show `has_sink: true`, also read the sink file: `wiki_read_page("wiki/.sink/{{Topic}}.sink.md")`
  {% endraw %}
  3. Synthesize answer with citations to wiki pages and raw sources
  4. **Save the answer back to the wiki** using `wiki_synthesize`:
  {% raw %}
     - Provide the original query and your answer content
     - Include `source_pages` (wiki pages you referenced)
     - Include `raw_sources` (raw source files, e.g., `raw/article.md`)
     - The tool auto-creates a `Query: {{topic}}` page with a structured Sources section
  {% endraw %}
     - The tool auto-logs to log.md (disable with `auto_log=False`)
  5. If a similar query page exists:
     - Your answer will be saved to the sink (status: "sunk")
  {% raw %}
     - Read the existing page first: `wiki_read_page("Query: {{topic}}")`
      - Read pending sink entries: `wiki_read_page("wiki/.sink/Query: {{topic}}.sink.md")`
  {% endraw %}
     - Synthesize a comprehensive answer combining both, then use `update_existing=True`
  6. Query answers compound in the knowledge base — they become persistent wiki pages just like ingested sources

  ### Query Sink
   - When a similar query page exists, new answers go to `wiki/.sink/` instead of creating duplicates
   - Sink files: `wiki/.sink/Query: Topic.sink.md` — one per formal query page
  - Format: chronological entries with timestamp, query, answer, and sources
  - Each sink file links to its formal page via frontmatter (`formal_page`)
  - Formal pages link to their sink via frontmatter (`sink_path`, `sink_entries`)
  - During lint: use `wiki_sink_status` to find sinks with pending entries
   - Read sinks with `wiki_read_page("wiki/.sink/Query: Topic.sink.md")`
   - After merging, clear sinks with `wiki_write_page("wiki/.sink/Query: Topic.sink.md", content)`

  ### Claims Tracking

  Claims can originate from two sources:
  1. **Source ingest**: LLM detects specific factual claims during `wiki_ingest` → create `wiki/claims/{slug}.md`
  2. **Query sink**: Answers in sink buffer contain disputed claims → append evidence to existing claim page

  When a claim's status changes (e.g., new source contradicts), update the claim page and log the change.

  Use `wiki_sink_status` to check for pending entries. Periodically merge relevant entries into claim pages.

  ### Query Page Naming
  {% raw %}
  - Auto-generated: `Query: {{Topic}}` (first 50 chars of query, title-cased)
  - If a similar query page exists, a date suffix is added: `Query: {{Topic}} (2026-04-10)`
  {% endraw %}
  - Use `page_name` parameter to override the auto-generated name
  - Use `update_existing=True` to revise an existing query page instead of creating a new one

  ### Maintain Wiki Health
  1. Run lint periodically to check for:
     - Broken links (links to non-existent pages)
     - Orphan pages (no inbound links)
  2. Fix broken links by creating missing pages or removing links
  3. Connect orphan pages by adding references from other pages
  4. Run recommend to find missing pages that are frequently referenced
  5. Append to log.md: `## [timestamp] lint | Results`

  ## Orphan Detection

  Pages with no inbound links are flagged as orphans. Some pages may be excluded:
  - Configure exclusions in `.wiki-config.yaml`
  - Common exclusions: date pages, meeting notes, archive directories
  - index.md and log.md are always excluded

  ## Best Practices

  1. **Cross-reference heavily** - The value is in the connections
  2. **Update existing pages** - Don't create duplicates
  3. **Note contradictions** - Flag when new info conflicts with old
  4. **Keep summaries current** - Update when facts change
  5. **Use consistent terminology** - Same entity = same page name
  6. **File answers back** - Good query responses become wiki pages
  7. **Track claims** - Separate factual claims from interpretation; note confidence levels
  8. **Write graph relations** - Use wiki_graph to maintain the knowledge graph alongside pages

  ## Configuration

  User configuration is in `.wiki-config.yaml`. Key settings:
  - `orphan_detection.exclude_patterns` - Regex for pages to exclude
  - `orphan_detection.exclude_frontmatter` - Frontmatter keys for exclusion
  - `orphan_detection.archive_directories` - Directory names to exclude

  Do NOT modify `.wiki-config.yaml` unless explicitly asked by the user.
