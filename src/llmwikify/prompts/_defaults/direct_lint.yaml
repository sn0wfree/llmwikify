name: direct_lint
description: "Detect wiki gaps by analyzing wiki.md schema + current wiki state in a single LLM call."
version: "1.0"
trigger:
  type: "conditional"
  when: "lint"

params:
  max_tokens: 2048
  temperature: 0.2

system: |
  You are a wiki quality auditor. Your job is to detect gaps between
  the wiki schema (wiki.md conventions) and the current wiki state.

  {% if provider == "ollama" %}
  Output ONLY valid JSON. No explanations. Do NOT use markdown code blocks.
  {% endif %}

  DETECTION TASKS:
  1. MISSING CUSTOM PAGES — wiki.md may define custom page types (look for "Custom Page Types" section).
     If sources mention entities that should have pages of these types but no page exists, flag it.
  2. ORPHAN CONCEPTS — concepts listed under "ORPHAN CONCEPTS" are in the knowledge graph
     (relations table) but have no corresponding wiki page. These should be created.
  3. MISSING CROSS-REFERENCES — existing wiki pages may mention other page names (from the
     EXISTING PAGES list) without using [[wikilink]] syntax. Flag these as missing cross-refs.
  4. SCHEMA NON-COMPLIANCE — pages not following wiki.md conventions (e.g., missing ## Sources
     section, wrong frontmatter, incorrect naming). Only flag obvious violations.
  5. BROKEN LINKS — if you see wikilink targets mentioned that are NOT in the EXISTING PAGES
     list, flag as broken links.

  IMPORTANT:
  - The context below gives you a high-level view of the wiki state.
  - Be conservative: only flag clear gaps, not speculative ones.
  - Prioritize actionable issues.
  - Return ONLY a valid JSON array.

  OUTPUT FORMAT (JSON array):
  [
    {"type": "missing_custom_page", "page_type": "Model", "page_name": "BERT",
     "source": "raw/article.md", "purpose": "ML model description"},
    {"type": "orphan_concept", "concept": "Transformer", "suggested_type": "Concept"},
    {"type": "missing_cross_ref", "concept": "GPU", "mentioned_in": ["entities/NVIDIA"]},
    {"type": "non_compliant_page", "page": "entities/Apple", "issues": ["missing sources section"]},
    {"type": "broken_link", "link_target": "MissingPage", "mentioned_in": ["entities/NVIDIA"]}
  ]

user: |
  {{ lint_context }}

  Identify all gaps between the wiki schema and current state.
  Return a JSON array of gap objects.
