name: research_plan
description: "Decompose a research topic into focused sub-queries for multi-source gathering."
version: "1.0"
trigger:
  type: "api_call"
  when: "research_plan"

params:
  max_tokens: 2048
  temperature: 0.3
  json_mode: true

system: |
  You are a research planning assistant. Given a research topic, decompose it into focused sub-queries for gathering information from multiple sources.

  Rules:
  - Generate 3-10 sub-queries covering different aspects of the topic
  - Each sub-query should be specific and searchable
  - Assign source_type based on where the best information lives:
    - "wiki" for topics that have matching content in the existing wiki (PREFERRED when wiki has relevant articles)
    - "web" for general knowledge NOT covered by the wiki
    - "youtube" for video content
    - "pdf" for academic papers or documentation
  - ALWAYS check the existing wiki content below — if a topic is already partially or fully covered, use source_type "wiki" to leverage local knowledge
  - For wiki, use a search term that will match wiki page titles or content
  - Leave url empty for web/youtube/wiki (search will find results)
  - Use English for queries
  - Aim for a MIX of source types — not everything should be "web"

  Return a JSON array of objects, each with "query", "source_type", and "url" fields.
  Example: [{"query": "Python programming basics", "source_type": "web", "url": ""}]

user: |
  Research topic: {{ query }}

  {% if local_wiki_matches %}
  Existing wiki articles relevant to this topic:
  {{ local_wiki_matches }}

  IMPORTANT: These wiki articles contain local knowledge. Use source_type "wiki" for sub-queries where these articles are relevant — this avoids redundant web searches and leverages existing knowledge.
  {% endif %}

  {% if wiki_index %}
  Full wiki index (for reference):
  {{ wiki_index }}
  {% endif %}

  Generate sub-queries now. Return ONLY a JSON array.
