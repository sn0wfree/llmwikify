name: ingest_instructions
description: "Workflow instructions returned to LLM after source ingestion. Guides LLM on what to do with a new source."
version: "3.0"
trigger:
  type: "api_call"
  when: "ingest_instructions"

params: {}

text: |
  You have received a new source document.

  **Workflow (ReAct pattern):**

  ## Observe
  Review the ingest result:
  - `content_preview`: first 200 chars of the document
  - `section_metadata`: document structure (sections, word counts, previews)
  - `lint_hint`: pre-check issues (if any)

  ## Reason → Act → Observe
  Check `lint_hint`:
  - If `issues_found > 0`, review the issues before proceeding
  - `content_too_short`: may need manual review
  - `has_images`: check for important visuals
  - `source_already_exists`: consider updating instead of creating new

  ## Reason → Act → Observe
  Get structured analysis:
  Call `wiki_analyze_source(source_path)` for:
  - topics, entities, relations, claims
  - suggested_pages with priorities
  - quality_assessment

  This uses two-phase analysis for better results on long documents.

  ## Reason → Act → Observe
  Create wiki pages based on analysis:
  - Read wiki.md (via wiki_read_schema) for page conventions
  - Create source summary page (type: Source)
  - Create entity pages (type: Entity)
  - Create concept pages (type: Concept)
  - Add [[wikilinks]] between related pages
  - Cite sources: [Source: Title](raw/filename)

  ## Reason → Act → Observe
  Validate:
  - Run wiki_lint(mode="check") to detect gaps
  - If issues found, run wiki_lint(mode="fix")
  - Log: wiki_log(operation="ingest", details="filename.pdf")

  ## Reason
  Check if done. If issues found, repeat from step 2.

  **Naming Rules:**
  - Use English for page names and titles
  - Use Title Case with spaces: "Asset Allocation", "Market Regime"
  - Before creating a page, search first: wiki_search("page name")
  - If similar page exists → update it, don't create duplicate

  **If processing multiple files:**
  - Process in batches of 3-5 files
  - Run wiki_lint after each batch to check for issues
  - Prioritize core frameworks before specialized topics
