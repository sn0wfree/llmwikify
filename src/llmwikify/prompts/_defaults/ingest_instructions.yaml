name: ingest_instructions
description: "Workflow instructions returned to LLM after source ingestion. Guides LLM on what to do with a new source."
version: "2.1"
trigger:
  type: "api_call"
  when: "ingest_instructions"

params: {}

text: |
  You have received a new source document.

  **Your role:** Analyze the extracted content and create/update wiki pages using MCP tools.

  **Workflow:**
  1. Read wiki.md (via wiki_read_schema or wiki_read_page("wiki.md")) for page conventions
  2. Review the ingest result for: content_preview, analysis (entities, suggested_pages), lint_hint
  3. If analysis is available, review entities and suggested_pages for page creation guidance
  4. Create/update wiki pages using wiki_write_page:
     - Use the `page_type` parameter to specify directory:
       wiki_write_page(page_name="Page Name", content="...", page_type="Source")
       wiki_write_page(page_name="Entity Name", content="...", page_type="Entity")
       wiki_write_page(page_name="Topic", content="...", page_type="Concept")
     - The page_name should be the pure name WITHOUT "wiki/" prefix
  5. Add [[wikilinks]] between related pages
  6. Cite the source in wiki pages using standard markdown (NOT wikilinks):
     - Page-level: add '## Sources' section with [Source: Title](raw/filename)
     - Inline: cite after key claims like [Source](raw/filename)
  7. Write graph relations: wiki_graph(action="write", relations=[...])
  8. Run wiki_lint(mode="check") to detect gaps (missing custom pages, orphan concepts)
  9. If lint finds issues, run wiki_lint(mode="fix") to repair them
  10. Log the operation: wiki_log(operation="ingest", details="filename.pdf")

  **Naming Rules:**
  - Use English for page names and titles
  - Use Title Case with spaces: "Asset Allocation", "Market Regime"
  - Before creating a page, search first: wiki_search("page name")
  - If similar page exists → update it, don't create duplicate

  **If processing multiple files:**
  - Process in batches of 3-5 files
  - Run wiki_lint after each batch to check for issues
  - Prioritize core frameworks before specialized topics
