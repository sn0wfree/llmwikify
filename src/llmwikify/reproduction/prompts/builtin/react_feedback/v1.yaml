feedback_template: "[ReAct OBSERVE] Your previous code failed at stage: {stage}\n\n\
  Error:\n{error}\n\n{context}\n\n## FIX GUIDE\n\n### If \"truth value of an Expr\
  \ is ambiguous\":\nYou used Python `if/and/or` on a polars expression. This is NOT\
  \ allowed.\n\nBEFORE (broken):\n```python\nif rank(pl.col('a')) < rank(pl.col('b')):\n\
  \    factor = -1\nelse:\n    factor = 0\n```\n\nAFTER (fixed):\n```python\nfactor\
  \ = pl.when(rank(pl.col('a')) < rank(pl.col('b'))).then(-1).otherwise(0)\n```\n\n\
  Also replace:\n- `expr and expr` → `expr & expr`\n- `expr or expr` → `expr | expr`\n\
  - `not expr` → `~expr`\n\n### If \"TimeoutError\":\nYour code has an infinite loop\
  \ or too-slow computation.\n- Use `with_columns()` to materialize intermediate results\n\
  - Avoid nested rolling operations without materialization\n\n### If \"NameError:\
  \ name 'xxx' is not defined\":\nCheck operator name. Available: rolling_*, ts_*,\
  \ rank, scale, neutralize, etc.\n\n### General rules:\n- Use FUNCTION FORM: `rolling_std(pl.col('x'),\
  \ window=20)` NOT `pl.col('x').rolling_std(...)`\n- Use `.over('date')` for cross-section\
  \ operators (rank, scale, etc.)\n- Use `neutralize(f, group=pl.col('industry'))`\
  \ for industry neutralization\n\nOutput ONLY the corrected code block, no prose."
