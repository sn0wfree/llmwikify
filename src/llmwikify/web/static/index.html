<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>llmwikify</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div id="app">
        <!-- Top bar: logo + page title + search -->
        <nav id="topbar">
            <div class="topbar-left">
                <span class="logo">llmwikify</span>
                <span class="breadcrumb">
                    <span class="separator">/</span>
                    <span id="current-page-name" class="page-name">Home</span>
                    <span id="unsaved-dot" class="unsaved-dot" title="Unsaved changes"></span>
                </span>
            </div>
            <div class="topbar-center">
                <div class="search-box">
                    <input type="search" id="search-input" placeholder="Search wiki... (Ctrl+K)" autocomplete="off">
                    <div id="search-results" class="search-results hidden"></div>
                </div>
            </div>
            <div class="topbar-right">
                <button id="btn-new" class="btn btn-icon" title="New page">+</button>
                <button id="btn-graph" class="btn btn-icon" title="Graph view">◉</button>
            </div>
        </nav>

        <!-- Left sidebar: file tree -->
        <aside id="sidebar">
            <div id="file-tree" class="tree"></div>
            <div id="sidebar-footer">
                <div class="panel-section">
                    <h3>Wiki Health</h3>
                    <div id="health-status" class="health-status">
                        <span class="health-item">
                            <span class="health-dot dot-ok" id="health-broken-dot"></span>
                            <span id="health-broken-text">Checking...</span>
                        </span>
                        <span class="health-item">
                            <span class="health-dot dot-ok" id="health-orphans-dot"></span>
                            <span id="health-orphans-text">Checking...</span>
                        </span>
                    </div>
                </div>
                <div class="panel-section">
                    <h3>Sink Status</h3>
                    <div id="sink-status" class="sink-status">
                        <span class="sink-item">Loading...</span>
                    </div>
                </div>
                <div class="panel-section">
                    <h3>Recommendations</h3>
                    <div id="recommendations" class="recommendations">
                        <span class="rec-item">Loading...</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main content area -->
        <main id="content">
            <!-- View mode tabs -->
            <div id="view-tabs">
                <button class="tab active" data-view="preview">Preview</button>
                <button class="tab" data-view="edit">Edit</button>
                <button class="tab" data-view="split">Split</button>
            </div>

            <!-- Preview pane -->
            <div id="preview-pane" class="pane">
                <div id="preview-content"></div>
            </div>

            <!-- Edit pane -->
            <div id="edit-pane" class="pane hidden">
                <div id="editor-toolbar">
                    <button data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
                    <button data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
                    <button data-cmd="code" title="Inline Code">`</button>
                    <button data-cmd="codeblock" title="Code Block">```</button>
                    <button data-cmd="link" title="Wikilink">[[ ]]</button>
                    <button data-cmd="heading" title="Heading">#</button>
                    <button data-cmd="list" title="List">•</button>
                    <button data-cmd="table" title="Table">⊞</button>
                </div>
                <textarea id="editor" spellcheck="false" placeholder="Start editing..."></textarea>
            </div>
        </main>

        <!-- Right sidebar: backlinks -->
        <aside id="backlinks-panel">
            <div class="panel-section">
                <h3>Backlinks</h3>
                <div id="backlinks-list" class="links-list"></div>
            </div>
            <div class="panel-section">
                <h3>Outgoing</h3>
                <div id="outgoing-list" class="links-list"></div>
            </div>
        </aside>
    </div>

    <!-- Graph view modal -->
    <div id="graph-modal" class="modal hidden">
        <div class="modal-content modal-graph">
            <div class="modal-header">
                <h2>Knowledge Graph</h2>
                <div class="graph-toolbar">
                    <button id="btn-graph-refresh" class="btn btn-small" title="Refresh graph">↻</button>
                    <input type="text" id="graph-search" class="input-small" placeholder="Search nodes...">
                    <button id="btn-graph-filter" class="btn btn-small" title="Filter by degree">◆</button>
                </div>
                <button id="btn-close-graph" class="btn-close">&times;</button>
            </div>
            <div id="graph-container">
                <svg id="graph-svg"></svg>
                <div id="graph-tooltip" class="graph-tooltip hidden"></div>
            </div>
            <div class="graph-legend">
                <div class="legend-item">
                    <span class="legend-dot dot-entity"></span> Entity (has page)
                </div>
                <div class="legend-item">
                    <span class="legend-dot dot-concept"></span> Concept
                </div>
                <div class="legend-item">
                    <span class="legend-line line-wikilink"></span> Wikilink
                </div>
                <div class="legend-item">
                    <span class="legend-line line-relation"></span> Relation
                </div>
            </div>
        </div>
    </div>

    <!-- New page modal -->
    <div id="new-page-modal" class="modal hidden">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>New Page</h2>
                <button id="btn-close-new" class="btn-close">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="new-page-name" placeholder="Page name..." class="input-full">
                <div class="modal-actions">
                    <button id="btn-create-page" class="btn btn-primary">Create</button>
                    <button id="btn-cancel-new" class="btn">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/lib/marked.min.js"></script>
    <script src="/lib/d3.min.js"></script>
    <script src="/js/graph.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
