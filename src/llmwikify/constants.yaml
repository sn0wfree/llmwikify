# llmwikify Default Constants
# These values can be overridden by .wiki-config.yaml in the wiki root directory

# Directory structure
directories:
  raw: "raw"
  wiki: "wiki"

# Core files
files:
  index: "index.md"
  log: "log.md"
  config: ".wiki-config.yaml"
  config_example: ".wiki-config.yaml.example"

# Database
database:
  name: ".llmwikify.db"
  
# Reference index
reference_index:
  name: "reference_index.json"
  auto_export: true

# Default exclusion patterns for orphan detection
orphan_detection:
  default_exclude_patterns:
    - "^\\d{4}-\\d{2}-\\d{2}$"  # Date format: 2025-07-31
    - "^\\d{4}-\\d{2}$"        # Month format: 2025-07
    - "^\\d{4}-Q[1-4]$"        # Quarter format: 2025-Q1
  
  exclude_frontmatter:
    - "redirect_to"
  
  archive_directories:
    - "archive"
    - "logs"
    - "history"

# Performance settings
performance:
  batch_size: 100
  cache_size: 64000  # SQLite cache size in KB

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
