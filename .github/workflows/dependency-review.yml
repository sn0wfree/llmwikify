name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Warn on major version bumps and license issues, but don't block merge.
          fail-on-severity: moderate
          comment-summary-in-pr: always
          # Only check our own dependency files
          files: |
            pyproject.toml
            requirements*.txt
            src/**/requirements*.txt
