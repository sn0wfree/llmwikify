name: Release Drafter

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Tag will be auto-suggested from latest semver tag on the repo.
          # Update here when bumping major version.
          name-template: "v$RESOLVED_VERSION"
          tag-template: "v$RESOLVED_VERSION"
          version-resolver:
            major:
              - "v0\\.38\\.0"
            minor:
              - "v0\\.38\\.0"
            patch:
              - "v0\\.38\\.0"
            default: "v0.38.0"
          categories:
            - title: "🚀 Features"
              labels:
                - "feature"
                - "enhancement"
                - "feat"
            - title: "🐛 Bug Fixes"
              labels:
                - "bug"
                - "fix"
                - "bugfix"
            - title: "📝 Documentation"
              labels:
                - "docs"
                - "documentation"
            - title: "🧪 Tests"
              labels:
                - "test"
                - "tests"
            - title: "🔧 Maintenance"
              labels:
                - "chore"
                - "refactor"
                - "ci"
                - "build"
            - title: "Other Changes"
              labels:
                - "*"
          change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
          template: |
            ## Changes

            $CHANGES

            ## Contributors

            $CONTRIBUTORS

            ---

            This release was drafted by [release-drafter](https://github.com/release-drafter/release-drafter).
            To publish: edit the version tag, fill in any highlights, then click "Publish release".
            The `publish.yml` workflow will then build and upload to PyPI automatically.
          exclude-contributors: []
