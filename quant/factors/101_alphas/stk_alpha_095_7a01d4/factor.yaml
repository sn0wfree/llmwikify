l5:
  code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv40 = mean(volume,\
    \ 40) (standard Alpha101 definition)\n    df = df.with_columns(\n        rolling_mean(pl.col('volume'),\
    \ window=40).alias('_adv40')\n    )\n    # ts_min(open, 12)\n    df = df.with_columns(\n\
    \        ts_min(pl.col('open'), window=12).alias('_ts_min_open')\n    )\n    #\
    \ Left side: rank(open - ts_min(open, 12))\n    df = df.with_columns(\n      \
    \  rank(pl.col('open') - pl.col('_ts_min_open')).over('date').alias('_left')\n\
    \    )\n    # sum((high+low)/2, 19) and sum(adv40, 19)\n    df = df.with_columns(\n\
    \        rolling_sum((pl.col('high') + pl.col('low')) / 2, window=19).alias('_sum_hl'),\n\
    \        rolling_sum(pl.col('_adv40'), window=19).alias('_sum_adv')\n    )\n \
    \   # correlation(sum_hl, sum_adv, 12)\n    df = df.with_columns(\n        rolling_corr(pl.col('_sum_hl'),\
    \ pl.col('_sum_adv'), window=12).alias('_corr')\n    )\n    # rank(corr) ^ 5\n\
    \    df = df.with_columns(\n        (rank(pl.col('_corr')).over('date') ** 5).alias('_rp')\n\
    \    )\n    # ts_rank(rp, 11)\n    df = df.with_columns(\n        ts_rank(pl.col('_rp'),\
    \ window=11).alias('_right')\n    )\n    # Final comparison\n    factor = pl.when(pl.col('_left')\
    \ < pl.col('_right')).then(1).otherwise(0)\n    return df.select(factor).to_series()"
