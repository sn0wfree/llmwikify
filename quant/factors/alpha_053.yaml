      \    low = pl.col('low')\n    high = pl.col('high')\n\n    numerator = (close\
      \ - low) - (high - close)\n    denominator = close - low\n    inner = numerator\
      \ / denominator\n\n    # Apply delta with periods=9\n    d = delta(inner, periods=9)\n\
      \n    # Multiply by -1\n    factor = -1 * d\n\n    return df.select(factor).to_series()"
