  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv50: 50-day\
      \ rolling mean of volume (per code, since df is already sorted by code,date)\n\
      \    adv50 = rolling_mean(pl.col('volume'), window=50)\n\n    # First rolling\
      \ correlation: vwap vs volume, window ~ 4.24304\n    corr1 = rolling_corr(pl.col('vwap'),\
