  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # df is already\
      \ sorted by (code, date); do NOT re-sort\n\n    # adv60: 60-day rolling mean\
      \ of volume (proxy for adv60)\n    adv60 = rolling_mean(pl.col('volume'), window=60)\n\
      \n    # sum((high + low) / 2, 20)\n    mid_price = (pl.col('high') + pl.col('low'))\
      \ / 2\n    sum_mid = rolling_sum(mid_price, window=20)\n\n    # sum(adv60, 20)\n\
      \    sum_adv60 = rolling_sum(adv60, window=20)\n\n    # correlation(sum_mid,\
      \ sum_adv60, 9)\n    corr1 = rolling_corr(sum_mid, sum_adv60, window=9)\n\n\
      \    # rank(corr1) cross-section\n    rank1 = rank(corr1).over('date')\n\n \
      \   # correlation(low, volume, 6)\n    corr2 = rolling_corr(pl.col('low'), pl.col('volume'),\
      \ window=6)\n\n    # rank(corr2) cross-section\n    rank2 = rank(corr2).over('date')\n\
      \n    # (rank1 < rank2) * -1  → -1 if true, else 0\n    factor = pl.when(rank1\
      \ < rank2).then(pl.lit(-1)).otherwise(pl.lit(0))\n\n    return df.select(factor).to_series()"
