  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    df = df.sort(['code',\
      \ 'date'])\n\n    # Part A: rank(rank(rank(decay_linear((-1 * rank(rank(delta(close,\
      \ 10)))), 10))))\n    delta_10 = delta(pl.col('close'), periods=10)\n    rr_delta\
      \ = rank(rank(delta_10).over('date')).over('date')\n    neg_rr = -1 * rr_delta\n\
      \    decayed = decay_linear(neg_rr, window=10)\n    part_a = rank(rank(rank(decayed).over('date')).over('date')).over('date')\n\
      \n    # Part B: rank((-1 * delta(close, 3)))\n    delta_3 = delta(pl.col('close'),\
      \ periods=3)\n    part_b = rank((-1 * delta_3)).over('date')\n\n    # Part C:\
      \ sign(scale(correlation(adv20, low, 12)))\n    adv20 = ts_mean(pl.col('volume'),\
      \ window=20)\n    corr = correlation(adv20, pl.col('low'), window=12)\n    part_c\
      \ = scale(corr).over('date').sign()\n\n    factor = (part_a + part_b) + part_c\n\
      \n    return df.select(factor).to_series()"
