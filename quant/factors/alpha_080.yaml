  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Weighted price:\
      \ open * 0.868128 + high * 0.131872\n    weighted_price = (pl.col('open') *\
      \ 0.868128) + (pl.col('high') * (1 - 0.868128))\n    \n    # Industry neutralize\
      \ (use neutralize as proxy since no industry column)\n    neutralized = neutralize(weighted_price)\n\
      \    \n    # Delta with 4 periods (from 4.04545)\n    delta_val = delta(neutralized,\
      \ periods=4)\n    \n    # Sign of delta\n    signed = delta_val.sign()\n   \
      \ \n    # Cross-sectional rank\n    rank_val = rank(signed).over('date')\n \
      \   \n    # adv10: 10-day average daily volume\n    adv10 = rolling_mean(pl.col('volume'),\
      \ window=10)\n    \n    # Correlation between high and adv10 with window=5 (from\
      \ 5.11456)\n    corr = rolling_corr(pl.col('high'), adv10, window=5)\n    \n\
      \    # Ts_Rank with window=5 (from 5.53756)\n    ts_rank_val = ts_rank(corr,\
      \ window=5)\n    \n    # Power: rank^ts_rank, then multiply by -1\n    factor\
      \ = (rank_val ** ts_rank_val) * -1\n    \n    return df.select(factor).to_series()"
