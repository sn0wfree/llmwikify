  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # df is already\
      \ sorted by (code, date)\n\n    # 1) delta(close, 1) — today's close minus yesterday's\
      \ close\n    delta_close = delta(pl.col('close'), periods=1)\n\n    # 2) 5-day\
      \ rolling min and max of delta(close, 1)\n    min_delta = rolling_min(delta_close,\
      \ window=5)\n    max_delta = rolling_max(delta_close, window=5)\n\n    # 3)\
      \ Conditional logic from the formula:\n    #    if ts_min(delta,5) > 0     \
      \   -> delta(close,1)\n    #    elif ts_max(delta,5) < 0      -> delta(close,1)\n\
      \    #    else                          -> -1 * delta(close,1)\n    factor =\
      \ (\n        pl.when(min_delta > 0)\n        .then(delta_close)\n        .otherwise(\n\
      \            pl.when(max_delta < 0)\n            .then(delta_close)\n      \
      \      .otherwise(-1 * delta_close)\n        )\n    )\n\n    return df.select(factor).to_series()"
