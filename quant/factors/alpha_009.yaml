factor:
  name: alpha_009
  asset_type: stock
  category: formulaic
  status: 已验证
  updated_at: '2026-06-24'
  l1:
    definition: '((0 < ts_min(delta(close, 1), 5)) ? delta(close, 1) : ((ts_max(delta(close,
      1), 5) < 0) ? delta(close, 1) : (-1 * delta(close, 1))))'
    formula: '((0 < ts_min(delta(close, 1), 5)) ? delta(close, 1) : ((ts_max(delta(close,
      1), 5) < 0) ? delta(close, 1) : (-1 * delta(close, 1))))'
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - close
    - open
    - high
    - low
    - volume
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Step 1: materialize\
      \ delta(close, 1)\n    df = df.with_columns(delta(pl.col('close'), periods=1).alias('_delta'))\n\
      \    \n    # Step 2: materialize ts_min and ts_max of delta over window=5 (Rule\
      \ 2)\n    df = df.with_columns([\n        ts_min(pl.col('_delta'), window=5).alias('_ts_min'),\n\
      \        ts_max(pl.col('_delta'), window=5).alias('_ts_max')\n    ])\n    \n\
      \    # Step 3: nested when logic using pl.when (Rule 3)\n    # If ts_min > 0\
      \ -> delta; elif ts_max < 0 -> delta; else -> -delta\n    factor = pl.when(pl.col('_ts_min')\
      \ > 0).then(pl.col('_delta')).otherwise(\n        pl.when(pl.col('_ts_max')\
      \ < 0).then(pl.col('_delta')).otherwise(-1 * pl.col('_delta'))\n    )\n    \n\
      \    return df.select(factor).to_series()"
    code_compile_status: success
