    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Inner: if returns\
      \ < 0 then stddev(returns, 20) else close\n    inner = pl.when(pl.col('returns')\
      \ < 0).then(\n        rolling_std(pl.col('returns'), window=20)\n    ).otherwise(pl.col('close'))\n\
      \n    # SignedPower: sign(x) * abs(x)^2\n    signed = inner.sign() * (inner.abs()\
      \ ** 2)\n\n    # Ts_ArgMax with 5-day window\n    argmax = ts_argmax(signed,\
      \ window=5)\n\n    # Cross-sectional rank, centred around zero\n    factor =\
      \ rank(argmax).over('date') - 0.5\n\n    return df.select(factor).to_series()"
