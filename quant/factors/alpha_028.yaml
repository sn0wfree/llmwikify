  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # df is already\
      \ sorted by (code, date) — do not re-sort\n\n    # ADV20: 20-day average of\
      \ volume\n    adv20 = ts_mean(pl.col('volume'), 20)\n\n    # 5-day rolling correlation\
      \ between ADV20 and low\n    corr = correlation(adv20, pl.col('low'), 5)\n\n\
      \    # (high + low) / 2  — mid price\n    mid_price = (pl.col('high') + pl.col('low'))\
      \ / 2\n\n    # Combine: correlation + mid_price - close\n    expr = corr + mid_price\
      \ - pl.col('close')\n\n    # Cross-sectional scale (preserves sign, normalizes\
      \ by sum of |x|)\n    factor = scale(expr).over('date')\n\n    return df.select(factor).to_series()"
