      \ )\n    decay2 = decay_linear(inner, window=int(11.4157))\n    ts_rank1 = ts_rank(decay2,\
      \ window=int(6.72611))\n    \n    # Combine and multiply by -1\n    factor =\
      \ (rank1 + ts_rank1) * -1\n    \n    return df.select(factor).to_series()"
