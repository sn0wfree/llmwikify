  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv40 = rolling\
      \ mean of volume over 40 days\n    df = df.with_columns(\n        rolling_mean(pl.col('volume'),\
      \ window=40).alias('_adv40')\n    )\n\n    # Part 1: rank((open - ts_min(open,\
      \ 12.4105)))  -> window=12\n    ts_min_open = ts_min(pl.col('open'), window=12)\n\
      \    part1_inner = pl.col('open') - ts_min_open\n    # Materialize before cross-section\
      \ rank\n    df = df.with_columns(part1_inner.alias('_part1_inner'))\n    part1\
      \ = rank(pl.col('_part1_inner')).over('date')\n\n    # Part 2 inner: correlation(sum((high+low)/2,\
      \ 19.1351), sum(adv40, 19.1351), 12.8742)\n    sum_hl = rolling_sum((pl.col('high')\
      \ + pl.col('low')) / 2, window=19)\n    sum_adv = rolling_sum(pl.col('_adv40'),\
      \ window=19)\n    corr_expr = correlation(sum_hl, sum_adv, window=13)\n\n  \
      \  # Materialize the time-series correlation BEFORE cross-section rank\n   \
      \ df = df.with_columns(corr_expr.alias('_corr'))\n    rank_corr = rank(pl.col('_corr')).over('date')\n\
      \    powered = rank_corr ** 5\n\n    # Materialize powered, then apply ts_rank\
      \ with window=12\n    df = df.with_columns(powered.alias('_powered'))\n    part2\
      \ = ts_rank(pl.col('_powered'), window=12)\n\n    # Final: part1 < part2 ->\
      \ cast boolean to float\n    factor = (part1 < part2).cast(pl.Float32)\n\n \
      \   return df.select(factor).to_series()"
