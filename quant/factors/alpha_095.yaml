      \ 19), 13) )^5 , 12 )\n    mid_price = (pl.col('high') + pl.col('low')) / 2\n\
      \    sum_mid = rolling_sum(mid_price, window=19)          # 19.1351 -> 19\n\
      \    sum_adv40 = rolling_sum(adv40, window=19)            # 19.1351 -> 19\n\
      \    corr = rolling_corr(sum_mid, sum_adv40, window=13)   # 12.8742 -> 13\n\
      \    ranked_corr = rank(corr).over('date')\n    powered = ranked_corr ** 5\n\
      \    right = ts_rank(powered, window=12)                 # 11.7584 -> 12\n\n\
      \    # Boolean comparison cast to float\n    factor = (left < right).cast(pl.Float64)\n\
      \n    return df.select(factor).to_series()"
