  l1:
    definition: ((rank(delta(vwap, 1.29456))^Ts_Rank(correlation(IndNeutralize(close,
      IndClass.industry), adv50, 17.8256), 17.9171)) * -1)
    formula: ((rank(delta(vwap, 1.29456))^Ts_Rank(correlation(IndNeutralize(close,
      IndClass.industry), adv50, 17.8256), 17.9171)) * -1)
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - close
    - adv50
    - vwap
    - industry
    - open
    - high
    - low
    - volume
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv50: 50-day\
      \ average dollar volume (close * volume)\n    adv50 = ts_mean(pl.col('close')\
      \ * pl.col('volume'), window=50)\n\n    # Industry neutralize close (using neutralize\
      \ as substitute since industry class unavailable)\n    ind_neutral_close = neutralize(pl.col('close')).over('date')\n\
      \n    # Correlation between ind-neutralized close and adv50\n    corr = rolling_corr(ind_neutral_close,\
      \ adv50, window=18)\n\n    # Ts_Rank of correlation\n    ts_rank_corr = ts_rank(corr,\
      \ window=18)\n\n    # Delta of vwap\n    vwap_delta = delta(pl.col('vwap'),\
      \ periods=1)\n\n    # Cross-sectional rank of delta(vwap)\n    rank_delta =\
      \ rank(vwap_delta).over('date')\n\n    # Raise rank to the power of ts_rank\n\
      \    factor = rank_delta ** ts_rank_corr\n\n    # Multiply by -1\n    factor\
      \ = factor * -1\n\n    return df.select(factor).to_series()"
    code_compile_status: success
