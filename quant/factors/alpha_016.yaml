  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    df = df.sort(['code',\
      \ 'date'])\n\n    # Cross-sectional ranks\n    rank_high = rank(pl.col('high')).over('date')\n\
      \    rank_volume = rank(pl.col('volume')).over('date')\n\n    # Rolling covariance\
      \ (time-series) of the two ranked series, window=5\n    cov = rolling_cov(rank_high,\
      \ rank_volume, window=5)\n\n    # Cross-sectional rank of the covariance, then\
      \ negate\n    factor = -1 * rank(cov).over('date')\n\n    return df.select(factor).to_series()"
