  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    df = df.sort(['code',\
      \ 'date'])\n\n    # adv40: 40-day average daily volume\n    adv40 = rolling_mean(pl.col('volume'),\
      \ window=40)\n\n    # (high + low) / 2\n    mid_price = (pl.col('high') + pl.col('low'))\
      \ / 2\n\n    # correlation((high+low)/2, adv40, 8.93345) -> window=9\n    corr1\
      \ = rolling_corr(mid_price, adv40, window=9)\n\n    # decay_linear with window\
      \ 10.1519 -> 10\n    decay1 = decay_linear(corr1, window=10)\n\n    # cross-sectional\
      \ rank of numerator\n    rank1 = rank(decay1).over('date')\n\n    # Ts_Rank(vwap,\
      \ 3.72469) -> window=4\n    ts_rank_vwap = ts_rank(pl.col('vwap'), window=4)\n\
      \n    # Ts_Rank(volume, 18.5188) -> window=19\n    ts_rank_volume = ts_rank(pl.col('volume'),\
      \ window=19)\n\n    # correlation(Ts_Rank(vwap), Ts_Rank(volume), 6.86671) ->\
      \ window=7\n    corr2 = rolling_corr(ts_rank_vwap, ts_rank_volume, window=7)\n\
      \n    # decay_linear with window 2.95011 -> 3\n    decay2 = decay_linear(corr2,\
      \ window=3)\n\n    # cross-sectional rank of denominator\n    rank2 = rank(decay2).over('date')\n\
      \n    # final ratio\n    factor = rank1 / rank2\n\n    return df.select(factor).to_series()"
