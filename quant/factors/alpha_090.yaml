  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Ensure proper\
      \ per-code ordering for rolling/time-series ops\n    df = df.sort(['code', 'date'])\n\
      \n    # adv40: 40-day average dollar volume (volume * close)\n    adv40 = rolling_mean(pl.col('volume')\
      \ * pl.col('close'), window=40)\n\n    # IndNeutralize: industry classification\
      \ not available in df columns;\n    # pass adv40 through neutralize (acts as\
      \ cross-sectional demean fallback)\n    adv40_neut = neutralize(adv40).over('date')\n\
      \n    # Rolling correlation of adv40 (neutralized) with low (~5.38 -> 5)\n \
      \   corr = rolling_corr(adv40_neut, pl.col('low'), window=5)\n\n    # Ts_Rank\
      \ of the correlation over ~3.22 -> 3 days\n    ts_ranked = ts_rank(corr, window=3)\n\
      \n    # close - ts_max(close, ~4.67 -> 5)\n    close_minus_max = pl.col('close')\
      \ - ts_max(pl.col('close'), window=5)\n\n    # Cross-sectional rank of (close\
      \ - ts_max(close,5))\n    ranked = rank(close_minus_max).over('date')\n\n  \
      \  # Raise the ranked series to the power of ts_ranked\n    powered = ranked\
      \ ** ts_ranked\n\n    # Multiply by -1\n    factor = powered * -1\n\n    return\
      \ df.select(factor).to_series()"
