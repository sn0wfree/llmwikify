      \n    # Part 3: 1 - Ts_Rank(returns, 32)\n    rank_returns = ts_rank(pl.col('returns'),\
      \ window=32)\n\n    # Combine: part1 * part2 * part3\n    factor = rank_volume\
      \ * (1 - rank_inner) * (1 - rank_returns)\n\n    return df.select(factor).to_series()"
