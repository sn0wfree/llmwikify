  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    df = df.sort(['code',\
      \ 'date'])\n\n    # Part 1: decay_linear of boolean condition, then ts_rank\n\
      \    cond1 = (((pl.col('high') + pl.col('low')) / 2) + pl.col('close')) < (pl.col('low')\
      \ + pl.col('open'))\n    cond1_float = cond1.cast(pl.Float64)\n    decay1 =\
      \ decay_linear(cond1_float, window=int(14.7221))\n    part1 = ts_rank(decay1,\
      \ window=int(18.8683))\n\n    # Part 2: correlation of cross-section ranks,\
      \ then decay, then ts_rank\n    rank_low = rank(pl.col('low')).over('date')\n\
      \    adv30 = rolling_mean(pl.col('volume'), window=30)\n    rank_adv30 = rank(adv30).over('date')\n\
      \    corr = correlation(rank_low, rank_adv30, window=int(7.58555))\n    decay2\
      \ = decay_linear(corr, window=int(6.94024))\n    part2 = ts_rank(decay2, window=int(6.80584))\n\
      \n    # Final: element-wise min of the two parts\n    factor = pl.min_horizontal([part1,\
      \ part2])\n\n    return df.select(factor).to_series()"
