  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # 7-day rolling\
      \ mean of close: sum(close, 7) / 7\n    mean_7 = rolling_sum(pl.col('close'),\
      \ window=7) / 7\n    \n    # (sum(close,7)/7) - close\n    diff = mean_7 - pl.col('close')\n\
      \    \n    # scale(((sum(close,7)/7) - close))  -- cross-section\n    scaled_diff\
      \ = scale(diff).over('date')\n    \n    # delay(close, 5)\n    delay_close_5\
      \ = delay(pl.col('close'), periods=5)\n    \n    # correlation(vwap, delay(close,\
      \ 5), 230)\n    corr_230 = rolling_corr(pl.col('vwap'), delay_close_5, window=230)\n\
      \    \n    # scale(correlation)  -- cross-section\n    scaled_corr = scale(corr_230).over('date')\n\
      \    \n    # Final factor: scale(...) + 20 * scale(...)\n    factor = scaled_diff\
      \ + 20 * scaled_corr\n    \n    return df.select(factor).to_series()"
