    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Part 1: (rank(1/close)\
      \ * volume) / adv20\n    inv_close = 1.0 / pl.col('close')\n    rank_inv_close\
      \ = rank(inv_close).over('date')\n    part1_inner = rank_inv_close * pl.col('volume')\n\
      \    adv20 = rolling_mean(pl.col('volume'), window=20)\n    part1 = part1_inner\
      \ / adv20\n    \n    # Part 2: (high * rank(high - close)) / (sum(high, 5) /\
      \ 5)\n    high_close_diff = pl.col('high') - pl.col('close')\n    rank_hcd =\
      \ rank(high_close_diff).over('date')\n    high_rank = pl.col('high') * rank_hcd\n\
      \    sum_high_5 = rolling_mean(pl.col('high'), window=5)  # sum(high, 5) / 5\n\
      \    part2 = high_rank / sum_high_5\n    \n    # Combined first part\n    combined\
      \ = part1 * part2\n    \n    # Part 3: rank(vwap - delay(vwap, 5))\n    vwap_delay\
      \ = delay(pl.col('vwap'), periods=5)\n    vwap_diff = pl.col('vwap') - vwap_delay\n\
      \    rank_vwap = rank(vwap_diff).over('date')\n    \n    # Final\n    factor\
      \ = combined - rank_vwap\n    \n    return df.select(factor).to_series()"
