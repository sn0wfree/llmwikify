  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # df is already\
      \ sorted by (code, date) — DO NOT re-sort\n    \n    # Time-series: rolling\
      \ std of high with window 10\n    std_high = rolling_std(pl.col('high'), window=10)\n\
      \    \n    # Cross-section rank of the rolling std per date\n    rank_std =\
      \ rank(std_high).over('date')\n    \n    # Time-series: rolling correlation\
      \ between high and volume with window 10\n    corr_hv = correlation(pl.col('high'),\
      \ pl.col('volume'), window=10)\n    \n    # Combine: -1 * rank(stddev(high,\
      \ 10)) * correlation(high, volume, 10)\n    factor = -1 * rank_std * corr_hv\n\
      \    \n    return df.select(factor).to_series()"
