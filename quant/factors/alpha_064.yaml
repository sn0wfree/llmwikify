  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv120 - average\
      \ daily volume over 120 days\n    adv120 = ts_mean(pl.col('volume'), window=120)\n\
      \n    # First component: sum((open * 0.178404) + (low * (1 - 0.178404)), 12)\n\
      \    inner1 = (pl.col('open') * 0.178404) + (pl.col('low') * (1 - 0.178404))\n\
      \    sum1 = ts_sum(inner1, window=12)\n\n    # Second component: sum(adv120,\
      \ 12)\n    sum2 = ts_sum(adv120, window=12)\n\n    # Rolling correlation with\
      \ window 16\n    corr = ts_corr(sum1, sum2, window=16)\n\n    # Cross-sectional\
      \ rank of correlation\n    rank1 = rank(corr).over('date')\n\n    # Second part:\
      \ delta(((((high + low) / 2) * 0.178404) + (vwap * (1 - 0.178404))), 3)\n  \
      \  inner2 = ((pl.col('high') + pl.col('low')) / 2 * 0.178404) + (pl.col('vwap')\
      \ * (1 - 0.178404))\n    delta_val = delta(inner2, periods=3)\n\n    # Cross-sectional\
      \ rank of delta\n    rank2 = rank(delta_val).over('date')\n\n    # (rank1 <\
      \ rank2) ? -1 : 0\n    factor = pl.when(rank1 < rank2).then(pl.lit(-1.0)).otherwise(pl.lit(0.0))\n\
      \n    return df.select(factor).to_series()"
