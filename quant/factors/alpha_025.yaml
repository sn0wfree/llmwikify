  l1:
    definition: rank(((((-1 * returns) * adv20) * vwap) * (high - close)))
    formula: rank(((((-1 * returns) * adv20) * vwap) * (high - close)))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - high
    - close
    - adv20
    - vwap
    - returns
    - open
    - low
    - volume
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv20: 20-day\
      \ rolling mean of volume (per code)\n    adv20 = rolling_mean(pl.col('volume'),\
      \ window=20)\n\n    # Inner expression: ((-1 * returns) * adv20) * vwap * (high\
      \ - close)\n    inner = (-1 * pl.col('returns')) * adv20 * pl.col('vwap') *\
      \ (pl.col('high') - pl.col('close'))\n\n    # Cross-sectional rank per date\n\
      \    factor = rank(inner).over('date')\n\n    return df.select(factor).to_series()"
