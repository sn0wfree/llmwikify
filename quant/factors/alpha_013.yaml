  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Cross-sectional\
      \ ranks per date\n    rank_close = rank(pl.col('close')).over('date')\n    rank_volume\
      \ = rank(pl.col('volume')).over('date')\n\n    # Per-code rolling covariance\
      \ with window 5\n    # df is already (code, date) sorted, no .over('code') needed\n\
      \    cov_5 = covariance(rank_close, rank_volume, window=5)\n\n    # Cross-sectional\
      \ rank of the covariance, then negate\n    factor = -1 * rank(cov_5).over('date')\n\
      \n    return df.select(factor).to_series()"
