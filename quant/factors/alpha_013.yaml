  l1:
    definition: (-1 * rank(covariance(rank(close), rank(volume), 5)))
    formula: (-1 * rank(covariance(rank(close), rank(volume), 5)))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - close
    - volume
    - open
    - high
    - low
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Step 1: Cross-sectional\
      \ rank of close and volume\n    df = df.with_columns([\n        rank(pl.col('close')).over('date').alias('_rank_close'),\n\
      \        rank(pl.col('volume')).over('date').alias('_rank_volume')\n    ])\n\
      \    # Step 2: Materialize the 5-day rolling covariance of the two ranks\n \
      \   df = df.with_columns(\n        covariance(pl.col('_rank_close'), pl.col('_rank_volume'),\
      \ window=5).alias('_cov')\n    )\n    # Step 3: Cross-sectional rank of covariance,\
      \ then multiply by -1\n    factor = -1 * rank(pl.col('_cov')).over('date')\n\
      \    return df.select(factor).to_series()"
