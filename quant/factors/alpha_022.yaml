  l1:
    definition: (-1 * (delta(correlation(high, volume, 5), 5) * rank(stddev(close,
      20))))
    formula: (-1 * (delta(correlation(high, volume, 5), 5) * rank(stddev(close, 20))))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - high
    - close
    - volume
    - open
    - low
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # correlation(high,\
      \ volume, 5) - rolling correlation per code\n    corr_hv = correlation(pl.col('high'),\
      \ pl.col('volume'), window=5)\n\n    # delta(correlation(...), 5)\n    delta_corr\
      \ = delta(corr_hv, periods=5)\n\n    # stddev(close, 20) - rolling std per code\n\
      \    std_close = rolling_std(pl.col('close'), window=20)\n\n    # rank(stddev(close,\
      \ 20)) - cross-sectional rank per date\n    rank_std = rank(std_close).over('date')\n\
      \n    # (-1) * (delta_corr * rank_std)\n    factor = -1 * (delta_corr * rank_std)\n\
      \n    return df.select(factor).to_series()"
