  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Inner term: (close\
      \ - ts_min(low, 12)) / (ts_max(high, 12) - ts_min(low, 12))\n    min_low = ts_min(pl.col('low'),\
      \ window=12)\n    max_high = ts_max(pl.col('high'), window=12)\n    inner =\
      \ (pl.col('close') - min_low) / (max_high - min_low)\n\n    # Cross-sectional\
      \ rank of the inner term\n    rank_inner = rank(inner).over('date')\n\n    #\
      \ Cross-sectional rank of volume\n    rank_volume = rank(pl.col('volume')).over('date')\n\
      \n    # Rolling correlation (window=6) between the two ranked series\n    corr\
      \ = rolling_corr(rank_inner, rank_volume, window=6)\n\n    # Multiply by -1\n\
      \    factor = -1 * corr\n\n    return df.select(factor).to_series()"
