  l2:
    calculation_steps:
    - step: 1
      description: 对每日截面内 volume 和 vwap 分别做横截面排名 (cross-sectional rank), 得到 rank(volume)_t
        和 rank(vwap)_t
      formula: rank_vol_i,t = rank(volume_i,t) over date=t;  rank_vwap_i,t = rank(vwap_i,t)
        over date=t
    - step: 2
      description: 在时间序列上对 rank(volume) 与 rank(vwap) 计算滚动 6 日相关系数, 度量量价联动强度
      formula: corr_i,t = rolling_corr(rank_vol_i, rank_vwap_i, window=6)
    - step: 3
      description: 对相关系数做 2 日滚动求和并除以 2, 等价于 2 日均值平滑
      formula: smooth_i,t = (corr_i,t + corr_i,t-1) / 2.0
    - step: 4
      description: 对平滑后的相关系数再在每日截面上做横截面排名
      formula: r_i,t = rank(smooth_i,t) over date=t
    - step: 5
      description: '根据排名分位数生成二元因子值: 排名高于 0.5 取 -1, 否则取 +1'
      formula: factor_i,t = -1 if r_i,t > 0.5 else 1
    edge_case_handling: rolling_corr 在窗口不足 6 期时返回 null, 排名与后续条件运算会跳过 null; 若某日截面中某股票
      corr 为 null, 则其 rank 也会被跳过, 最终因子值为 null (实际回测中需 forward fill 或丢弃)
    missing_value_handling: polars 的 rolling_corr 默认对不足窗口返回 null; 后续 rolling_sum、/2、rank、when
      条件运算均按 null 传播, 最终输出 null
    data_alignment: T+1
    complexity: O(T × N)
  l3:
    financial_intuition: 量价秩相关高表明短期趋势已被交易充分确认, 因子通过反向持仓博取均值回归; 二元化设计捕捉量价联动强弱两端的截面相对强弱切换。
    market_behavior: 量价同向运动越强的股票越容易处于短期超买状态, 反向持仓可获利; 量价脱钩的股票多空分歧小, 反而存在补涨空间。
    theoretical_basis: '行为金融: 投资者对放量上涨的过度反应会导致短期反转; 量价脱钩意味着信息尚未充分定价, 后续可能补涨。'
    historical_effectiveness: 在 A 股及美股截面测试中, 量价相关性类因子在中频 (5-10 日) 持仓周期有正向 IC, 但近年因拥挤度上升收益有所衰减。
    related_factors: Alpha#54 (原始公式), 量价相关性因子, 换手率-价格背离因子, 短期反转因子
  l4:
    hypotheses:
    - id: H1
      name: 量价反转效应
      description: 截面量价秩相关较高的股票 (因子值 -1) 短期表现较差, 量价秩相关较低的股票 (因子值 +1) 短期表现较好, 即因子与下期收益正相关
      expected_ic_sign: 正
      source: 原始 101 Alphas 论文 Alpha#54 设定 rank>0.5 取 -1, 设计意图为做空高联动、做多低联动
      priority: 主假设
    - id: H2
      name: 二元化信号有效性
      description: 将连续信号离散化为 ±1 二元变量后, 仍保留足够的预测能力, 在换手率约束下降低交易成本敏感度
      expected_ic_sign: 正
      source: '101 Alphas 设计哲学: 简单二元信号在分散化组合中更稳健'
      priority: 次假设
    - id: H3
      name: 行业中性下的截面排序能力
      description: 因子在控制行业和市值后, 仍能依靠量价秩相关的相对强弱提供超额收益
      expected_ic_sign: 正
      source: 截面 rank 设计本身具备隐式市值/行业中性
      priority: 次假设
    - id: H4
      name: 趋势市失效假设
      description: 在强趋势行情中, 量价高联动股票持续上涨, 因子信号失效, IC 转负
      expected_ic_sign: 不确定
      source: 行为金融反转因子的典型失效模式
      priority: 辅助假设
    meaning_summary: 该因子通过截面排序刻画量价短期联动的相对强弱, 并以二元信号做反向持仓, 核心假设是量价高联动代表短期超买、低联动代表补涨机会。
    key_insights:
    - 原始相关系数已被两次排序 (量/价各自 rank, 再对 corr 排序), 信息含量被大幅压缩, 实际有效信号来自截面相对位置而非具体数值
    - sum/2 仅起平滑作用, 对信号方向影响微弱, 核心信息来自 rolling_corr 窗口长度 6
    - 二元化输出使因子对极端值不敏感, 但损失了连续信号的强度信息, 可能降低对大幅异动行情的捕捉能力
    uncertainty: 二元化使得因子 IC 估计方差较大, 且 rank>0.5 的阈值对收益分布形态敏感; 不同市场环境下阈值需重新校准。
  l6:
    industry_concentration: '中等: 量价相关性在不同行业间差异显著, 周期与成长板块的失效模式可能不同'
    crowding_level: '较高: Alpha#54 是经典公开因子, 国内外机构广泛使用, 存在明显拥挤交易风险'
    failure_conditions:
    - '强趋势市 (如 2015 上半年、2020-2021 美股): 量价高联动股票持续上涨, 反向信号持续亏损'
    - '低流动性 / 风格切换期: 横截面 rank 噪声增大, 二元化信号稳定性下降'
    - '财报集中披露或重大政策事件窗口: 量价关系被外生冲击扭曲, 相关性信号失效'
    risk_notes: 因子值为 ±1 的二元设计在组合构建时可能产生较高换手 (每次截面排序变动即触发调仓), 需结合交易成本约束优化持仓周期; 拥挤交易环境下,
      多空两端均面临滑点风险。
