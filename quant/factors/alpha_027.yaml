factor:
  name: alpha_027
  asset_type: stock
  category: formulaic
  status: 已验证
  updated_at: '2026-06-24'
  l1:
    definition: '((0.5 < rank((sum(correlation(rank(volume), rank(vwap), 6), 2) /
      2.0))) ? (-1 * 1) : 1)'
    formula: '((0.5 < rank((sum(correlation(rank(volume), rank(vwap), 6), 2) / 2.0)))
      ? (-1 * 1) : 1)'
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - volume
    - vwap
    - close
    - open
    - high
    - low
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Step 1: cross-sectional\
      \ rank of volume and vwap (materialize first)\n    df = df.with_columns([\n\
      \        rank(pl.col('volume')).over('date').alias('_rank_volume'),\n      \
      \  rank(pl.col('vwap')).over('date').alias('_rank_vwap')\n    ])\n    \n   \
      \ # Step 2: 6-period rolling correlation between the two ranks (materialize)\n\
      \    df = df.with_columns(\n        correlation(pl.col('_rank_volume'), pl.col('_rank_vwap'),\
      \ window=6).alias('_corr')\n    )\n    \n    # Step 3: 2-period rolling sum\
      \ of correlation (materialize before cross-section)\n    df = df.with_columns(\n\
      \        rolling_sum(pl.col('_corr'), window=2).alias('_sum_corr')\n    )\n\
      \    \n    # Step 4: divide by 2.0\n    df = df.with_columns(\n        (pl.col('_sum_corr')\
      \ / 2.0).alias('_div')\n    )\n    \n    # Step 5: cross-sectional rank of the\
      \ result\n    df = df.with_columns(\n        rank(pl.col('_div')).over('date').alias('_rank_final')\n\
      \    )\n    \n    # Step 6: ternary condition using pl.when (Rule 3)\n    factor\
      \ = pl.when(pl.col('_rank_final') > 0.5).then(-1).otherwise(1)\n    \n    return\
      \ df.select(factor).to_series()"
