  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Cross-sectional\
      \ ranks of volume and vwap per date\n    rank_volume = rank(pl.col('volume')).over('date')\n\
      \    rank_vwap = rank(pl.col('vwap')).over('date')\n    \n    # Rolling correlation\
      \ of the two ranked series with window 6\n    corr = rolling_corr(rank_volume,\
      \ rank_vwap, window=6)\n    \n    # Rolling sum of the correlation with window\
      \ 2\n    summed = rolling_sum(corr, window=2)\n    \n    # Divide by 2\n   \
      \ divided = summed / 2.0\n    \n    # Cross-sectional rank of the result per\
      \ date\n    ranked = rank(divided).over('date')\n    \n    # Conditional: if\
      \ rank > 0.5 then -1 else 1\n    factor = pl.when(ranked > 0.5).then(-1).otherwise(1)\n\
      \    \n    return df.select(factor).to_series()"
