  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # df is already\
      \ sorted by (code, date) — do NOT re-sort\n\n    # Inner term: ((close - low)\
      \ - (high - close)) / (high - low) * volume\n    inner = (\n        ((pl.col('close')\
      \ - pl.col('low')) - (pl.col('high') - pl.col('close')))\n        / (pl.col('high')\
      \ - pl.col('low'))\n        * pl.col('volume')\n    )\n\n    # rank(inner) cross-sectionally,\
      \ then scale\n    scaled_rank_inner = scale(rank(inner).over('date')).over('date')\n\
      \n    # ts_argmax(close, 10) — per code (df already sorted)\n    argmax_close\
      \ = ts_argmax(pl.col('close'), window=10)\n\n    # rank(argmax) cross-sectionally,\
      \ then scale\n    scaled_rank_argmax = scale(rank(argmax_close).over('date')).over('date')\n\
      \n    # Final: 0 - (1 * (2 * scaled_rank_inner - scaled_rank_argmax))\n    factor\
      \ = -(2 * scaled_rank_inner - scaled_rank_argmax)\n\n    return df.select(factor).to_series()"
