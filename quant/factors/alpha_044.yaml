  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Cross-sectional\
      \ rank of volume per date\n    rank_vol = rank(pl.col('volume')).over('date')\n\
      \n    # 5-day rolling correlation between high and rank(volume)\n    corr =\
      \ correlation(pl.col('high'), rank_vol, window=5)\n\n    # Multiply by -1\n\
      \    factor = -1 * corr\n\n    return df.select(factor).to_series()"
