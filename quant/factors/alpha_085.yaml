  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    w = 0.876703\n\n\
      \    # Component A: rank(correlation(weighted_hc, adv30, 9))\n    weighted_hc\
      \ = pl.col('high') * w + pl.col('close') * (1 - w)\n    adv30 = rolling_mean(pl.col('volume'),\
      \ window=30)\n    corr_a = rolling_corr(weighted_hc, adv30, window=9)\n    rank_a\
      \ = rank(corr_a).over('date')\n\n    # Component B: rank(correlation(ts_rank(mid,\
      \ 3), ts_rank(vol, 10), 7))\n    mid = (pl.col('high') + pl.col('low')) / 2\n\
      \    ts_rank_mid = ts_rank(mid, window=3)\n    ts_rank_vol = ts_rank(pl.col('volume'),\
      \ window=10)\n    corr_b = rolling_corr(ts_rank_mid, ts_rank_vol, window=7)\n\
      \    rank_b = rank(corr_b).over('date')\n\n    # Final: A^B\n    factor = rank_a\
      \ ** rank_b\n\n    return df.select(factor).to_series()"
