factor:
  name: alpha_030
  asset_type: stock
  category: formulaic
  status: 已验证
  updated_at: '2026-06-23'
  l1:
    definition: (((1.0 - rank(((sign((close - delay(close, 1))) + sign((delay(close,
      1) - delay(close, 2)))) + sign((delay(close, 2) - delay(close, 3)))))) * sum(volume,
      5)) / sum(volume, 20))
    formula: (((1.0 - rank(((sign((close - delay(close, 1))) + sign((delay(close,
      1) - delay(close, 2)))) + sign((delay(close, 2) - delay(close, 3)))))) * sum(volume,
      5)) / sum(volume, 20))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - close
    - volume
    - open
    - high
    - low
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    close = pl.col('close')\n\
      \n    delay1 = delay(close, periods=1)\n    delay2 = delay(close, periods=2)\n\
      \    delay3 = delay(close, periods=3)\n\n    sign1 = (close - delay1).sign()\n\
      \    sign2 = (delay1 - delay2).sign()\n    sign3 = (delay2 - delay3).sign()\n\
      \n    sign_sum = sign1 + sign2 + sign3\n\n    ranked = rank(sign_sum).over('date')\n\
      \    one_minus_rank = 1.0 - ranked\n\n    vol_5 = rolling_sum(pl.col('volume'),\
      \ window=5)\n    vol_20 = rolling_sum(pl.col('volume'), window=20)\n\n    factor\
      \ = (one_minus_rank * vol_5) / vol_20\n\n    return df.select(factor).to_series()"
    code_compile_status: success
    code_chars: 612
    h5_path: /home/ll/.llmwikify/akshare_cache/quantnodes_h5_long/factor_alpha_030.h5
