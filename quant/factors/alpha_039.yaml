    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Materialize adv20\
      \ (20-day average volume)\n    df = df.with_columns(\n        rolling_mean(pl.col('volume'),\
      \ window=20).alias('_adv20')\n    )\n\n    # Materialize decay_linear(volume/adv20,\
      \ 9) - time-series\n    df = df.with_columns(\n        decay_linear(pl.col('volume')\
      \ / pl.col('_adv20'), window=9).alias('_decay')\n    )\n\n    # Cross-section\
      \ rank on materialized _decay\n    df = df.with_columns(\n        rank(pl.col('_decay')).over('date').alias('_rank_decay')\n\
      \    )\n\n    # delta(close, 7) * (1 - rank_decay) - both inputs are materialized\n\
      \    df = df.with_columns(\n        (delta(pl.col('close'), periods=7) * (1\
      \ - pl.col('_rank_decay'))).alias('_product')\n    )\n\n    # Cross-section\
      \ rank of the product\n    df = df.with_columns(\n        rank(pl.col('_product')).over('date').alias('_rank_product')\n\
      \    )\n\n    # Materialize sum(returns, 250) - time-series\n    df = df.with_columns(\n\
      \        rolling_sum(pl.col('returns'), window=250).alias('_sum_ret')\n    )\n\
      \n    # Cross-section rank of sum returns\n    df = df.with_columns(\n     \
      \   rank(pl.col('_sum_ret')).over('date').alias('_rank_sum_ret')\n    )\n\n\
      \    # Final factor: (-1 * rank_product) * (1 + rank_sum_ret)\n    factor =\
      \ (-1 * pl.col('_rank_product')) * (1 + pl.col('_rank_sum_ret'))\n\n    return\
      \ df.select(factor).to_series()"
