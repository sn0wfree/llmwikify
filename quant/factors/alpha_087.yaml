  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv81: 81-day\
      \ rolling average of volume\n    adv81 = rolling_mean(pl.col('volume'), window=81)\n\
      \n    # ---- Part A: rank(decay_linear(delta(close*0.369701 + vwap*0.630299,\
      \ 1.91233), 2.65461))\n    inner_a = pl.col('close') * 0.369701 + pl.col('vwap')\
      \ * (1 - 0.369701)\n    delta_a = delta(inner_a, periods=round(1.91233))\n \
      \   decay_a = decay_linear(delta_a, window=round(2.65461))\n    rank_a = rank(decay_a).over('date')\n\
      \n    # ---- Part B: Ts_Rank(decay_linear(abs(correlation(Neutralize(adv81),\
      \ close, 13.4132)), 4.89768), 14.4535)\n    # Use neutralize as cross-sectional\
      \ substitute for indneutralize (no industry column available)\n    neut_adv81\
      \ = neutralize(adv81).over('date')\n    corr_b = correlation(neut_adv81, pl.col('close'),\
      \ window=round(13.4132))\n    abs_corr = corr_b.abs()\n    decay_b = decay_linear(abs_corr,\
      \ window=round(4.89768))\n    ts_rank_b = ts_rank(decay_b, window=round(14.4535))\n\
      \n    # max(rank_a, ts_rank_b) * -1\n    factor = pl.max_horizontal(rank_a,\
      \ ts_rank_b) * -1\n\n    return df.select(factor).to_series()"
