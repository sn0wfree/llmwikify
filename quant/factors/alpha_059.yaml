  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Step 1: vwap\
      \ blend (vwap * 0.728317 + vwap * (1 - 0.728317) = vwap)\n    vwap_blend = (pl.col('vwap')\
      \ * 0.728317) + (pl.col('vwap') * (1 - 0.728317))\n    \n    # Step 2: Industry\
      \ neutralize -> use cross-sectional neutralize as fallback\n    neutralized\
      \ = neutralize(vwap_blend).over('date')\n    \n    # Step 3: Rolling correlation\
      \ with volume, window = 4\n    corr = rolling_corr(neutralized, pl.col('volume'),\
      \ window=4)\n    \n    # Step 4: Decay linear, window = 16\n    decayed = decay_linear(corr,\
      \ window=16)\n    \n    # Step 5: Ts_Rank, window = 8\n    ts_ranked = ts_rank(decayed,\
      \ window=8)\n    \n    # Step 6: Multiply by -1\n    factor = -1 * ts_ranked\n\
      \    \n    return df.select(factor).to_series()"
