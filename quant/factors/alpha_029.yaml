  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # 1. Sort by (code,\
      \ date) for per-code rolling\n    df = df.sort(['code', 'date'])\n\n    # 2.\
      \ delta(close - 1, 5)\n    close_minus_1 = pl.col('close') - 1\n    d = delta(close_minus_1,\
      \ periods=5)\n\n    # 3. rank(delta(close - 1, 5))\n    r1 = rank(d).over('date')\n\
      \n    # 4. -1 * rank(...)\n    neg_r1 = -1 * r1\n\n    # 5. rank(-1 * rank(...))\n\
      \    r2 = rank(neg_r1).over('date')\n\n    # 6. rank(rank(-1 * rank(delta(close\
      \ - 1, 5))))\n    r3 = rank(r2).over('date')\n\n    # 7. ts_min(..., 2)  (use\
      \ rolling_min since ts_min not in namespace)\n    tmin = rolling_min(r3, window=2)\n\
      \n    # 8. sum(..., 1)  — rolling_sum window 1 is identity\n    s = rolling_sum(tmin,\
      \ window=1)\n\n    # 9. log(...)\n    logged = s.log()\n\n    # 10. scale(log(...))\n\
      \    sc = scale(logged).over('date')\n\n    # 11. rank(scale(log(...)))\n  \
      \  r4 = rank(sc).over('date')\n\n    # 12. rank(rank(scale(log(...))))\n   \
      \ r5 = rank(r4).over('date')\n\n    # 13. product(..., 1) — window 1 product\
      \ is identity\n    p = r5\n\n    # 14. min(..., 5)\n    m = rolling_min(p, window=5)\n\
      \n    # 15. Second term: ts_rank(delay(-1 * returns, 6), 5)\n    neg_ret = -1\
      \ * pl.col('returns')\n    delayed = delay(neg_ret, periods=6)\n    tr = ts_rank(delayed,\
      \ window=5)\n\n    # 16. Combine\n    factor = m + tr\n\n    return df.select(factor).to_series()"
