  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Part 1: -1 *\
      \ sign((close - delay(close, 7)) + delta(close, 7))\n    close_lag7 = delay(pl.col('close'),\
      \ periods=7)\n    close_delta7 = delta(pl.col('close'), periods=7)\n    inner\
      \ = (pl.col('close') - close_lag7) + close_delta7\n    part1 = -1 * inner.sign()\n\
      \n    # Part 2: 1 + rank(1 + sum(returns, 250))\n    returns_sum_250 = rolling_sum(pl.col('returns'),\
      \ window=250)\n    part2 = 1 + rank(returns_sum_250 + 1).over('date')\n\n  \
      \  # Combine\n    factor = part1 * part2\n\n    return df.select(factor).to_series()"
