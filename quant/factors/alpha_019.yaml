  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Part 1: -1 *\
      \ sign((close - delay(close, 7)) + delta(close, 7))\n    close_delay_7 = delay(pl.col('close'),\
      \ periods=7)\n    close_delta_7 = delta(pl.col('close'), periods=7)\n    inner\
      \ = (pl.col('close') - close_delay_7) + close_delta_7\n    sign_part = -1 *\
      \ inner.sign()\n    \n    # Part 2: 1 + rank(1 + sum(returns, 250))\n    # Materialize\
      \ the rolling sum first to avoid cross-code contamination\n    df = df.with_columns(rolling_sum(pl.col('returns'),\
      \ window=250).alias('_sum_ret'))\n    rank_part = 1 + rank(pl.col('_sum_ret')\
      \ + 1).over('date')\n    \n    # Combine\n    factor = sign_part * rank_part\n\
      \    \n    return df.select(factor).to_series()"
