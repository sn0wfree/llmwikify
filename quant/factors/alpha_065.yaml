  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv60: average\
      \ daily volume over 60 days\n    adv60 = rolling_mean(pl.col('volume'), window=60)\n\
      \    \n    # Weighted combination of open and vwap\n    w_open = pl.col('open')\
      \ * 0.00817205 + pl.col('vwap') * (1 - 0.00817205)\n    \n    # Rolling sum\
      \ of adv60 with window 9 (rounded from 8.6911)\n    sum_adv60 = rolling_sum(adv60,\
      \ window=9)\n    \n    # Rolling correlation with window 6 (rounded from 6.40374)\n\
      \    corr = rolling_corr(w_open, sum_adv60, window=6)\n    \n    # Cross-sectional\
      \ rank of correlation\n    rank1 = rank(corr).over('date')\n    \n    # ts_min\
      \ of open with window 14 (rounded from 13.635)\n    min_open = ts_min(pl.col('open'),\
      \ window=14)\n    \n    # Open minus rolling min\n    diff_open = pl.col('open')\
      \ - min_open\n    \n    # Cross-sectional rank of (open - ts_min)\n    rank2\
      \ = rank(diff_open).over('date')\n    \n    # Boolean comparison, cast to numeric,\
      \ multiply by -1\n    factor = (rank1 < rank2).cast(pl.Int32) * -1\n    \n \
      \   return df.select(factor).to_series()"
