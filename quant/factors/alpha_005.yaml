  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # 10-day rolling\
      \ mean of vwap (sum/10)\n    vwap_mean = rolling_sum(pl.col('vwap'), window=10)\
      \ / 10\n\n    # Part A: rank(open - vwap_mean) cross-sectionally\n    part_a\
      \ = rank(pl.col('open') - vwap_mean).over('date')\n\n    # Part B: -1 * abs(rank(close\
      \ - vwap)) cross-sectionally\n    rank_close_vwap = rank(pl.col('close') - pl.col('vwap')).over('date')\n\
      \    part_b = -1 * rank_close_vwap.abs()\n\n    # Final factor: A * B\n    factor\
      \ = part_a * part_b\n\n    return df.select(factor).to_series()"
