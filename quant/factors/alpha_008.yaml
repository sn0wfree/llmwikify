  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Sum of open over\
      \ 5 periods\n    sum_open = rolling_sum(pl.col('open'), window=5)\n    \n  \
      \  # Sum of returns over 5 periods\n    sum_returns = rolling_sum(pl.col('returns'),\
      \ window=5)\n    \n    # Product: sum(open, 5) * sum(returns, 5)\n    product\
      \ = sum_open * sum_returns\n    \n    # Delay by 10 periods\n    delayed_product\
      \ = delay(product, periods=10)\n    \n    # Difference\n    diff = product -\
      \ delayed_product\n    \n    # Cross-sectional rank, multiplied by -1\n    factor\
      \ = -1 * rank(diff).over('date')\n    \n    return df.select(factor).to_series()"
