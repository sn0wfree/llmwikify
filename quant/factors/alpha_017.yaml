  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Component 1:\
      \ -1 * rank(ts_rank(close, 10))\n    ts_rank_close_10 = ts_rank(pl.col('close'),\
      \ window=10)\n    part1 = -1 * rank(ts_rank_close_10).over('date')\n\n    #\
      \ Component 2: rank(delta(delta(close, 1), 1))\n    delta_close_1 = delta(pl.col('close'),\
      \ periods=1)\n    delta_delta_close = delta(delta_close_1, periods=1)\n    part2\
      \ = rank(delta_delta_close).over('date')\n\n    # Component 3: rank(ts_rank((volume\
      \ / adv20), 5))\n    adv20 = rolling_mean(pl.col('volume'), window=20)\n   \
      \ vol_ratio = pl.col('volume') / adv20\n    ts_rank_vol_5 = ts_rank(vol_ratio,\
      \ window=5)\n    part3 = rank(ts_rank_vol_5).over('date')\n\n    # Combine all\
      \ three components\n    factor = part1 * part2 * part3\n\n    return df.select(factor).to_series()"
