  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv20: 20-day\
      \ average daily volume (proxy since adv20 is not in columns)\n    adv20 = rolling_mean(pl.col('volume'),\
      \ window=20)\n\n    # sum(adv20, 14.7444) -> rolling sum with window 15\n  \
      \  sum_adv20 = rolling_sum(adv20, window=15)\n\n    # correlation(close, sum_adv20,\
      \ 6.00049) -> rolling correlation with window 6\n    corr = rolling_corr(pl.col('close'),\
      \ sum_adv20, window=6)\n\n    # Ts_Rank(corr, 20.4195) -> time-series rank with\
      \ window 20\n    ts_rank_corr = ts_rank(corr, window=20)\n\n    # (open + close)\
      \ - (vwap + open) simplifies to (close - vwap)\n    close_minus_vwap = pl.col('close')\
      \ - pl.col('vwap')\n\n    # Cross-sectional rank per date\n    ranked = rank(close_minus_vwap).over('date')\n\
      \n    # (Ts_Rank < rank) * -1 -> -1 if true else 0\n    factor = pl.when(ts_rank_corr\
      \ < ranked).then(-1).otherwise(0)\n\n    return df.select(factor).to_series()"
