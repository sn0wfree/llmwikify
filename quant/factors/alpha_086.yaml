  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv20: 20-day\
      \ rolling mean of volume\n    adv20 = rolling_mean(pl.col('volume'), window=20)\n\
      \    \n    # sum(adv20, 14.7444) -> delta(adv20, periods=15) [rounded]\n   \
      \ sum_adv20 = delta(adv20, periods=15)\n    \n    # correlation(close, sum_adv20,\
      \ 6.00049) -> window=6 [rounded]\n    corr_expr = correlation(pl.col('close'),\
      \ sum_adv20, window=6)\n    \n    # Ts_Rank(corr_expr, 20.4195) -> window=20\
      \ [rounded]\n    ts_rank_expr = ts_rank(corr_expr, window=20)\n    \n    # Materialize\
      \ the time-series result before cross-section comparison\n    df = df.with_columns(ts_rank_expr.alias('_ts_rank'))\n\
      \    \n    # rank(((open + close) - (vwap + open))) = rank(close - vwap)\n \
      \   rank_expr = rank(pl.col('close') - pl.col('vwap')).over('date')\n    \n\
      \    # (ts_rank < rank) * -1\n    factor = (pl.col('_ts_rank') < rank_expr)\
      \ * -1\n    \n    return df.select(factor).to_series()"
