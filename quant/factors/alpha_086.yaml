  l1:
    definition: ((Ts_Rank(correlation(close, sum(adv20, 14.7444), 6.00049), 20.4195)
      < rank(((open + close) - (vwap + open)))) * -1)
    formula: ((Ts_Rank(correlation(close, sum(adv20, 14.7444), 6.00049), 20.4195)
      < rank(((open + close) - (vwap + open)))) * -1)
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - open
    - close
    - adv20
    - vwap
    - high
    - low
    - volume
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
