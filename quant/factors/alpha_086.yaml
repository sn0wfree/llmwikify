  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv20 = rolling\
      \ mean of volume over 20 days\n    adv20 = rolling_mean(pl.col('volume'), window=20)\n\
      \    \n    # sum(adv20, 14.7444) - rolling sum, window truncated to int\n  \
      \  sum_adv = rolling_sum(adv20, window=14)\n    \n    # correlation(close, sum_adv,\
      \ 6.00049) - rolling correlation\n    corr = correlation(pl.col('close'), sum_adv,\
      \ window=6)\n    \n    # Ts_Rank of correlation over 20.4195 (truncated to 20)\n\
      \    ts_rank_val = ts_rank(corr, window=20)\n    \n    # (open + close) - (vwap\
      \ + open) = close - vwap\n    cross_term = pl.col('close') - pl.col('vwap')\n\
      \    \n    # Cross-sectional rank per date\n    rank_cross = rank(cross_term).over('date')\n\
      \    \n    # Compare: (ts_rank < rank_cross) * -1\n    factor = pl.when(ts_rank_val\
      \ < rank_cross).then(-1).otherwise(0)\n    \n    return df.select(factor).to_series()"
