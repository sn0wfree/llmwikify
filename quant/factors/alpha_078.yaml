  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv40: average\
      \ daily volume over 40 days\n    adv40 = rolling_mean(pl.col('volume'), window=40)\n\
      \n    # First component: rank(correlation(sum(low*0.352233 + vwap*(1-0.352233),\
      \ 20), sum(adv40, 20), 7))\n    inner1 = pl.col('low') * 0.352233 + pl.col('vwap')\
      \ * (1 - 0.352233)\n    sum_inner1 = rolling_sum(inner1, window=20)\n    sum_adv40\
      \ = rolling_sum(adv40, window=20)\n    corr1 = rolling_corr(sum_inner1, sum_adv40,\
      \ window=7)\n    rank1 = rank(corr1).over('date')\n\n    # Second component:\
      \ rank(correlation(rank(vwap), rank(volume), 6))\n    rank_vwap = rank(pl.col('vwap')).over('date')\n\
      \    rank_vol = rank(pl.col('volume')).over('date')\n    corr2 = rolling_corr(rank_vwap,\
      \ rank_vol, window=6)\n    rank2 = rank(corr2).over('date')\n\n    # Final:\
      \ rank1 ^ rank2 (exponentiation)\n    factor = rank1 ** rank2\n\n    return\
      \ df.select(factor).to_series()"
