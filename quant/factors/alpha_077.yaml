  l1:
    definition: min(rank(decay_linear(((((high + low) / 2) + high) - (vwap + high)),
      20.0451)), rank(decay_linear(correlation(((high + low) / 2), adv40, 3.1614),
      5.64125)))
    formula: min(rank(decay_linear(((((high + low) / 2) + high) - (vwap + high)),
      20.0451)), rank(decay_linear(correlation(((high + low) / 2), adv40, 3.1614),
