  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv10: 10-day\
      \ rolling mean of volume (proxy for average dollar volume)\n    adv10 = rolling_mean(pl.col('volume'),\
      \ window=10)\n    \n    # Part 1:\n    # low * 0.967285 + low * (1 - 0.967285)\
      \  (algebraically = low, but compute as given)\n    low_expr = pl.col('low')\
      \ * 0.967285 + pl.col('low') * (1 - 0.967285)\n    # 6-day rolling correlation\
      \ between low_expr and adv10\n    corr = rolling_corr(low_expr, adv10, window=6)\n\
      \    # Decay linear with period 5\n    decayed = decay_linear(corr, period=5)\n\
      \    # 3-day ts_rank\n    part1 = ts_rank(decayed, window=3)\n    \n    # Part\
      \ 2:\n    # IndNeutralize(vwap, IndClass.industry) - simplified to vwap (no\
      \ industry column)\n    vwap_neutral = pl.col('vwap')\n    # Delta with 3 periods\n\
      \    vwap_delta = delta(vwap_neutral, periods=3)\n    # Decay linear with period\
      \ 10\n    vwap_decayed = decay_linear(vwap_delta, period=10)\n    # 15-day ts_rank\n\
      \    part2 = ts_rank(vwap_decayed, window=15)\n    \n    # Final factor: part1\
      \ - part2\n    factor = part1 - part2\n    \n    return df.select(factor).to_series()"
