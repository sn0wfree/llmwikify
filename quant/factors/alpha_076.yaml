  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    df = df.sort(['code',\
      \ 'date'])\n\n    # adv81: 81-day average volume\n    adv81 = ts_mean(pl.col('volume'),\
      \ window=81)\n\n    # Part 1: rank(decay_linear(delta(vwap, 1.24383), 11.8259))\n\
      \    delta_vwap = delta(pl.col('vwap'), periods=1)\n    decay_vwap = decay_linear(delta_vwap,\
      \ window=12)\n    rank_decay = rank(decay_vwap).over('date')\n\n    # Part 2:\
      \ Ts_Rank(decay_linear(Ts_Rank(correlation(IndNeutralize(low, sector), adv81,\
      \ 8.14941), 19.569), 17.1543), 19.383)\n    # No sector data available; using\
      \ neutralize as substitute for IndNeutralize\n    neutralized_low = neutralize(pl.col('low')).over('date')\n\
      \    corr = rolling_corr(neutralized_low, adv81, window=8)\n    ts_rank_corr\
      \ = ts_rank(corr, window=20)\n    decay_corr = decay_linear(ts_rank_corr, window=17)\n\
      \    final_ts_rank = ts_rank(decay_corr, window=19)\n\n    # Element-wise max\
      \ of the two parts\n    max_val = pl.max_horizontal(rank_decay, final_ts_rank)\n\
      \n    # Multiply by -1\n    factor = max_val * -1\n\n    return df.select(factor).to_series()"
