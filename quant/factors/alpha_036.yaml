    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Part 1: 2.21\
      \ * rank(correlation((close - open), delay(volume, 1), 15))\n    df = df.with_columns(\n\
      \        correlation(\n            (pl.col('close') - pl.col('open')),\n   \
      \         delay(pl.col('volume'), periods=1),\n            window=15\n     \
      \   ).alias('_corr1')\n    )\n    part1 = 2.21 * rank(pl.col('_corr1')).over('date')\n\
      \n    # Part 2: 0.7 * rank((open - close))\n    df = df.with_columns(\n    \
      \    (pl.col('open') - pl.col('close')).alias('_oc')\n    )\n    part2 = 0.7\
      \ * rank(pl.col('_oc')).over('date')\n\n    # Part 3: 0.73 * rank(Ts_Rank(delay((-1\
      \ * returns), 6), 5))\n    df = df.with_columns(\n        delay((-1 * pl.col('returns')),\
      \ periods=6).alias('_neg_ret_d6')\n    )\n    df = df.with_columns(\n      \
      \  ts_rank(pl.col('_neg_ret_d6'), window=5).alias('_ts_rank1')\n    )\n    part3\
      \ = 0.73 * rank(pl.col('_ts_rank1')).over('date')\n\n    # Part 4: rank(abs(correlation(vwap,\
      \ adv20, 6)))\n    # adv20 = 20-day average volume\n    df = df.with_columns(\n\
      \        rolling_mean(pl.col('volume'), window=20).alias('_adv20')\n    )\n\
      \    df = df.with_columns(\n        correlation(\n            pl.col('vwap'),\n\
      \            pl.col('_adv20'),\n            window=6\n        ).alias('_corr2')\n\
      \    )\n    df = df.with_columns(\n        pl.col('_corr2').abs().alias('_abs_corr2')\n\
      \    )\n    part4 = rank(pl.col('_abs_corr2')).over('date')\n\n    # Part 5:\
      \ 0.6 * rank((((sum(close, 200) / 200) - open) * (close - open)))\n    df =\
      \ df.with_columns(\n        rolling_mean(pl.col('close'), window=200).alias('_close_mean200')\n\
      \    )\n    df = df.with_columns(\n        ((pl.col('_close_mean200') - pl.col('open'))\
      \ * (pl.col('close') - pl.col('open'))).alias('_term5')\n    )\n    part5 =\
      \ 0.6 * rank(pl.col('_term5')).over('date')\n\n    # Final factor\n    factor\
      \ = part1 + part2 + part3 + part4 + part5\n\n    return df.select(factor).to_series()"
