  l1:
    definition: ((((2.21 * rank(correlation((close - open), delay(volume, 1), 15)))
      + (0.7 * rank((open - close)))) + (0.73 * rank(Ts_Rank(delay((-1 * returns),
      6), 5)))) + rank(abs(correlation(vwap, adv20, 6)))) + (
    formula: ((((2.21 * rank(correlation((close - open), delay(volume, 1), 15))) +
      (0.7 * rank((open - close)))) + (0.73 * rank(Ts_Rank(delay((-1 * returns), 6),
      5)))) + rank(abs(correlation(vwap, adv20, 6)))) + (0.6 * rank((((sum(close,
      200) / 200) - open) * (close - open)))))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - open
    - close
    - volume
    - adv20
    - vwap
    - returns
    - high
    - low
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    import polars as\
      \ pl\n\n    # adv20: average daily volume over 20 days\n    df = df.with_columns(ts_mean(pl.col('volume'),\
      \ window=20).alias('_adv20'))\n\n    # correlation((close - open), delay(volume,\
      \ 1), 15)\n    df = df.with_columns(\n        correlation(\n            pl.col('close')\
      \ - pl.col('open'),\n            delay(pl.col('volume'), periods=1),\n     \
      \       window=15\n        ).alias('_corr1')\n    )\n\n    # ts_rank(delay(-1\
      \ * returns, 6), 5)\n    df = df.with_columns(\n        ts_rank(delay(-1 * pl.col('returns'),\
      \ periods=6), window=5).alias('_tsrank')\n    )\n\n    # abs(correlation(vwap,\
      \ adv20, 6))\n    df = df.with_columns(\n        correlation(pl.col('vwap'),\
      \ pl.col('_adv20'), window=6).abs().alias('_corr2')\n    )\n\n    # ((sum(close,\
      \ 200) / 200) - open) * (close - open)\n    df = df.with_columns(\n        (((ts_sum(pl.col('close'),\
      \ window=200) / 200) - pl.col('open')) * (pl.col('close') - pl.col('open'))).alias('_inner5')\n\
      \    )\n\n    # Final factor: weighted sum of cross-sectional ranks\n    factor\
      \ = (\n        2.21 * rank(pl.col('_corr1')).over('date')\n        + 0.7 * rank(pl.col('open')\
      \ - pl.col('close')).over('date')\n        + 0.73 * rank(pl.col('_tsrank')).over('date')\n\
      \        + rank(pl.col('_corr2')).over('date')\n        + 0.6 * rank(pl.col('_inner5')).over('date')\n\
      \    )\n\n    return df.select(factor).to_series()"
    code_compile_status: success
