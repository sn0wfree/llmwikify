  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    df = df.sort(['code',\
      \ 'date'])\n    \n    # Component 1: 2.21 * rank(correlation((close - open),\
      \ delay(volume, 1), 15))\n    close_open = pl.col('close') - pl.col('open')\n\
      \    delayed_vol = delay(pl.col('volume'), periods=1)\n    corr1 = correlation(close_open,\
      \ delayed_vol, window=15)\n    comp1 = 2.21 * rank(corr1).over('date')\n   \
      \ \n    # Component 2: 0.7 * rank((open - close))\n    comp2 = 0.7 * rank(pl.col('open')\
      \ - pl.col('close')).over('date')\n    \n    # Component 3: 0.73 * rank(Ts_Rank(delay((-1\
      \ * returns), 6), 5))\n    neg_returns = -1 * pl.col('returns')\n    delayed_neg_ret\
      \ = delay(neg_returns, periods=6)\n    ts_rank_val = ts_rank(delayed_neg_ret,\
      \ window=5)\n    comp3 = 0.73 * rank(ts_rank_val).over('date')\n    \n    #\
      \ Component 4: rank(abs(correlation(vwap, adv20, 6)))\n    adv20 = rolling_mean(pl.col('volume'),\
      \ window=20)\n    corr4 = correlation(pl.col('vwap'), adv20, window=6)\n   \
      \ comp4 = rank(corr4.abs()).over('date')\n    \n    # Component 5: 0.6 * rank((((sum(close,\
      \ 200) / 200) - open) * (close - open)))\n    sum_close_200 = rolling_sum(pl.col('close'),\
      \ window=200)\n    inner5 = ((sum_close_200 / 200) - pl.col('open')) * (pl.col('close')\
      \ - pl.col('open'))\n    comp5 = 0.6 * rank(inner5).over('date')\n    \n   \
      \ # Sum all components\n    factor = comp1 + comp2 + comp3 + comp4 + comp5\n\
      \    \n    return df.select(factor).to_series()"
