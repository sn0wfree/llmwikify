    formula: ((((2.21 * rank(correlation((close - open), delay(volume, 1), 15))) +
      (0.7 * rank((open - close)))) + (0.73 * rank(Ts_Rank(delay((-1 * returns), 6),
      5)))) + rank(abs(correlation(vwap, adv20, 6)))) + (0.6 * rank((((sum(close,
      200) / 200) - open) * (close - open)))))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - open
    - close
    - volume
    - adv20
    - vwap
    - returns
    - high
