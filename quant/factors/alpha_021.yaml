  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # 8-day and 2-day\
      \ moving averages of close\n    ma8 = rolling_mean(pl.col('close'), window=8)\n\
      \    ma2 = rolling_mean(pl.col('close'), window=2)\n\n    # 8-day rolling stddev\
      \ of close\n    std8 = rolling_std(pl.col('close'), window=8)\n\n    # 20-day\
      \ average volume (adv20)\n    adv20 = rolling_mean(pl.col('volume'), window=20)\n\
      \n    # Nested conditional logic\n    cond1 = (ma8 + std8) < ma2\n    cond2\
      \ = ma2 < (ma8 - std8)\n    cond3 = (pl.col('volume') / adv20) >= 1  # (1 <\
      \ vol/adv20) || (vol/adv20 == 1)\n\n    factor = (\n        pl.when(cond1)\n\
      \        .then(-1)\n        .otherwise(\n            pl.when(cond2)\n      \
      \      .then(1)\n            .otherwise(\n                pl.when(cond3).then(1).otherwise(-1)\n\
      \            )\n        )\n    )\n\n    return df.select(factor).to_series()"
