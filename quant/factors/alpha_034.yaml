factor:
  name: alpha_034
  asset_type: stock
  category: formulaic
  status: 已验证
  updated_at: '2026-06-23'
  l1:
    definition: rank(((1 - rank((stddev(returns, 2) / stddev(returns, 5)))) + (1 -
      rank(delta(close, 1)))))
    formula: rank(((1 - rank((stddev(returns, 2) / stddev(returns, 5)))) + (1 - rank(delta(close,
      1)))))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - close
    - returns
    - open
    - high
    - low
    - volume
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Time-series operators\
      \ (df already sorted by code, date)\n    std_2 = rolling_std(pl.col('returns'),\
      \ window=2)\n    std_5 = rolling_std(pl.col('returns'), window=5)\n\n    # Ratio\
      \ of short-term to medium-term return volatility\n    ratio = std_2 / std_5\n\
      \n    # Cross-sectional rank of the ratio\n    rank_ratio = rank(ratio).over('date')\n\
      \n    # Delta of close over 1 period, cross-sectionally ranked\n    rank_delta\
      \ = rank(delta(pl.col('close'), periods=1)).over('date')\n\n    # Combine: (1\
      \ - rank(ratio)) + (1 - rank(delta))\n    inner = (1 - rank_ratio) + (1 - rank_delta)\n\
      \n    # Final cross-sectional rank\n    factor = rank(inner).over('date')\n\n\
      \    return df.select(factor).to_series()"
