  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv20 = 20-day\
      \ rolling mean of volume (proxy for average daily volume)\n    adv20 = rolling_mean(pl.col('volume'),\
      \ window=20)\n    \n    # ts_min(high, 2.14593) - window rounds to 2\n    high_min\
      \ = ts_min(pl.col('high'), window=2)\n    \n    # high - ts_min(high, 2)\n \
      \   high_diff = pl.col('high') - high_min\n    \n    # Cross-sectional rank\
      \ of (high - ts_min(high, 2))\n    rank1 = rank(high_diff).over('date')\n  \
      \  \n    # IndNeutralize vwap by sector, and adv20 by subindustry.\n    # Since\
      \ industry classification columns are not available in df,\n    # we pass the\
      \ values through unchanged.\n    vwap_neut = pl.col('vwap')\n    adv20_neut\
      \ = adv20\n    \n    # rolling correlation between IndNeutralize(vwap) and IndNeutralize(adv20)\n\
      \    # window 6.02936 rounds to 6\n    corr = rolling_corr(vwap_neut, adv20_neut,\
      \ window=6)\n    \n    # Cross-sectional rank of the correlation\n    rank2\
      \ = rank(corr).over('date')\n    \n    # rank1^rank2 (exponentiation)\n    power\
      \ = rank1 ** rank2\n    \n    # Multiply by -1\n    factor = power * -1\n  \
      \  \n    return df.select(factor).to_series()"
