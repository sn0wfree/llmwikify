  l1:
    definition: ((rank((high - ts_min(high, 2.14593)))^rank(correlation(IndNeutralize(vwap,
      IndClass.sector), IndNeutralize(adv20, IndClass.subindustry), 6.02936))) * -1)
    formula: ((rank((high - ts_min(high, 2.14593)))^rank(correlation(IndNeutralize(vwap,
      IndClass.sector), IndNeutralize(adv20, IndClass.subindustry), 6.02936))) * -1)
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - high
    - adv20
    - vwap
    - industry
    - close
    - open
    - low
    - volume
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv20: 20-day\
      \ average daily volume\n    df = df.with_columns(\n        rolling_mean(pl.col('volume'),\
      \ window=20).alias('_adv20')\n    )\n\n    # ts_min(high, 2.14593) -> use window\
      \ 2 (floor)\n    df = df.with_columns(\n        ts_min(pl.col('high'), window=2).alias('_ts_min_high')\n\
      \    )\n\n    # high - ts_min(high, 2.14593)\n    df = df.with_columns(\n  \
      \      (pl.col('high') - pl.col('_ts_min_high')).alias('_high_diff')\n    )\n\
      \n    # Materialize rank(high - ts_min(high, 2.14593)) cross-sectionally\n \
      \   df = df.with_columns(\n        rank(pl.col('_high_diff')).over('date').alias('_rank_a')\n\
      \    )\n\n    # Materialize rolling correlation: correlation(IndNeutralize(vwap,\
      \ sector), IndNeutralize(adv20, subindustry), 6.02936)\n    # Use within-group\
      \ demean as proxy for neutralize, then rolling correlation window=6\n    df\
      \ = df.with_columns(\n        (pl.col('vwap') - pl.col('vwap').mean().over(['date',\
      \ 'industry'])).alias('_vwap_neut')\n    )\n    df = df.with_columns(\n    \
      \    (pl.col('_adv20') - pl.col('_adv20').mean().over(['date', 'industry'])).alias('_adv20_neut')\n\
      \    )\n    df = df.with_columns(\n        rolling_corr(pl.col('_vwap_neut'),\
      \ pl.col('_adv20_neut'), window=6).alias('_corr')\n    )\n\n    # Materialize\
      \ rank of correlation cross-sectionally\n    df = df.with_columns(\n       \
      \ rank(pl.col('_corr')).over('date').alias('_rank_b')\n    )\n\n    # Final\
      \ factor: ((rank(A) ^ rank(B)) * -1)\n    factor = (pl.col('_rank_a') ** pl.col('_rank_b'))\
      \ * (-1)\n\n    return df.select(factor).to_series()"
