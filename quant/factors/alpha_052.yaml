  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Materialize the\
      \ rolling sum expression first (time-series result)\n    # before applying cross-sectional\
      \ rank, to avoid re-evaluation within date groups\n    df = df.with_columns(\n\
      \        ((rolling_sum(pl.col('returns'), window=240) - rolling_sum(pl.col('returns'),\
      \ window=20)) / 220).alias('_sum_diff')\n    )\n    \n    # Compute the factor\n\
      \    # Part 1: (-1 * ts_min(low, 5)) + delay(ts_min(low, 5), 5)\n    part1 =\
      \ (-1 * ts_min(pl.col('low'), window=5)) + delay(ts_min(pl.col('low'), window=5),\
      \ periods=5)\n    \n    # Part 2: cross-sectional rank of the materialized sum_diff\n\
      \    part2 = rank(pl.col('_sum_diff')).over('date')\n    \n    # Part 3: ts_rank(volume,\
      \ 5)\n    part3 = ts_rank(pl.col('volume'), window=5)\n    \n    # Final factor\n\
      \    factor = part1 * part2 * part3\n    \n    return df.select(factor).to_series()"
