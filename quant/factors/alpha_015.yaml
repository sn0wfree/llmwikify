  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    df = df.sort(['code',\
      \ 'date'])\n    \n    # Cross-sectional ranks\n    rank_high = rank(pl.col('high')).over('date')\n\
      \    rank_volume = rank(pl.col('volume')).over('date')\n    \n    # 3-day rolling\
      \ correlation between ranked high and ranked volume\n    corr = rolling_corr(rank_high,\
      \ rank_volume, window=3)\n    \n    # Cross-sectional rank of the correlation\n\
      \    rank_corr = rank(corr).over('date')\n    \n    # 3-day rolling sum of the\
      \ ranked correlation\n    sum_corr = ts_sum(rank_corr, window=3)\n    \n   \
      \ # Multiply by -1\n    factor = -1 * sum_corr\n    \n    return df.select(factor).to_series()"
