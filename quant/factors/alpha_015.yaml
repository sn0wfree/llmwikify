    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Step 1: cross-sectional\
      \ rank of high and volume\n    df = df.with_columns([\n        rank(pl.col('high')).over('date').alias('_rank_high'),\n\
      \        rank(pl.col('volume')).over('date').alias('_rank_volume')\n    ])\n\
      \    \n    # Step 2: rolling correlation of the two ranks (window=3) - materialize\
      \ first\n    df = df.with_columns(\n        correlation(pl.col('_rank_high'),\
      \ pl.col('_rank_volume'), window=3).alias('_corr')\n    )\n    \n    # Step\
      \ 3: cross-sectional rank of the correlation (on materialized column)\n    df\
      \ = df.with_columns(\n        rank(pl.col('_corr')).over('date').alias('_rank_corr')\n\
      \    )\n    \n    # Step 4: rolling sum with window=3\n    df = df.with_columns(\n\
      \        rolling_sum(pl.col('_rank_corr'), window=3).alias('_sum')\n    )\n\
      \    \n    # Step 5: negate\n    factor = -1 * pl.col('_sum')\n    \n    return\
      \ df.select(factor).to_series()"
