  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # 1. Compute (open\
      \ - close)\n    diff = pl.col('open') - pl.col('close')\n\n    # 2. Materialize\
      \ the time-series correlation BEFORE cross-section rank\n    #    correlation(\
      \ delay(open-close, 1), close, window=200 )\n    df = df.with_columns(\n   \
      \     correlation(\n            delay(diff, periods=1),\n            pl.col('close'),\n\
      \            window=200\n        ).alias('_corr')\n    )\n\n    # 3. Cross-sectional:\
      \ rank(correlation) + rank(open - close)\n    factor = (\n        rank(pl.col('_corr')).over('date')\n\
      \        + rank(diff).over('date')\n    )\n\n    return df.select(factor).to_series()"
