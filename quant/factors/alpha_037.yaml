  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # (open - close)\n\
      \    oc_diff = pl.col('open') - pl.col('close')\n\n    # delay((open - close),\
      \ 1)\n    delayed_oc = delay(oc_diff, periods=1)\n\n    # correlation(delay((open\
      \ - close), 1), close, 200)\n    corr = rolling_corr(delayed_oc, pl.col('close'),\
      \ window=200)\n\n    # rank(correlation(...)) — cross-sectional rank per date\n\
      \    rank_corr = rank(corr).over('date')\n\n    # rank((open - close)) — cross-sectional\
      \ rank per date\n    rank_oc = rank(oc_diff).over('date')\n\n    # Final factor:\
      \ sum of the two ranks\n    factor = rank_corr + rank_oc\n\n    return df.select(factor).to_series()"
