    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Step 1: open\
      \ - close\n    df = df.with_columns(\n        (pl.col('open') - pl.col('close')).alias('_oc')\n\
      \    )\n    # Step 2: delay by 1 period\n    df = df.with_columns(\n       \
      \ delay(pl.col('_oc'), periods=1).alias('_oc_lag1')\n    )\n    # Step 3: materialize\
      \ 200-day correlation (Rule 2)\n    df = df.with_columns(\n        correlation(pl.col('_oc_lag1'),\
      \ pl.col('close'), window=200).alias('_corr')\n    )\n    # Step 4: rank the\
      \ correlation cross-sectionally\n    df = df.with_columns(\n        rank(pl.col('_corr')).over('date').alias('_rank_corr')\n\
      \    )\n    # Step 5: rank (open - close) cross-sectionally\n    df = df.with_columns(\n\
      \        rank(pl.col('_oc')).over('date').alias('_rank_oc')\n    )\n    # Step\
      \ 6: sum of the two ranks\n    factor = pl.col('_rank_corr') + pl.col('_rank_oc')\n\
      \    return df.select(factor).to_series()"
