  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Cross-sectional\
      \ differences using delayed (lagged) values\n    open_minus_high = pl.col('open')\
      \ - delay(pl.col('high'), periods=1)\n    open_minus_close = pl.col('open')\
      \ - delay(pl.col('close'), periods=1)\n    open_minus_low = pl.col('open') -\
      \ delay(pl.col('low'), periods=1)\n\n    # Cross-sectional rank per date for\
      \ each term\n    rank1 = rank(open_minus_high).over('date')\n    rank2 = rank(open_minus_close).over('date')\n\
      \    rank3 = rank(open_minus_low).over('date')\n\n    # Combine: -1 * rank1\
      \ * rank2 * rank3\n    factor = -1 * rank1 * rank2 * rank3\n\n    return df.select(factor).to_series()"
