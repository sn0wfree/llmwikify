  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Step 1: Compute\
      \ adv180 = 180-day average daily volume (time-series, materialised)\n    df\
      \ = df.with_columns(\n        ts_mean(pl.col('volume'), window=180).alias('_adv180')\n\
      \    )\n\n    # Step 2: Compute time-series components and materialise them\n\
      \    # (a) vwap - ts_min(vwap, ~16)\n    # (b) correlation(vwap, adv180, ~18)\n\
      \    df = df.with_columns(\n        (pl.col('vwap') - ts_min(pl.col('vwap'),\
      \ window=16)).alias('_diff_vwap'),\n        correlation(pl.col('vwap'), pl.col('_adv180'),\
      \ window=18).alias('_corr_vwap_adv')\n    )\n\n    # Step 3: Cross-sectional\
      \ ranks per date on the materialised columns\n    rank_diff = rank(pl.col('_diff_vwap')).over('date')\n\
      \    rank_corr = rank(pl.col('_corr_vwap_adv')).over('date')\n\n    # Step 4:\
      \ Compare the two ranks; cast boolean to float (1.0 / 0.0)\n    factor = (rank_diff\
      \ < rank_corr).cast(pl.Float64)\n\n    return df.select(factor).to_series()"
