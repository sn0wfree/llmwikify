    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Step 1 & 2: cross-sectional\
      \ ranks of volume and vwap\n    df = df.with_columns([\n        rank(pl.col('volume')).over('date').alias('_rank_volume'),\n\
      \        rank(pl.col('vwap')).over('date').alias('_rank_vwap')\n    ])\n   \
      \ # Step 3: rolling correlation (must materialize before rank().over('date'))\n\
      \    df = df.with_columns(\n        correlation(pl.col('_rank_volume'), pl.col('_rank_vwap'),\
      \ window=5).alias('_corr')\n    )\n    # Step 4: cross-sectional rank of the\
      \ correlation\n    df = df.with_columns(\n        rank(pl.col('_corr')).over('date').alias('_rank_corr')\n\
      \    )\n    # Step 5 & 6: ts_max with window 5, then negate\n    df = df.with_columns(\n\
      \        ts_max(pl.col('_rank_corr'), window=5).alias('_tsmax')\n    )\n   \
      \ factor = -1 * pl.col('_tsmax')\n    return df.select(factor).to_series()"
