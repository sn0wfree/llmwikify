  l1:
    definition: (-1 * ts_max(rank(correlation(rank(volume), rank(vwap), 5)), 5))
    formula: (-1 * ts_max(rank(correlation(rank(volume), rank(vwap), 5)), 5))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - volume
    - vwap
