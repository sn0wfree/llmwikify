factor:
  name: alpha_056
  asset_type: stock
  category: formulaic
  status: 已验证
  updated_at: '2026-06-24'
  l1:
    definition: (0 - (1 * (rank((sum(returns, 10) / sum(sum(returns, 2), 3))) * rank((returns
      * cap)))))
    formula: (0 - (1 * (rank((sum(returns, 10) / sum(sum(returns, 2), 3))) * rank((returns
      * cap)))))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - returns
    - cap
    - close
    - open
    - high
    - low
    - volume
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # sum(returns,\
      \ 10)\n    df = df.with_columns(\n        rolling_sum(pl.col('returns'), window=10).alias('_sum_ret_10')\n\
      \    )\n    # sum(returns, 2)\n    df = df.with_columns(\n        rolling_sum(pl.col('returns'),\
      \ window=2).alias('_sum_ret_2')\n    )\n    # sum(sum(returns, 2), 3) - rolling\
      \ sum of the 2-period sums over 3 periods\n    df = df.with_columns(\n     \
      \   rolling_sum(pl.col('_sum_ret_2'), window=3).alias('_sum_sum_ret_2_3')\n\
      \    )\n    # ratio: sum(returns, 10) / sum(sum(returns, 2), 3)\n    df = df.with_columns(\n\
      \        (pl.col('_sum_ret_10') / pl.col('_sum_sum_ret_2_3')).alias('_ratio')\n\
      \    )\n    # cap proxy using close * volume (no cap column available)\n   \
      \ df = df.with_columns(\n        (pl.col('returns') * pl.col('close') * pl.col('volume')).alias('_ret_cap')\n\
      \    )\n    # rank(ratio) - cross-sectional\n    df = df.with_columns(\n   \
      \     rank(pl.col('_ratio')).over('date').alias('_rank_ratio')\n    )\n    #\
      \ rank(returns * cap) - cross-sectional\n    df = df.with_columns(\n       \
      \ rank(pl.col('_ret_cap')).over('date').alias('_rank_ret_cap')\n    )\n    #\
      \ 0 - (1 * (rank(ratio) * rank(ret_cap)))\n    factor = -(pl.col('_rank_ratio')\
      \ * pl.col('_rank_ret_cap'))\n    return df.select(factor).to_series()"
