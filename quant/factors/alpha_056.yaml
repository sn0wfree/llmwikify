  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Inner: sum(returns,\
      \ 2) - 2-period rolling sum of returns\n    sum_ret_2 = rolling_sum(pl.col('returns'),\
      \ window=2)\n    \n    # Outer: sum(sum(returns, 2), 3) - 3-period rolling sum\
      \ of the above\n    sum_sum_ret_2_3 = rolling_sum(sum_ret_2, window=3)\n   \
      \ \n    # Ratio: sum(returns, 10) / sum(sum(returns, 2), 3)\n    ratio = rolling_sum(pl.col('returns'),\
      \ window=10) / sum_sum_ret_2_3\n    \n    # Cross-sectional rank of the ratio\n\
      \    rank_ratio = rank(ratio).over('date')\n    \n    # returns * cap (using\
      \ vwap as proxy since cap is not in the schema)\n    ret_cap = pl.col('returns')\
      \ * pl.col('vwap')\n    \n    # Cross-sectional rank of returns*cap\n    rank_ret_cap\
      \ = rank(ret_cap).over('date')\n    \n    # Final factor: -(rank_ratio * rank_ret_cap)\n\
      \    factor = -(rank_ratio * rank_ret_cap)\n    \n    return df.select(factor).to_series()"
