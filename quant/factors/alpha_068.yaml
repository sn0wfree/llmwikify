  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv15: 15-day\
      \ average daily volume\n    df = df.with_columns(\n        rolling_mean(pl.col('volume'),\
      \ window=15).alias('_adv15')\n    )\n\n    # Cross-sectional ranks of high and\
      \ adv15 (materialized before correlation)\n    df = df.with_columns(\n     \
      \   rank(pl.col('high')).over('date').alias('_rank_high'),\n        rank(pl.col('_adv15')).over('date').alias('_rank_adv15')\n\
      \    )\n\n    # Rolling correlation between the ranks (window 8.91644 -> 9)\n\
      \    df = df.with_columns(\n        correlation(pl.col('_rank_high'), pl.col('_rank_adv15'),\
      \ window=9).alias('_corr')\n    )\n\n    # Time-series rank of the correlation\
      \ (window 13.9333 -> 14)\n    df = df.with_columns(\n        ts_rank(pl.col('_corr'),\
      \ window=14).alias('_ts_rank_corr')\n    )\n\n    # Weighted price: 0.518371\
      \ * close + (1 - 0.518371) * low\n    weighted = pl.col('close') * 0.518371\
      \ + pl.col('low') * (1 - 0.518371)\n\n    # Delta with period 1.06157 -> 1\n\
      \    df = df.with_columns(\n        delta(weighted, periods=1).alias('_delta_weighted')\n\
      \    )\n\n    # Cross-sectional rank of the delta\n    df = df.with_columns(\n\
      \        rank(pl.col('_delta_weighted')).over('date').alias('_rank_delta')\n\
      \    )\n\n    # (ts_rank_corr < rank_delta) * -1\n    cond = pl.col('_ts_rank_corr')\
      \ < pl.col('_rank_delta')\n    factor = cond.cast(pl.Float64) * -1.0\n\n   \
      \ return df.select(factor).to_series()"
