  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv15 = average\
      \ dollar volume over 15 days\n    df = df.with_columns(\n        rolling_mean(pl.col('close')\
      \ * pl.col('volume'), window=15).alias('_adv15')\n    )\n    \n    # Cross-sectional\
      \ ranks per date (materialize before using in ts operators)\n    df = df.with_columns([\n\
      \        rank(pl.col('high')).over('date').alias('_rank_high'),\n        rank(pl.col('_adv15')).over('date').alias('_rank_adv15')\n\
      \    ])\n    \n    # Rolling correlation between rank(high) and rank(adv15)\n\
      \    df = df.with_columns(\n        correlation(pl.col('_rank_high'), pl.col('_rank_adv15'),\
      \ window=8).alias('_corr')\n    )\n    \n    # Ts_Rank of the correlation\n\
      \    df = df.with_columns(\n        ts_rank(pl.col('_corr'), window=13).alias('_tsrank')\n\
      \    )\n    \n    # Weighted price: close * 0.518371 + low * (1 - 0.518371)\n\
      \    df = df.with_columns(\n        (pl.col('close') * 0.518371 + pl.col('low')\
      \ * (1 - 0.518371)).alias('_wprice')\n    )\n    \n    # Delta of the weighted\
      \ price (periods = int(1.06157) = 1)\n    df = df.with_columns(\n        delta(pl.col('_wprice'),\
      \ periods=1).alias('_delta_wprice')\n    )\n    \n    # Cross-sectional rank\
      \ of delta\n    df = df.with_columns(\n        rank(pl.col('_delta_wprice')).over('date').alias('_rank_delta')\n\
      \    )\n    \n    # Final factor: -1 * (Ts_Rank < rank(delta(...)))\n    factor\
      \ = (pl.col('_tsrank') < pl.col('_rank_delta')) * -1\n    \n    return df.select(factor).to_series()"
