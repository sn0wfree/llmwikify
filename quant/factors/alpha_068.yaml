  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv15 = rolling\
      \ mean of volume over 15 days\n    df = df.with_columns(rolling_mean(pl.col('volume'),\
      \ window=15).alias('_adv15'))\n\n    # cross-sectional ranks of high and adv15\n\
      \    df = df.with_columns([\n        rank(pl.col('high')).over('date').alias('_rank_high'),\n\
      \        rank(pl.col('_adv15')).over('date').alias('_rank_adv15')\n    ])\n\n\
      \    # rolling correlation of the two ranks (window rounded from 8.91644 ->\
      \ 9)\n    df = df.with_columns(\n        rolling_corr(pl.col('_rank_high'),\
      \ pl.col('_rank_adv15'), window=9).alias('_corr')\n    )\n\n    # ts_rank of\
      \ correlation (window rounded from 13.9333 -> 14)\n    df = df.with_columns(\n\
      \        ts_rank(pl.col('_corr'), window=14).alias('_ts_rank_corr')\n    )\n\
      \n    # weighted close+low combination, then delta (period rounded from 1.06157\
      \ -> 1)\n    weighted = pl.col('close') * 0.518371 + pl.col('low') * (1 - 0.518371)\n\
      \    df = df.with_columns(delta(weighted, 1).alias('_delta'))\n\n    # cross-sectional\
      \ rank of delta\n    df = df.with_columns(\n        rank(pl.col('_delta')).over('date').alias('_rank_delta')\n\
      \    )\n\n    # compare and multiply by -1\n    factor = pl.when(pl.col('_ts_rank_corr')\
      \ < pl.col('_rank_delta')).then(-1).otherwise(0)\n\n    return df.select(factor).to_series()"
