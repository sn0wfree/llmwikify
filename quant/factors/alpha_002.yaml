factor:
  name: alpha_002
  asset_type: stock
  category: formulaic
  status: 已验证
  updated_at: '2026-06-23'
  l1:
    definition: (-1 * correlation(rank(delta(log(volume), 2)), rank(((close - open)
      / open)), 6))
    formula: (-1 * correlation(rank(delta(log(volume), 2)), rank(((close - open) /
      open)), 6))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - open
    - close
    - volume
    - high
    - low
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # 1. delta of log(volume)\
      \ with period 2\n    log_vol = pl.col('volume').log()\n    delta_log_vol = delta(log_vol,\
      \ periods=2)\n\n    # 2. cross-section rank of delta_log_vol\n    rank1 = rank(delta_log_vol).over('date')\n\
      \n    # 3. (close - open) / open\n    price_change = (pl.col('close') - pl.col('open'))\
      \ / pl.col('open')\n\n    # 4. cross-section rank of price change\n    rank2\
      \ = rank(price_change).over('date')\n\n    # 5. 6-period rolling correlation\
      \ between the two ranked series\n    corr = correlation(rank1, rank2, window=6)\n\
      \n    # 6. negate\n    factor = -1 * corr\n\n    return df.select(factor).to_series()"
