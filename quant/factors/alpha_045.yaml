  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # delay(close,\
      \ 5) - delay close by 5 periods\n    close_delayed = delay(pl.col('close'),\
      \ periods=5)\n    \n    # sum(delay(close, 5), 20) / 20\n    avg_delayed = rolling_sum(close_delayed,\
      \ window=20) / 20\n    \n    # rank(sum(delay(close, 5), 20) / 20)\n    rank_avg\
      \ = rank(avg_delayed).over('date')\n    \n    # correlation(close, volume, 2)\n\
      \    corr_cv = rolling_corr(pl.col('close'), pl.col('volume'), window=2)\n \
      \   \n    # sum(close, 5)\n    sum_close_5 = rolling_sum(pl.col('close'), window=5)\n\
      \    \n    # sum(close, 20)\n    sum_close_20 = rolling_sum(pl.col('close'),\
      \ window=20)\n    \n    # correlation(sum(close, 5), sum(close, 20), 2)\n  \
      \  corr_sums = rolling_corr(sum_close_5, sum_close_20, window=2)\n    \n   \
      \ # rank(correlation(sum(close, 5), sum(close, 20), 2))\n    rank_corr_sums\
      \ = rank(corr_sums).over('date')\n    \n    # -1 * rank(...) * correlation(...)\
      \ * rank(...)\n    factor = -1 * rank_avg * corr_cv * rank_corr_sums\n    \n\
      \    return df.select(factor).to_series()"
