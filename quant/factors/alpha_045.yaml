factor:
  name: alpha_045
  asset_type: stock
  category: formulaic
  status: 已验证
  updated_at: '2026-06-24'
  l1:
    definition: (-1 * ((rank((sum(delay(close, 5), 20) / 20)) * correlation(close,
      volume, 2)) * rank(correlation(sum(close, 5), sum(close, 20), 2))))
    formula: (-1 * ((rank((sum(delay(close, 5), 20) / 20)) * correlation(close, volume,
      2)) * rank(correlation(sum(close, 5), sum(close, 20), 2))))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - close
    - volume
    - open
    - high
    - low
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # delay(close,\
      \ 5)\n    df = df.with_columns(\n        delay(pl.col('close'), 5).alias('_delay_close')\n\
      \    )\n    # sum(delay(close, 5), 20) / 20\n    df = df.with_columns(\n   \
      \     (rolling_sum(pl.col('_delay_close'), window=20) / 20).alias('_term1')\n\
      \    )\n    # correlation(close, volume, 2)\n    df = df.with_columns(\n   \
      \     rolling_corr(pl.col('close'), pl.col('volume'), window=2).alias('_corr1')\n\
      \    )\n    # sum(close, 5) and sum(close, 20)\n    df = df.with_columns(\n\
      \        rolling_sum(pl.col('close'), window=5).alias('_sum5')\n    )\n    df\
      \ = df.with_columns(\n        rolling_sum(pl.col('close'), window=20).alias('_sum20')\n\
      \    )\n    # correlation(sum(close, 5), sum(close, 20), 2)\n    df = df.with_columns(\n\
      \        rolling_corr(pl.col('_sum5'), pl.col('_sum20'), window=2).alias('_corr2')\n\
      \    )\n    # rank((sum(delay(close, 5), 20) / 20)) * correlation(close, volume,\
      \ 2)\n    df = df.with_columns(\n        (rank(pl.col('_term1')).over('date')\
      \ * pl.col('_corr1')).alias('_part1')\n    )\n    # rank(correlation(sum(close,\
      \ 5), sum(close, 20), 2))\n    df = df.with_columns(\n        rank(pl.col('_corr2')).over('date').alias('_part2')\n\
      \    )\n    # final factor: -1 * (part1 * part2)\n    factor = -1 * (pl.col('_part1')\
      \ * pl.col('_part2'))\n    return df.select(factor).to_series()"
