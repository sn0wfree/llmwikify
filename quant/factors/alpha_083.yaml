factor:
  name: alpha_083
  asset_type: stock
  category: formulaic
  status: 已验证
  updated_at: '2026-06-23'
  l1:
    definition: ((rank(delay(((high - low) / (sum(close, 5) / 5)), 2)) * rank(rank(volume)))
      / (((high - low) / (sum(close, 5) / 5)) / (vwap - close)))
    formula: ((rank(delay(((high - low) / (sum(close, 5) / 5)), 2)) * rank(rank(volume)))
      / (((high - low) / (sum(close, 5) / 5)) / (vwap - close)))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - high
    - low
    - close
    - volume
    - vwap
    - open
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # (high - low)\
      \ / (sum(close, 5) / 5)\n    sum_close_5 = rolling_sum(pl.col('close'), window=5)\n\
      \    hl = pl.col('high') - pl.col('low')\n    inner1 = hl / (sum_close_5 / 5)\n\
      \    \n    # delay by 2 periods\n    delayed = delay(inner1, periods=2)\n  \
      \  \n    # rank(delay(...)) - cross-section\n    rank_delayed = rank(delayed).over('date')\n\
      \    \n    # rank(rank(volume)) - cross-section\n    rank_vol = rank(pl.col('volume')).over('date')\n\
      \    rank_rank_vol = rank(rank_vol).over('date')\n    \n    # numerator: rank(delay)\
      \ * rank(rank(volume))\n    numerator = rank_delayed * rank_rank_vol\n    \n\
      \    # denominator: ((high - low) / (sum(close,5)/5)) / (vwap - close)\n   \
      \ vwap_close_diff = pl.col('vwap') - pl.col('close')\n    denominator = inner1\
      \ / vwap_close_diff\n    \n    # final factor\n    factor = numerator / denominator\n\
      \    \n    return df.select(factor).to_series()"
    code_compile_status: success
    code_chars: 908
