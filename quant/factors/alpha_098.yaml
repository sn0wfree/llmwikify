  l1:
    definition: (rank(decay_linear(correlation(vwap, sum(adv5, 26.4719), 4.58418),
      7.18088)) - rank(decay_linear(Ts_Rank(Ts_ArgMin(correlation(rank(open), rank(adv15),
      20.8187), 8.62571), 6.95668), 8.07206)))
    formula: (rank(decay_linear(correlation(vwap, sum(adv5, 26.4719), 4.58418), 7.18088))
      - rank(decay_linear(Ts_Rank(Ts_ArgMin(correlation(rank(open), rank(adv15), 20.8187),
      8.62571), 6.95668), 8.07206)))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - open
    - vwap
    - close
    - high
    - low
    - volume
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Part 1: rank(decay_linear(correlation(vwap,\
      \ sum(adv5, 26.4719), 4.58418), 7.18088))\n    adv5 = rolling_mean(pl.col('volume'),\
      \ window=5)\n    sum_adv5 = rolling_sum(adv5, window=26)\n    corr1 = rolling_corr(pl.col('vwap'),\
      \ sum_adv5, window=4)\n    decay1 = decay_linear(corr1, window=7)\n    rank1\
      \ = rank(decay1).over('date')\n\n    # Part 2: rank(decay_linear(Ts_Rank(Ts_ArgMin(correlation(rank(open),\
      \ rank(adv15), 20.8187), 8.62571), 6.95668), 8.07206))\n    adv15 = rolling_mean(pl.col('volume'),\
      \ window=15)\n    rank_open = rank(pl.col('open')).over('date')\n    rank_adv15\
      \ = rank(adv15).over('date')\n    corr2 = rolling_corr(rank_open, rank_adv15,\
      \ window=20)\n    argmin_corr2 = ts_argmin(corr2, window=8)\n    ts_rank2 =\
      \ ts_rank(argmin_corr2, window=6)\n    decay2 = decay_linear(ts_rank2, window=8)\n\
      \    rank2 = rank(decay2).over('date')\n\n    factor = rank1 - rank2\n    return\
      \ df.select(factor).to_series()"
    code_compile_status: success
    code_chars: 957
