factor:
  name: alpha_043
  asset_type: stock
  category: formulaic
  status: 已验证
  updated_at: '2026-06-23'
  l1:
    definition: (ts_rank((volume / adv20), 20) * ts_rank((-1 * delta(close, 7)), 8))
    formula: (ts_rank((volume / adv20), 20) * ts_rank((-1 * delta(close, 7)), 8))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - close
    - volume
    - adv20
    - open
    - high
    - low
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv20 = 20-day\
      \ average volume (per-code time-series, no .over needed)\n    adv20 = ts_mean(pl.col('volume'),\
      \ 20)\n\n    # term1: ts_rank((volume / adv20), 20)\n    vol_ratio = pl.col('volume')\
      \ / adv20\n    part1 = ts_rank(vol_ratio, 20)\n\n    # term2: ts_rank((-1 *\
      \ delta(close, 7)), 8)\n    delta_close = delta(pl.col('close'), periods=7)\n\
      \    neg_delta = -1 * delta_close\n    part2 = ts_rank(neg_delta, 8)\n\n   \
      \ # factor = product of the two terms\n    factor = part1 * part2\n\n    return\
      \ df.select(factor).to_series()"
    code_compile_status: success
