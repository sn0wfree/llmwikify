  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Materialize rolling\
      \ sum (must materialize before .over('date') per Rule 2)\n    df = df.with_columns(\n\
      \        rolling_sum(pl.col('returns'), window=250).alias('_sum_ret_250')\n\
      \    )\n    \n    # sign of ((close - delay(close, 7)) + delta(close, 7))\n\
      \    delay_close_7 = delay(pl.col('close'), periods=7)\n    delta_close_7 =\
      \ delta(pl.col('close'), periods=7)\n    sign_part = ((pl.col('close') - delay_close_7)\
      \ + delta_close_7).sign()\n    \n    # rank(1 + sum(returns, 250)) cross-sectional\n\
      \    rank_part = rank(pl.col('_sum_ret_250') + 1).over('date')\n    \n    #\
      \ Final formula: (-1 * sign_part) * (1 + rank_part)\n    factor = -1 * sign_part\
      \ * (1 + rank_part)\n    return df.select(factor).to_series()"
