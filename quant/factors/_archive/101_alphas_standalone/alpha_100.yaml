  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Compute adv20\
      \ (20-day average daily volume)\n    df = df.with_columns(\n        rolling_mean(pl.col('volume'),\
      \ window=20).alias('_adv20')\n    )\n    \n    # Inner expression: ((close -\
      \ low) - (high - close)) / (high - low) * volume\n    inner = (((pl.col('close')\
      \ - pl.col('low')) - (pl.col('high') - pl.col('close'))) / (pl.col('high') -\
      \ pl.col('low'))) * pl.col('volume')\n    \n    # rank(inner) cross-sectionally\n\
      \    df = df.with_columns(rank(inner).over('date').alias('_r1'))\n    \n   \
      \ # indneutralize twice (subtract mean by industry)\n    df = df.with_columns(\n\
      \        (pl.col('_r1') - pl.col('_r1').mean().over(['date', 'industry'])).alias('_n1')\n\
      \    )\n    df = df.with_columns(\n        (pl.col('_n1') - pl.col('_n1').mean().over(['date',\
      \ 'industry'])).alias('_n2')\n    )\n    \n    # scale and multiply by 1.5 ->\
      \ first part\n    df = df.with_columns(\n        scale(pl.col('_n2')).over('date').alias('_s1')\n\
      \    )\n    df = df.with_columns(\n        (1.5 * pl.col('_s1')).alias('_p1')\n\
      \    )\n    \n    # rank(adv20) cross-sectionally\n    df = df.with_columns(\n\
      \        rank(pl.col('_adv20')).over('date').alias('_r_adv20')\n    )\n    \n\
      \    # correlation(close, rank(adv20), 5) - 5-day rolling correlation\n    df\
      \ = df.with_columns(\n        rolling_corr(pl.col('close'), pl.col('_r_adv20'),\
      \ window=5).alias('_c1')\n    )\n    \n    # ts_argmin(close, 30) - 30-day argmin\n\
      \    df = df.with_columns(\n        ts_argmin(pl.col('close'), window=30).alias('_am')\n\
      \    )\n    \n    # rank(ts_argmin(close, 30)) cross-sectionally\n    df = df.with_columns(\n\
      \        rank(pl.col('_am')).over('date').alias('_r2')\n    )\n    \n    # correlation\
      \ - rank\n    df = df.with_columns(\n        (pl.col('_c1') - pl.col('_r2')).alias('_d1')\n\
      \    )\n    \n    # indneutralize (subtract mean by industry)\n    df = df.with_columns(\n\
      \        (pl.col('_d1') - pl.col('_d1').mean().over(['date', 'industry'])).alias('_n3')\n\
      \    )\n    \n    # scale -> second part\n    df = df.with_columns(\n      \
      \  scale(pl.col('_n3')).over('date').alias('_p2')\n    )\n    \n    # part1\
      \ - part2\n    df = df.with_columns(\n        (pl.col('_p1') - pl.col('_p2')).alias('_combined')\n\
      \    )\n    \n    # multiply by (volume / adv20)\n    df = df.with_columns(\n\
      \        (pl.col('_combined') * (pl.col('volume') / pl.col('_adv20'))).alias('_final')\n\
      \    )\n    \n    # 0 - (1 * X) = -X\n    factor = -pl.col('_final')\n    return\
      \ df.select(factor).to_series()"
