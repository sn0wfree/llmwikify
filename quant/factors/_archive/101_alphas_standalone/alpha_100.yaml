    formula: (0 - (1 * (((1.5 * scale(indneutralize(indneutralize(rank(((((close -
      low) - (high - close)) / (high - low)) * volume)), IndClass.subindustry), IndClass.subindustry)))
      - scale(indneutralize((correlation(close, rank(adv20), 5) - rank(ts_argmin(close,
      30))), IndClass.subindustry))) * (volume / adv20))))
    frequency: 日频
