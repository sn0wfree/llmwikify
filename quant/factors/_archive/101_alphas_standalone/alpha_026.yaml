  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Step 1: ts_rank(volume,\
      \ 5) and ts_rank(high, 5)\n    df = df.with_columns([\n        ts_rank(pl.col('volume'),\
      \ window=5).alias('_ts_rank_vol'),\n        ts_rank(pl.col('high'), window=5).alias('_ts_rank_high'),\n\
      \    ])\n    # Step 2: correlation of the two ts_ranks over 5 periods (materialize)\n\
      \    df = df.with_columns(\n        correlation(pl.col('_ts_rank_vol'), pl.col('_ts_rank_high'),\
      \ window=5).alias('_corr')\n    )\n    # Step 3: ts_max of correlation over\
      \ 3 periods (materialize)\n    df = df.with_columns(\n        ts_max(pl.col('_corr'),\
      \ window=3).alias('_ts_max')\n    )\n    # Step 4: -1 * ts_max(...)\n    factor\
      \ = -1 * pl.col('_ts_max')\n    return df.select(factor).to_series()"
