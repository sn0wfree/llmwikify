      \ window=2).alias('_decay'))\n    # Step 4: compute the final factor: 0 - (1\
      \ * ((close - vwap) / decay_linear(...)))\n    factor = -(pl.col('close') -\
      \ pl.col('vwap')) / pl.col('_decay')\n    return df.select(factor).to_series()"
