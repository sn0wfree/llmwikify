factor:
  name: alpha_099
  asset_type: stock
  category: formulaic
  status: 已验证
  updated_at: '2026-06-25'
  l1:
    definition: ((rank(correlation(sum(((high + low) / 2), 19.8975), sum(adv60, 19.8975),
      8.8136)) < rank(correlation(low, volume, 6.28259))) * -1)
    formula: ((rank(correlation(sum(((high + low) / 2), 19.8975), sum(adv60, 19.8975),
      8.8136)) < rank(correlation(low, volume, 6.28259))) * -1)
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - high
    - low
    - volume
    - adv60
    - close
    - open
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # midprice = (high\
      \ + low) / 2\n    midprice = (pl.col('high') + pl.col('low')) / 2\n    \n  \
      \  # Materialize rolling sums (windows rounded from 19.8975 -> 20)\n    df =\
      \ df.with_columns(rolling_sum(midprice, window=20).alias('_sum_mid'))\n    df\
      \ = df.with_columns(rolling_sum(pl.col('volume'), window=20).alias('_sum_vol'))\n\
      \    \n    # Materialize rolling correlations (8.8136 -> 9, 6.28259 -> 6)\n\
      \    df = df.with_columns(\n        rolling_corr(pl.col('_sum_mid'), pl.col('_sum_vol'),\
      \ window=9).alias('_corr1')\n    )\n    df = df.with_columns(\n        rolling_corr(pl.col('low'),\
      \ pl.col('volume'), window=6).alias('_corr2')\n    )\n    \n    # Cross-sectional\
      \ rank on materialized columns, then pl.when comparison\n    factor = pl.when(\n\
      \        rank(pl.col('_corr1')).over('date') < rank(pl.col('_corr2')).over('date')\n\
      \    ).then(-1).otherwise(0)\n    \n    return df.select(factor).to_series()"
    code_compile_status: success
