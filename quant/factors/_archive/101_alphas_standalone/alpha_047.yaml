factor:
  name: alpha_047
  asset_type: stock
  category: formulaic
  status: 已验证
  updated_at: '2026-06-24'
  l1:
    definition: ((((rank((1 / close)) * volume) / adv20) * ((high * rank((high - close)))
      / (sum(high, 5) / 5))) - rank((vwap - delay(vwap, 5))))
    formula: ((((rank((1 / close)) * volume) / adv20) * ((high * rank((high - close)))
      / (sum(high, 5) / 5))) - rank((vwap - delay(vwap, 5))))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - high
    - close
    - volume
    - adv20
    - vwap
    - open
    - low
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Materialize rolling/lag\
      \ columns first (Rule 2)\n    df = df.with_columns(\n        rolling_mean(pl.col('volume'),\
      \ window=20).alias('_adv20')\n    )\n    df = df.with_columns(\n        rolling_mean(pl.col('high'),\
      \ window=5).alias('_high5')\n    )\n    df = df.with_columns(\n        delay(pl.col('vwap'),\
      \ periods=5).alias('_vwap_lag5')\n    )\n    \n    # Cross-sectional ranks (need\
      \ .over('date'))\n    r1 = rank(1 / pl.col('close')).over('date')\n    r2 =\
      \ rank(pl.col('high') - pl.col('close')).over('date')\n    \n    # (rank(1/close)\
      \ * volume) / adv20\n    part1 = (r1 * pl.col('volume')) / pl.col('_adv20')\n\
      \    \n    # (high * rank(high - close)) / (sum(high,5)/5)\n    part2 = (pl.col('high')\
      \ * r2) / pl.col('_high5')\n    \n    inner = part1 * part2\n    \n    # rank(vwap\
      \ - delay(vwap, 5))\n    rank_lag = rank(pl.col('vwap') - pl.col('_vwap_lag5')).over('date')\n\
      \    \n    factor = inner - rank_lag\n    return df.select(factor).to_series()"
