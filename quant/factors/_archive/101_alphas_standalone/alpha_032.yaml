  l1:
    definition: (scale(((sum(close, 7) / 7) - close)) + (20 * scale(correlation(vwap,
      delay(close, 5), 230))))
    formula: (scale(((sum(close, 7) / 7) - close)) + (20 * scale(correlation(vwap,
      delay(close, 5), 230))))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - close
    - vwap
    - open
    - high
    - low
    - volume
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Part 1: scale(((sum(close,\
      \ 7) / 7) - close))\n    df = df.with_columns(\n        (rolling_mean(pl.col('close'),\
      \ window=7) - pl.col('close')).alias('_dev')\n    )\n    df = df.with_columns(\n\
      \        scale(pl.col('_dev')).over('date').alias('_scale1')\n    )\n    \n\
      \    # Part 2: 20 * scale(correlation(vwap, delay(close, 5), 230))\n    df =\
      \ df.with_columns(\n        correlation(pl.col('vwap'), delay(pl.col('close'),\
      \ 5), window=230).alias('_corr')\n    )\n    df = df.with_columns(\n       \
      \ scale(pl.col('_corr')).over('date').alias('_scale2')\n    )\n    \n    factor\
      \ = pl.col('_scale1') + 20 * pl.col('_scale2')\n    return df.select(factor).to_series()"
