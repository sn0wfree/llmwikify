    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Materialize cross-sectional\
      \ rank of volume first\n    df = df.with_columns(\n        rank(pl.col('volume')).over('date').alias('_rank_vol')\n\
      \    )\n    # Rolling correlation between high and rank(volume) over 5-period\
      \ window\n    df = df.with_columns(\n        correlation(pl.col('high'), pl.col('_rank_vol'),\
      \ window=5).alias('_corr')\n    )\n    # Multiply by -1\n    factor = -1 * pl.col('_corr')\n\
      \    return df.select(factor).to_series()"
