  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # df is already\
      \ sorted by (code, date) — do NOT re-sort\n\n    # Term 1: rank(decay_linear(delta(IndNeutralize(close,\
      \ industry), 2), 8))\n    # IndNeutralize requires industry classification which\
      \ is unavailable; pass close through\n    ind_neutral_close = pl.col('close')\n\
      \    delta_close = delta(ind_neutral_close, periods=2)\n    decay1 = decay_linear(delta_close,\
      \ window=8)\n    rank1 = rank(decay1).over('date')\n\n    # Term 2: rank(decay_linear(corr(vwap*0.318108\
      \ + open*0.681892, sum(adv180, 37), 14), 12))\n    # adv180 ~ mean(volume, 180)\
      \ as proxy\n    weighted_price = pl.col('vwap') * 0.318108 + pl.col('open')\
      \ * (1 - 0.318108)\n    adv180 = rolling_mean(pl.col('volume'), window=180)\n\
      \    sum_adv = rolling_sum(adv180, window=37)\n    corr_val = rolling_corr(weighted_price,\
      \ sum_adv, window=14)\n    decay2 = decay_linear(corr_val, window=12)\n    rank2\
      \ = rank(decay2).over('date')\n\n    # Combine: (rank1 - rank2) * -1\n    factor\
      \ = (rank1 - rank2) * -1\n\n    return df.select(factor).to_series()"
