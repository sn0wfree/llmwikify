      ? (-1 * 1) : (((sum(close, 2) / 2) < ((sum(close, 8) / 8) - stddev(close, 8)))
      ? 1 : (((1 < (volume / adv20)) || ((volume / adv20) == '
    formula: '((((sum(close, 8) / 8) + stddev(close, 8)) < (sum(close, 2) / 2)) ?
      (-1 * 1) : (((sum(close, 2) / 2) < ((sum(close, 8) / 8) - stddev(close, 8)))
      ? 1 : (((1 < (volume / adv20)) || ((volume / adv20) == 1)) ? 1 : (-1 * 1))))'
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - close
    - volume
    - adv20
    - open
    - high
    - low
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
