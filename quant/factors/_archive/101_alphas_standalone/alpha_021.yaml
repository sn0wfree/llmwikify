    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    close = pl.col('close')\n\
      \    volume = pl.col('volume')\n    \n    mean8 = rolling_mean(close, window=8)\n\
      \    std8 = rolling_std(close, window=8)\n    mean2 = rolling_mean(close, window=2)\n\
      \    adv20 = rolling_mean(volume, window=20)\n    \n    cond1 = (mean8 + std8)\
      \ < mean2\n    cond2 = mean2 < (mean8 - std8)\n    cond3 = (1 < (volume / adv20))\
      \ | ((volume / adv20) == 1)\n    \n    factor = (\n        pl.when(cond1).then(-1)\n\
      \        .otherwise(\n            pl.when(cond2).then(1)\n            .otherwise(\n\
      \                pl.when(cond3).then(1).otherwise(-1)\n            )\n     \
      \   )\n    )\n    \n    return df.select(factor).to_series()"
    code_compile_status: success
