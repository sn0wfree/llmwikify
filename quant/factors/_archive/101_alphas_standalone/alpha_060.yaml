factor:
  name: alpha_060
  asset_type: stock
  category: formulaic
  status: 已验证
  updated_at: '2026-06-25'
  l1:
    definition: (0 - (1 * ((2 * scale(rank(((((close - low) - (high - close)) / (high
      - low)) * volume)))) - scale(rank(ts_argmax(close, 10))))))
    formula: (0 - (1 * ((2 * scale(rank(((((close - low) - (high - close)) / (high
      - low)) * volume)))) - scale(rank(ts_argmax(close, 10))))))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - high
    - low
    - close
    - volume
    - open
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Step 1: Compute\
      \ inner expression: ((close - low) - (high - close)) / (high - low)) * volume\n\
      \    inner = ((pl.col('close') - pl.col('low')) - (pl.col('high') - pl.col('close')))\
      \ / (pl.col('high') - pl.col('low')) * pl.col('volume')\n    \n    # Step 2:\
      \ rank and scale the inner expression\n    df = df.with_columns(rank(inner).over('date').alias('_rank1'))\n\
      \    df = df.with_columns(scale(pl.col('_rank1')).over('date').alias('_scale1'))\n\
      \    \n    # Step 3: ts_argmax(close, 10) - materialize the rolling result first\n\
      \    df = df.with_columns(ts_argmax(pl.col('close'), window=10).alias('_argmax'))\n\
      \    \n    # Step 4: rank and scale the argmax\n    df = df.with_columns(rank(pl.col('_argmax')).over('date').alias('_rank2'))\n\
      \    df = df.with_columns(scale(pl.col('_rank2')).over('date').alias('_scale2'))\n\
      \    \n    # Step 5: Final formula: 0 - (1 * ((2 * scale1) - scale2)) = scale2\
      \ - 2*scale1\n    factor = pl.col('_scale2') - 2 * pl.col('_scale1')\n    \n\
      \    return df.select(factor).to_series()"
