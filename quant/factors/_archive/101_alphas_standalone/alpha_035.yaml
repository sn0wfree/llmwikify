factor:
  name: alpha_035
  asset_type: stock
  category: formulaic
  status: 已验证
  updated_at: '2026-06-24'
  l1:
    definition: ((Ts_Rank(volume, 32) * (1 - Ts_Rank(((close + high) - low), 16)))
      * (1 - Ts_Rank(returns, 32)))
    formula: ((Ts_Rank(volume, 32) * (1 - Ts_Rank(((close + high) - low), 16))) *
      (1 - Ts_Rank(returns, 32)))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - high
    - low
    - close
    - volume
    - returns
    - open
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Materialize ts_rank\
      \ results first (Rule 2)\n    df = df.with_columns([\n        ts_rank(pl.col('volume'),\
      \ window=32).alias('_ts_rank_vol'),\n        ts_rank((pl.col('close') + pl.col('high')\
      \ - pl.col('low')), window=16).alias('_ts_rank_chl'),\n        ts_rank(pl.col('returns'),\
      \ window=32).alias('_ts_rank_ret'),\n    ])\n    # Compute the factor: (A *\
      \ (1 - B)) * (1 - C)\n    factor = (\n        pl.col('_ts_rank_vol')\n     \
      \   * (1 - pl.col('_ts_rank_chl'))\n        * (1 - pl.col('_ts_rank_ret'))\n\
      \    )\n    return df.select(factor).to_series()"
