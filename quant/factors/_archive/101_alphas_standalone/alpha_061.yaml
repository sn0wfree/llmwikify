factor:
  name: alpha_061
  asset_type: stock
  category: formulaic
  status: 已验证
  updated_at: '2026-06-25'
  l1:
    definition: (rank((vwap - ts_min(vwap, 16.1219))) < rank(correlation(vwap, adv180,
      17.9282)))
    formula: (rank((vwap - ts_min(vwap, 16.1219))) < rank(correlation(vwap, adv180,
      17.9282)))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - vwap
    - close
    - open
    - high
    - low
    - volume
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv180 = rolling_mean\
      \ of volume over 180 days\n    df = df.with_columns(rolling_mean(pl.col('volume'),\
      \ window=180).alias('_adv180'))\n    # ts_min(vwap, ~16.1219) -> window 16\n\
      \    df = df.with_columns(ts_min(pl.col('vwap'), window=16).alias('_tsmin_vwap'))\n\
      \    # vwap - ts_min(vwap, 16)\n    df = df.with_columns((pl.col('vwap') - pl.col('_tsmin_vwap')).alias('_diff_vwap'))\n\
      \    # correlation(vwap, adv180, ~17.9282) -> window 18 (materialized before\
      \ .over('date'))\n    df = df.with_columns(correlation(pl.col('vwap'), pl.col('_adv180'),\
      \ window=18).alias('_corr'))\n    \n    # cross-sectional ranks (after materialization\
      \ per Rule 2)\n    r1 = rank(pl.col('_diff_vwap')).over('date')\n    r2 = rank(pl.col('_corr')).over('date')\n\
      \    \n    # boolean comparison via pl.when (Rule 3)\n    factor = pl.when(r1\
      \ < r2).then(1).otherwise(0)\n    return df.select(factor).to_series()"
