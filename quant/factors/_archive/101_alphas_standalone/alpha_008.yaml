factor:
  name: alpha_008
  asset_type: stock
  category: formulaic
  status: 已验证
  updated_at: '2026-06-24'
  l1:
    definition: (-1 * rank(((sum(open, 5) * sum(returns, 5)) - delay((sum(open, 5)
      * sum(returns, 5)), 10))))
    formula: (-1 * rank(((sum(open, 5) * sum(returns, 5)) - delay((sum(open, 5) *
      sum(returns, 5)), 10))))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - open
    - returns
    - close
    - high
    - low
    - volume
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Materialize sum(open,\
      \ 5) * sum(returns, 5)\n    df = df.with_columns(\n        (rolling_sum(pl.col('open'),\
      \ window=5) * rolling_sum(pl.col('returns'), window=5)).alias('_product')\n\
      \    )\n    # Materialize the difference with its delay (10)\n    df = df.with_columns(\n\
      \        (pl.col('_product') - delay(pl.col('_product'), 10)).alias('_delta')\n\
      \    )\n    # Cross-sectional rank and negate\n    factor = -1 * rank(pl.col('_delta')).over('date')\n\
      \    return df.select(factor).to_series()"
