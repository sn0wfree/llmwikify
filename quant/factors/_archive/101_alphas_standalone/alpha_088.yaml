  l1:
    definition: min(rank(decay_linear(((rank(open) + rank(low)) - (rank(high) + rank(close))),
      8.06882)), Ts_Rank(decay_linear(correlation(Ts_Rank(close, 8.44728), Ts_Rank(adv60,
      20.6966), 8.01266), 6.65053), 2.61957
    formula: min(rank(decay_linear(((rank(open) + rank(low)) - (rank(high) + rank(close))),
      8.06882)), Ts_Rank(decay_linear(correlation(Ts_Rank(close, 8.44728), Ts_Rank(adv60,
      20.6966), 8.01266), 6.65053), 2.61957))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - open
    - high
    - low
    - close
    - adv60
    - volume
    - returns
    nan_meaning: 上市不足或窗口期数据不足
