    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv60: 60-day\
      \ average dollar volume\n    df = df.with_columns(\n        rolling_mean(pl.col('volume')\
      \ * pl.col('close'), window=60).alias('_adv60')\n    )\n\n    # Cross-sectional\
      \ ranks for OHLC\n    df = df.with_columns([\n        rank(pl.col('open')).over('date').alias('_r_open'),\n\
      \        rank(pl.col('low')).over('date').alias('_r_low'),\n        rank(pl.col('high')).over('date').alias('_r_high'),\n\
      \        rank(pl.col('close')).over('date').alias('_r_close'),\n    ])\n\n \
      \   # Term 1 inner: (rank(open) + rank(low)) - (rank(high) + rank(close))\n\
      \    df = df.with_columns(\n        decay_linear(\n            (pl.col('_r_open')\
      \ + pl.col('_r_low')) - (pl.col('_r_high') + pl.col('_r_close')),\n        \
      \    window=int(8.06882)\n        ).alias('_t1_decay')\n    )\n    # rank of\
      \ decay result\n    df = df.with_columns(\n        rank(pl.col('_t1_decay')).over('date').alias('_t1')\n\
      \    )\n\n    # Term 2: ts_rank of close and ts_rank of adv60\n    df = df.with_columns(\n\
      \        ts_rank(pl.col('close'), window=int(8.44728)).alias('_tsr_close')\n\
      \    )\n    df = df.with_columns(\n        ts_rank(pl.col('_adv60'), window=int(20.6966)).alias('_tsr_adv60')\n\
      \    )\n\n    # correlation using materialized ts_rank columns\n    df = df.with_columns(\n\
      \        rolling_corr(pl.col('_tsr_close'), pl.col('_tsr_adv60'), window=int(8.01266)).alias('_corr')\n\
      \    )\n\n    # decay_linear then ts_rank\n    df = df.with_columns(\n     \
      \   decay_linear(pl.col('_corr'), window=int(6.65053)).alias('_corr_decay')\n\
      \    )\n    df = df.with_columns(\n        ts_rank(pl.col('_corr_decay'), window=int(2.61957)).alias('_t2')\n\
      \    )\n\n    # Element-wise min of the two terms\n    factor = pl.min_horizontal(pl.col('_t1'),\
      \ pl.col('_t2'))\n\n    return df.select(factor).to_series()"
