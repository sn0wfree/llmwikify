  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    inner = -1 * ((1\
      \ - (pl.col('open') / pl.col('close'))) ** 1)\n    factor = rank(inner).over('date')\n\
      \    return df.select(factor).to_series()"
