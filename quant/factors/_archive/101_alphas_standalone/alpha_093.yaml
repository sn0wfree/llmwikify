  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    df = df.sort(['code',\
      \ 'date'])\n    \n    # adv81: 81-day average volume (proxy for average daily\
      \ volume)\n    adv81 = rolling_mean(pl.col('volume'), window=81)\n    \n   \
      \ # Numerator: Ts_Rank(decay_linear(correlation(IndNeutralize(vwap), adv81,\
      \ 17), 20), 8)\n    vwap_neutralized = neutralize(pl.col('vwap')).over('date')\n\
      \    corr_val = rolling_corr(vwap_neutralized, adv81, window=17)\n    decay1\
      \ = decay_linear(corr_val, window=20)\n    num = ts_rank(decay1, window=8)\n\
      \    \n    # Denominator: rank(decay_linear(delta(close*0.524434 + vwap*0.475566,\
      \ 3), 16))\n    weighted_price = pl.col('close') * 0.524434 + pl.col('vwap')\
      \ * (1 - 0.524434)\n    delta_val = delta(weighted_price, periods=3)\n    decay2\
      \ = decay_linear(delta_val, window=16)\n    denom = rank(decay2).over('date')\n\
      \    \n    factor = num / denom\n    \n    return df.select(factor).to_series()"
