  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # delta(close,\
      \ 1) = close(t) - close(t-1)\n    # delta(delay(close, 1), 1) = close(t-1) -\
      \ close(t-2)\n    df = df.with_columns([\n        (pl.col('close') - pl.col('close').shift(1)).alias('_d_close'),\n\
      \        (pl.col('close').shift(1) - pl.col('close').shift(2)).alias('_d_delay_close')\n\
      \    ])\n\n    # correlation(delta(close,1), delta(delay(close,1),1), 250)\n\
      \    df = df.with_columns(\n        rolling_corr(pl.col('_d_close'), pl.col('_d_delay_close'),\
      \ window=250).alias('_corr')\n    )\n\n    # (corr * delta(close, 1)) / close\n\
      \    df = df.with_columns(\n        ((pl.col('_corr') * pl.col('_d_close'))\
      \ / pl.col('close')).alias('_inner')\n    )\n\n    # indneutralize = subtract\
      \ industry mean within each date\n    df = df.with_columns(\n        pl.col('_inner').mean().over(['date',\
      \ 'industry']).alias('_ind_mean')\n    )\n    df = df.with_columns(\n      \
      \  (pl.col('_inner') - pl.col('_ind_mean')).alias('_numer')\n    )\n\n    #\
      \ delta(close, 1) / delay(close, 1)\n    df = df.with_columns(\n        ((pl.col('close')\
      \ - pl.col('close').shift(1)) / pl.col('close').shift(1)).alias('_ret')\n  \
      \  )\n\n    # sum((delta(close,1)/delay(close,1))^2, 250)\n    df = df.with_columns(\n\
      \        rolling_sum(pl.col('_ret') * pl.col('_ret'), window=250).alias('_denom')\n\
      \    )\n\n    factor = pl.col('_numer') / pl.col('_denom')\n\n    return df.select(factor).to_series()"
