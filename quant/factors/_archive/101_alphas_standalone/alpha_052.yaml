factor:
  name: alpha_052
  asset_type: stock
  category: formulaic
  status: 已验证
  updated_at: '2026-06-24'
  l1:
    definition: ((((-1 * ts_min(low, 5)) + delay(ts_min(low, 5), 5)) * rank(((sum(returns,
      240) - sum(returns, 20)) / 220))) * ts_rank(volume, 5))
    formula: ((((-1 * ts_min(low, 5)) + delay(ts_min(low, 5), 5)) * rank(((sum(returns,
      240) - sum(returns, 20)) / 220))) * ts_rank(volume, 5))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - low
    - volume
    - returns
    - close
    - open
    - high
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Materialize ts_min(low,\
      \ 5)\n    df = df.with_columns(rolling_min(pl.col('low'), window=5).alias('_ts_min_low'))\n\
      \    \n    # Materialize delay(ts_min(low, 5), 5)\n    df = df.with_columns(delay(pl.col('_ts_min_low'),\
      \ 5).alias('_delay_ts_min'))\n    \n    # Part 1: (-1 * ts_min(low, 5)) + delay(ts_min(low,\
      \ 5), 5)\n    part1 = -1 * pl.col('_ts_min_low') + pl.col('_delay_ts_min')\n\
      \    \n    # Materialize sum(returns, 240) and sum(returns, 20)\n    df = df.with_columns(rolling_sum(pl.col('returns'),\
      \ window=240).alias('_sum_240'))\n    df = df.with_columns(rolling_sum(pl.col('returns'),\
      \ window=20).alias('_sum_20'))\n    \n    # Part 2: rank(((sum_240 - sum_20)\
      \ / 220)) -- cross-sectional\n    part2 = rank((pl.col('_sum_240') - pl.col('_sum_20'))\
      \ / 220).over('date')\n    \n    # Part 3: ts_rank(volume, 5)\n    part3 = ts_rank(pl.col('volume'),\
      \ window=5)\n    \n    # Combine\n    factor = part1 * part2 * part3\n    return\
      \ df.select(factor).to_series()"
    code_compile_status: success
    code_chars: 993
