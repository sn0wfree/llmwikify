factor:
  name: alpha_003
  asset_type: stock
  category: formulaic
  status: 已验证
  updated_at: '2026-06-24'
  l1:
    definition: (-1 * correlation(rank(open), rank(volume), 10))
    formula: (-1 * correlation(rank(open), rank(volume), 10))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - open
    - volume
    - close
    - high
    - low
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Cross-sectional\
      \ ranks per date\n    df = df.with_columns([\n        rank(pl.col('open')).over('date').alias('_rank_open'),\n\
      \        rank(pl.col('volume')).over('date').alias('_rank_volume'),\n    ])\n\
      \    # Time-series correlation of the two ranks over a 10-day window\n    df\
      \ = df.with_columns(\n        correlation(pl.col('_rank_open'), pl.col('_rank_volume'),\
      \ window=10).alias('_corr')\n    )\n    factor = -1 * pl.col('_corr')\n    return\
      \ df.select(factor).to_series()"
    code_compile_status: success
