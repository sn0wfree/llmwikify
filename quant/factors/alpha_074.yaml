      * 0.0261661) + (vwap * (1 - 0.0261661)))), rank(volume), 11.4791))) * -1)
    formula: ((rank(correlation(close, sum(adv30, 37.4843), 15.1365)) < rank(correlation(rank(((high
      * 0.0261661) + (vwap * (1 - 0.0261661)))), rank(volume), 11.4791))) * -1)
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - high
    - close
    - volume
    - adv30
    - vwap
    - open
