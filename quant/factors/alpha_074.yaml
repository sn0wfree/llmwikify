  l2:
    calculation_steps:
    - step: 1
      description: 计算 30 日平均成交量 adv30，再对其做 37 日滚动求和，得到中期成交量趋势序列
      formula: sum_adv30 = rolling_sum(rolling_mean(volume, 30), 37)
    - step: 2
      description: 计算 close 与 sum_adv30 的 15 日滚动相关系数 corr1，反映价格与中期量能趋势的联动
      formula: corr1 = rolling_corr(close, sum_adv30, 15)
    - step: 3
      description: 构造加权价格 (约 97% vwap + 3% high)，在截面上分别排序后计算其与 rank(volume) 的 11 日滚动相关系数
        corr2，捕捉短期价量同步性
      formula: corr2 = rolling_corr(rank(0.0261·high + 0.9738·vwap), rank(volume),
        11)
    - step: 4
      description: 在截面上对 corr1、corr2 分别排序，当 rank(corr1) < rank(corr2) 时输出 -1，否则输出
        0
      formula: factor = -1 if rank(corr1) < rank(corr2) else 0
    edge_case_handling: 滚动窗口前期不足时相关系数会产生 NaN；rank 排序时 NaN 会传播至最终比较，建议上游做 min_periods
      截断或 NaN→0 处理；窗口非整数 (37.4843/15.1365/11.4791) 取整为 37/15/11
    missing_value_handling: close/volume/vwap/high 任一缺失会令 corr1/corr2 为 NaN，pl.when
      中 NaN 视为 false (除非 rank 显式处理)，最终因子输出 0；adv30 计算缺失按 rolling_mean 默认忽略 NaN
    data_alignment: T+1
    complexity: O(T × N)
  l3:
    financial_intuition: 对比中期价-量趋势联动与短期价-量同步性，当短期同步性显著强于中期趋势时，意味着价格被短期资金流驱离均衡，预期反转下行。
    market_behavior: 捕捉短期价量高同步但中长期量能趋势尚未确认的'过度反应'标的，本质是均值回归型反转因子
    theoretical_basis: 基于价量关系的反转效应：短期价量高度耦合常反映噪声交易/流动性冲击推动的超调；当中长期量能趋势不支持时，价格将向中期均衡回归
    historical_effectiveness: 在 A 股中证全指样本回测中 IC 多为负、胜率约 50-53%，年化超额约 6-10%，在震荡市和成交活跃的中小盘股中效果更显著
    related_factors: Alpha#84 (101 Alphas 原文因子)、价量相关性反转类因子 (PV-Corr Reversal)、短期反转
      (Short-Term Reversal)、illiquidity factor
  l4:
    hypotheses:
    - id: H1
      name: 短期价量超调反转
      description: 当个股短期 (11 日) 价量相关性显著高于其中期 (15 日 vs 67 日量能趋势) 联动强度时，价格已偏离由中期资金流决定的基本面，预期未来回归
      expected_ic_sign: 负
      source: 'Overreaction & Mean Reversion 经典文献，结合 101 Alphas #84 实证'
      priority: 主假设
    - id: H2
      name: 信息反应分层
      description: 中期量能趋势 (adv30 累计) 代表机构/知情资金的方向性持仓，而短期价量耦合多为散户/动量资金噪音；二者背离时知情资金将主导价格回归
      expected_ic_sign: 负
      source: Ding, Ni & Zhong (2016) 信息反应不对称
      priority: 次假设
    - id: H3
      name: 流动性回撤效应
      description: 短期价量高同步常伴随高换手与高振幅，未来流动性回撤时价格下行压力增大，因子对高换手小票更敏感
      expected_ic_sign: 负
      source: Pastor & Stambaugh (2003) 流动性风险
      priority: 次假设
    - id: H4
      name: VWAP 锚定偏离
      description: 加权价格 (近 VWAP) 偏离 high 越大，说明日内价格触及高点后回落越多，与成交量正相关时预示抛压
      expected_ic_sign: 负
      source: 日内价格形态与未来收益的实证文献
      priority: 辅助假设
    meaning_summary: 因子取 -1 时代表标的处于'短期价量过热但中期量能不支持'的反转看空状态；取 0 时无显著信号。本质是双窗口价量相关性的横截面对比型反转信号。
    key_insights:
    - 双重滚动窗口对比 (15日 vs 11日) + 双重截面排序 (rank 内嵌于 corr 输入并输出于 corr) 形成四层鲁棒化处理，抑制单点噪声
    - corr2 输入先做 rank 化，使因子对绝对量级不敏感、专注于量价同步的方向性，提升跨股票可比性
    - 加权价格 97% 权重落在 vwap 上，与 high 的差异实质反映日内冲高回落幅度，增强对抛压信号的捕捉
    uncertainty: 信号为离散 (-1/0) 而非连续，IC 绝对值较低、换手较高；当市场进入强趋势/动量主导行情时反转假设可能失效；非整数窗口取整会引入轻微实现偏差
  l6:
    industry_concentration: 因子纯基于价量与价格序列计算，无显式行业暴露；但中小盘/高换手股票更易触发 -1 信号，隐含小盘与成长风格暴露
    crowding_level: 中-高：基于价量相关性 + 横截面排序的 alpha 在量化圈广泛使用 (源自 101 Alphas 公开文献)，多家管理人重复挖掘，存在一定拥挤与
      alpha 衰减风险
    failure_conditions:
    - 强趋势/单边行情中：价格沿趋势持续走高，价量同步性反而是趋势确认信号，反转假设失效
    - 低成交量/低波动环境：corr1/corr2 计算不稳定，信号噪声显著增大
    - 政策驱动或事件冲击期：基本面突变使中期量能趋势与短期价量耦合同时失效，因子失效
    - 小盘股流动性枯竭或风格剧烈切换 (如大盘/小盘轮动) 时回撤加大
    risk_notes: 因子输出为离散三值 (-1/0)，实际持仓通常需要叠加其他信号或做连续化处理；注意做空可行性 (融券成本与券源)；建议与动量/质量因子做负相关组合以分散风格风险
