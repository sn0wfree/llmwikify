  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv20: 20-day\
      \ average daily volume\n    adv20 = rolling_mean(pl.col('volume'), window=20)\n\
      \    \n    # Step 1: Industry neutralize vwap (using neutralize as proxy since\
      \ no industry column)\n    ind_neutral_vwap = neutralize(pl.col('vwap')).over('date')\n\
      \    \n    # Step 2: delta with period ~3 (rounded from 2.72412)\n    delta_vwap\
      \ = delta(ind_neutral_vwap, periods=3)\n    \n    # Step 3: ts_max with window\
      \ ~5 (rounded from 4.79344)\n    ts_max_delta = ts_max(delta_vwap, window=5)\n\
      \    \n    # Step 4: cross-sectional rank\n    rank1 = rank(ts_max_delta).over('date')\n\
      \    \n    # Step 5: weighted close/vwap combo\n    close_vwap_combo = pl.col('close')\
      \ * 0.490655 + pl.col('vwap') * (1 - 0.490655)\n    \n    # Step 6: rolling\
      \ correlation with adv20 over ~5 days (rounded from 4.92416)\n    corr = rolling_corr(close_vwap_combo,\
      \ adv20, window=5)\n    \n    # Step 7: Ts_Rank over ~9 days (rounded from 9.0615)\n\
      \    ts_rank_corr = ts_rank(corr, window=9)\n    \n    # Step 8: rank1 ^ ts_rank_corr,\
      \ then multiply by -1\n    factor = (rank1 ** ts_rank_corr) * -1\n    \n   \
      \ return df.select(factor).to_series()"
