      description: 加权价格高度偏向 low (权重 0.72), 相当于日内下行通道代理, 其变化更敏感地反映卖压
      expected_ic_sign: 负
      source: 公式权重 0.721001 设计
      priority: 辅助假设
    meaning_summary: '复合反转因子: 行业中性低价代理的短期动量 vs 量价相关性的时序排名, 取负后方向为反向 (因子越小, 越倾向于做空)'
    key_insights:
    - 加权价格 72% 偏向 low, 实质是日内下行压力的代理变量
    - 行业中性化是核心, 缺失行业标签会显著削弱因子效果
    - 量价相关性经多层 ts_rank + 衰减, 强调的是相关性的'变化'而非水平
    - 最终 -1 系数意味着因子值与预期收益呈反向关系
    uncertainty: 高——多层算子叠加 (delta+decay+rank+相关性+ts_rank) 使因子方向与 IC 符号依赖具体参数实现与市场环境;
      取负后的方向需在样本内回测验证
  l6:
    industry_concentration: 中等偏高——行业中性化是因子核心步骤, 若行业分类粒度不准确 (例如缺少中证二级/三级行业) 会导致截面中性化偏差,
      因子表现对行业映射质量敏感
    crowding_level: 中——属于 101 Alphas 标准组合的一部分, 在量化圈被广泛复制, 但因多步嵌套 (相关性+衰减) 较复杂, 实际完整复现度有限,
