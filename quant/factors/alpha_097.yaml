  l2:
    calculation_steps:
    - step: 1
      description: '加权价格合成: low 与 vwap 以 0.721001 权重加权, 得到接近最低价的混合价格信号'
      formula: weighted = low * 0.721001 + vwap * 0.278999
    - step: 2
      description: '行业中性化: 对加权价格做行业内去均值, 消除行业截面偏差; 然后取 3 日 delta (3 期差分), 捕捉短期价格变化'
      formula: delta_val = IndNeutralize(weighted, industry) − IndNeutralize(weighted,
        industry).shift(3)
    - step: 3
      description: '线性衰减加权: 对 delta 值做 20 日窗口的指数线性衰减 (近端权重大), 突出近期变动'
      formula: decayed1 = decay_linear(delta_val, window=20)
    - step: 4
      description: '量价相关性链: 先对 low 与 adv60 分别做时序排名 (窗口 7 和 17), 再求 4 日滚动相关, 再做 18
        日 ts_rank 排名, 最后 15 日线性衰减 → 6 日 ts_rank'
      formula: ts_rank_decayed = Ts_Rank(decay_linear(Ts_Rank(corr(Ts_Rank(low,7),
        Ts_Rank(adv60,17),4), 18), 15), 6)
    - step: 5
      description: '组合并取负: 截面 rank(部分1) 减去 ts_rank(部分2), 再乘以 -1 得到最终因子'
      formula: factor = -1 * (rank(decayed1) - ts_rank_decayed)
    edge_case_handling: floor 操作将非整数参数向下取整 (3.3705→3, 20.4523→20, 7.87871→7, 17.255→17,
      4.97547→4, 18.5925→18, 15.7152→15, 6.71659→6); 无 industry 列时使用 date 分组做截面中性化替代;
      delta/衰减/ts_rank 在窗口不足时输出 NaN
    missing_value_handling: 低/vwap/volume 缺失时, 中间步骤 (delta, decay_linear, ts_rank,
      corr) 均按各函数默认规则传播 NaN; 最终因子值在两端 rolling 窗口不足时为 NaN
    data_alignment: T+1
    complexity: O(T × N)
  l3:
    financial_intuition: '因子融合行业中性化的短期价格动量与量价相关性变化, 通过取负放大反转效应: 当行业中性价格上升且量价相关性走弱时,
      因子值偏低, 预期后续回落; 反之预期反弹。'
    market_behavior: 捕捉行业内部短期价格漂移与成交量-价格联动背离的复合反转信号; 在动量-反转切换、量价异常同步的市场阶段表现活跃
    theoretical_basis: 行为金融反转假说 + 量价关系理论 (价格-成交量背离预示拐点) + 行业中性的截面可比性
    historical_effectiveness: 101 Alphas 系列中属于复合动量-反转因子, 在 A 股/美股均有一定选股能力, 但 IC 稳定性中等,
      需配合行业中性化严格实现
    related_factors: Alpha#1 (量价), Alpha#5 (短期反转), Alpha#6 (动量+量价), Alpha#15 (量价相关性)
  l4:
