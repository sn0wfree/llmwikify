  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv60: 60-day\
      \ average daily volume\n    adv60 = ts_mean(pl.col('volume'), window=60)\n\n\
      \    # --- Inner expression 1 ---\n    # Weighted combination of low and vwap\n\
      \    weighted = (pl.col('low') * 0.721001) + (pl.col('vwap') * (1 - 0.721001))\n\
      \n    # Industry neutralize substitute (cross-sectional neutralize since no\
      \ industry col)\n    ind_neutralized = neutralize(weighted).over('date')\n\n\
      \    # delta with period 3 (floor of 3.3705)\n    delta_val = delta(ind_neutralized,\
      \ periods=3)\n\n    # decay_linear with window 20 (floor of 20.4523)\n    decayed1\
      \ = decay_linear(delta_val, window=20)\n\n    # cross-sectional rank\n    ranked\
      \ = rank(decayed1).over('date')\n\n    # --- Inner expression 2 ---\n    # Ts_Rank\
      \ of low with window 7 (floor of 7.87871)\n    ts_rank_low = ts_rank(pl.col('low'),\
      \ window=7)\n\n    # Ts_Rank of adv60 with window 17 (floor of 17.255)\n   \
      \ ts_rank_adv = ts_rank(adv60, window=17)\n\n    # correlation between the two\
      \ ts_ranks with window 4 (floor of 4.97547)\n    corr_val = ts_corr(ts_rank_low,\
      \ ts_rank_adv, window=4)\n\n    # Ts_Rank of correlation with window 18 (floor\
      \ of 18.5925)\n    ts_rank_corr = ts_rank(corr_val, window=18)\n\n    # decay_linear\
      \ with window 15 (floor of 15.7152)\n    decayed2 = decay_linear(ts_rank_corr,\
      \ window=15)\n\n    # Ts_Rank of decay_linear with window 6 (floor of 6.71659)\n\
      \    ts_rank_decayed = ts_rank(decayed2, window=6)\n\n    # --- Final expression\
      \ ---\n    factor = (ranked - ts_rank_decayed) * -1\n\n    return df.select(factor).to_series()"
