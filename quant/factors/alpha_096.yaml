  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Step 1: compute\
      \ adv60 and basic ranks\n    df = df.with_columns(\n        adv60=rolling_mean(pl.col('volume'),\
      \ window=60),\n        rank_vwap=rank(pl.col('vwap')).over('date'),\n      \
      \  rank_volume=rank(pl.col('volume')).over('date'),\n    )\n    \n    # Step\
      \ 2: First branch - correlation of ranks\n    df = df.with_columns(\n      \
      \  corr1=rolling_corr(pl.col('rank_vwap'), pl.col('rank_volume'), window=4)\n\
      \    )\n    df = df.with_columns(\n        decay1=decay_linear(pl.col('corr1'),\
      \ 4)\n    )\n    df = df.with_columns(\n        ts_rank1=ts_rank(pl.col('decay1'),\
      \ 8)\n    )\n    \n    # Step 3: Second branch - ts_rank of close and adv60\n\
      \    df = df.with_columns(\n        ts_rank_close=ts_rank(pl.col('close'), 7),\n\
      \        ts_rank_adv60=ts_rank(pl.col('adv60'), 4),\n    )\n    df = df.with_columns(\n\
      \        corr2=rolling_corr(pl.col('ts_rank_close'), pl.col('ts_rank_adv60'),\
      \ window=4)\n    )\n    df = df.with_columns(\n        ts_argmax2=ts_argmax(pl.col('corr2'),\
      \ 13)\n    )\n    df = df.with_columns(\n        decay2=decay_linear(pl.col('ts_argmax2'),\
      \ 14),\n        ts_rank2=ts_rank(pl.col('ts_argmax2'), 13)\n    )\n    \n  \
      \  # Final: max(...) * -1\n    factor = pl.max_horizontal(pl.col('ts_rank1'),\
      \ pl.col('ts_rank2')) * -1\n    \n    return df.select(factor).to_series()"
