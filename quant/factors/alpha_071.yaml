  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv180 = rolling\
      \ mean of volume over 180 days\n    adv180 = rolling_mean(pl.col('volume'),\
      \ window=180)\n\n    # Part 1: Ts_Rank(decay_linear(correlation(Ts_Rank(close,\
      \ 3.43976),\n    #                       Ts_Rank(adv180, 12.0647), 18.0175),\
      \ 4.20501), 15.6948)\n    ts_rank_close = ts_rank(pl.col('close'), window=3)\n\
      \    ts_rank_adv180 = ts_rank(adv180, window=12)\n    corr = rolling_corr(ts_rank_close,\
      \ ts_rank_adv180, window=18)\n    decay1 = decay_linear(corr, window=4)\n  \
      \  part1 = ts_rank(decay1, window=15)\n\n    # Part 2: Ts_Rank(decay_linear((rank(((low\
      \ + open) - (vwap + vwap)))^2),\n    #                       16.4662), 4.4388)\n\
      \    inner2 = (pl.col('low') + pl.col('open')) - (pl.col('vwap') + pl.col('vwap'))\n\
      \    ranked = rank(inner2).over('date')\n    squared = ranked ** 2\n    decay2\
      \ = decay_linear(squared, window=16)\n    part2 = ts_rank(decay2, window=4)\n\
      \n    # Max of the two parts\n    factor = pl.max_horizontal([part1, part2])\n\
      \n    return df.select(factor).to_series()"
