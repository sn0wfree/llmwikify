  l1:
    definition: ((rank(ts_max((vwap - close), 3)) + rank(ts_min((vwap - close), 3)))
      * rank(delta(volume, 3)))
    formula: ((rank(ts_max((vwap - close), 3)) + rank(ts_min((vwap - close), 3)))
      * rank(delta(volume, 3)))
    frequency: 日频
    output_schema: '[date × Code]'
    input_columns:
    - close
    - volume
    - vwap
    - open
    - high
    - low
    - returns
    nan_meaning: 上市不足或窗口期数据不足
    default_params: {}
    param_constraints: {}
    business_constraints: 支持日频调仓, T+1 信号
  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # Data is already\
      \ sorted by (code, date) — do NOT re-sort\n    df = df.sort(['code', 'date'])\n\
      \n    # 1. vwap - close\n    vwap_close_diff = pl.col('vwap') - pl.col('close')\n\
      \n    # 2. ts_max of (vwap - close) over 3-day window (per code)\n    max_diff\
      \ = ts_max(vwap_close_diff, window=3)\n\n    # 3. ts_min of (vwap - close) over\
      \ 3-day window (per code)\n    min_diff = ts_min(vwap_close_diff, window=3)\n\
      \n    # 4. Cross-sectional rank of each\n    rank_max = rank(max_diff).over('date')\n\
      \    rank_min = rank(min_diff).over('date')\n\n    # 5. Sum of the two ranks\n\
      \    sum_ranks = rank_max + rank_min\n\n    # 6. 3-period delta of volume (per\
      \ code)\n    vol_delta = delta(pl.col('volume'), periods=3)\n\n    # 7. Cross-sectional\
      \ rank of the volume delta\n    rank_vol_delta = rank(vol_delta).over('date')\n\
      \n    # 8. Final factor: (rank_max + rank_min) * rank(volume delta)\n    factor\
      \ = sum_ranks * rank_vol_delta\n\n    return df.select(factor).to_series()"
