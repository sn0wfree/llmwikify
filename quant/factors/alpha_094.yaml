  l5:
    code: "def compute_factor(df: pl.DataFrame) -> pl.Series:\n    # adv60 = 60-day\
      \ average daily volume\n    adv60 = ts_mean(pl.col('volume'), 60)\n\n    # ts_min(vwap,\
      \ 11.5783) -> rolling_min, window must be int\n    vwap_min = rolling_min(pl.col('vwap'),\
      \ window=11)\n\n    # rank(vwap - ts_min(vwap, 11.5783)) -- cross-sectional\
      \ rank per date\n    rank_part = rank(pl.col('vwap') - vwap_min).over('date')\n\
      \n    # Ts_Rank(vwap, 19.6462) -> cast to int\n    ts_rank_vwap = ts_rank(pl.col('vwap'),\
      \ 19)\n\n    # Ts_Rank(adv60, 4.02992) -> cast to int\n    ts_rank_adv60 = ts_rank(adv60,\
      \ 4)\n\n    # correlation(Ts_Rank(vwap, 19.6462), Ts_Rank(adv60, 4.02992), 18.0926)\
      \ -> int\n    corr = rolling_corr(ts_rank_vwap, ts_rank_adv60, 18)\n\n    #\
      \ Ts_Rank(correlation(...), 2.70756) -> cast to int\n    ts_rank_corr = ts_rank(corr,\
      \ 2)\n\n    # (rank_part ^ ts_rank_corr) * -1\n    factor = (rank_part ** ts_rank_corr)\
      \ * -1\n\n    return df.select(factor).to_series()"
